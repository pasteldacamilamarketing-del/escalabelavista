# CheckON — Especificação Técnica e de Negócio
**Pastel da Camilla · Versão 2026.14**
*Documento de referência para desenvolvimento, manutenção e tomada de decisão.*

---

## 1. O que é o CheckON

CheckON é um sistema de gestão operacional por turno para o Pastel da Camilla. Resolve três problemas reais:

1. **Accountability sem burocracia** — subgerentes preenchem checklists estruturados no celular, não formulários genéricos
2. **Rastreabilidade de passagem de turno** — o que a manhã deixou pendente, a noite recebe formalmente
3. **Visibilidade gerencial em tempo real** — a Camila (CEO) vê o status de cada área sem precisar perguntar

O sistema **não é** um app de tarefas genérico. É calibrado para a operação específica do Pastel da Camilla, com checklists, horários, e regras de negócio que refletem a realidade da loja.

## 3. Fórmulas de Score — Canônico

> **PROBLEMA ATUAL:** existem três implementações diferentes de score no código. Esta seção define o que deveria ser e o que é hoje.

### 3.1 O que é hoje (por perfil)

| Perfil | Fórmula atual | Críticos com peso extra? |
|---|---|---|
| Subgerência Manhã (Gabriela) | `100 - (falhas/total × 50) - (criticos × 8)` | ✅ Sim |
| Subgerência Noite (Vitória) | `100 - (falhas/total × 50) - (criticos × 8)` | ✅ Sim |
| Gerência (Derik) | `100 - (falhas/total × 60)` | ❌ Não |
| Gerente/Suporte | `100 - (falhas/total × 40) - (criticos × 10)` | ✅ Sim |
| DP (Viviane) | `100 - (falhas/total × 60)` | ❌ Não |

Todos têm `Math.max(0, Math.round(...))` — score mínimo é 0.

### 3.2 Por que isso importa
O **ranking unificado** que construímos no CEO Dashboard compara esses scores diretamente. Um score 80 da Gabriela (com peso de crítico) não é o mesmo que um score 80 do Derik (sem peso de crítico). O ranking atual está comparando grandezas diferentes.

### 3.3 Fórmula canônica proposta (a implementar)
```
score = max(0, round(100 - (falhas/total × 50) - (criticos × 8)))
```
**Parâmetros:**
- `50` = penalidade proporcional por falha. Com 10 falhas em 20 itens = -25 pontos
- `8` = penalidade adicional por item marcado como `critico:true`. Com 2 críticos = -16 pontos adicionais
- `Math.max(0)` = floor em zero, score nunca negativo

**Por que esses valores:**
- Um turno com todas as falhas em itens não-críticos ainda pode ter score 50+
- Um único crítico não resolvido custa 8 pontos acima do proporcional — cria incentivo correto
- Score 80+ = operação controlada, 60–79 = atenção, <60 = crítico

### 3.4 Status — valores esperados no banco

| Perfil | Valores possíveis de `status` |
|---|---|
| Subgerência (manhã e noite) | `'ok'` · `'atencao'` · `'critico'` |
| Gerência (Derik) | `'ok'` · `'atenção'` · `'crítico'` ← **com acento, inconsistente** |
| Gerente/Suporte | `'conforme'` · `'ressalvas'` · `'critico'` ← **valores diferentes** |
| DP | `'ok'` · `'atencao'` · `'critico'` |

**Problema:** o CEO Dashboard trata todos como se fossem iguais. A leitura `d.status === 'ok'` funciona para subger e DP, mas não para gerência (`'ok'` vs `'OK'`) nem para gerente (`'conforme'`).

**Regra canônica proposta:**
```
'ok'      = zero falhas
'atencao' = falhas mas nenhum crítico
'critico' = pelo menos um item crítico com falha
```
**Todos os perfis devem usar esses três valores exatos, minúsculo, sem acento.**

## 5. Estrutura de `negs` por Perfil

O campo `negs` é um objeto `{[item_id]: NegObject}` gravado como JSON no banco.

### 5.1 Subgerência (manhã e noite) — `SubgerNaoForm` / `NoiteNaoForm`
```js
{
  aconteceu: string,  // chip de "O que aconteceu?" — obrigatório
  feito:     string,  // chip de "O que foi feito?" — obrigatório
  prox:      string,  // 'Sim, fica pendente' | 'Não, encerrado' — obrigatório
  detalhe:   string,  // texto livre — opcional
}
```
**Validação:** `validateSubgerNeg` / `validateNoiteNeg` exige os três primeiros campos.

### 5.2 DP — `DPNaoForm`
```js
{
  ocorrencia:    string,  // chip de categoria — obrigatório
  acao:          string,  // 'resolvi' | 'pendente' | 'escalei' — obrigatório
  escaladoPara:  string,  // obrigatório se acao === 'escalei'
  detalhe:       string,  // obrigatório se isOutro || isPendente || isEscalei
  prox:          string,  // 'Sim' | 'Não' — obrigatório
  resp:          string,  // igual a escaladoPara quando escalei
}
```
**Atenção:** `prox` aqui aceita `'Sim'` ou `'Não'` — diferente da subgerência que usa `'Sim, fica pendente'`. A função `salvarPendencias` trata ambos: `n.prox === 'Sim, fica pendente' || n.prox === 'Sim'`.

### 5.3 Gerência (Derik) — `SharedNaoForm`
```js
{
  problema: string,  // texto — obrigatório
  causa:    string,  // texto — obrigatório
  impacto:  string,  // texto — obrigatório
  acao:     string,  // texto — obrigatório
  resp:     string,  // chip de responsável — obrigatório
  prox:     string,  // 'Sim' | 'Não' — obrigatório
}
```

### 5.4 Gerente/Suporte — legado
Não usa formulário estruturado de negativos — usa campo `obsGerais` (texto livre) e tela `OcorrenciasScreen`.

Isso significa que o hub lê uma chave diferente da que o checklist grava. O progresso do rascunho exibido no hub pode estar sempre zerado para a gerência.

## 7. Fluxo por Etapas — Como Funciona

### 7.1 Subgerência Manhã (Gabriela)
```
SubgerenteHub (briefing) 
  → onIniciar() 
  → SubgerChecklistScreen (screen='inicio') 
  → auto-avança para screen='checklist'
  → Etapa 1: Abertura 9h–11h (12 itens)
  → Etapa 2: Controle da Operação 11h–13h (10 itens)
  → Etapa 3: Fechamento 13h+ (6 itens)
  → screen='ocorrencias' (resumo + relato)
  → handleFinalizar() → sbInsert + salvarPendencias + sendWebhook
  → screen='summary' (SubgerSummaryScreen)
  → TurnoEncerrado (tela final motivacional)
```

### 7.2 Subgerência Noite (Vitória)
```
SubgerenteNoiteHub (briefing + pendências da manhã)
  → onIniciar()
  → NoiteChecklistScreen (screen='inicio')
  → auto-avança para screen='checklist'
  → Etapa 1: Chegada e Recebimento 17h–18h (9 itens)
  → Etapa 2: Operação e Pico 18h–21h (9 itens)
  → Etapa 3: Fechamento Completo 21h+ (10 itens)
  → screen='resumo' (resumo + relato para a manhã)
  → handleFinalizar() → sbInsert + salvarPendencias + sendWebhook
  → screen='summary' (NoiteSummaryScreen)
  → TurnoEncerrado
```

### 7.3 Regra de avançar etapa
Antes de avançar da etapa N para N+1, `validateEtapa(idx)` verifica:
- Todo item tem resposta (`resps[item.id]` existe)
- Todo item com `resps[item.id]==='nao'` tem neg válido (`validateSubgerNeg` / `validateNoiteNeg`)

Se falhar → `setShowErr(true)` + toast de aviso + scroll para o topo. Não avança.

### 7.4 Rascunho automático
Ao sair pelo botão "⏸ Depois" ou "← Início", o estado é salvo no localStorage. Ao retornar ao hub, o `BoasVindasInteligente` detecta o rascunho e exibe barra de progresso + botão "Continuar turno →".

## 8. BoasVindasInteligente — Estados

O componente tem **quatro estados mutuamente exclusivos**:

| Estado | Condição | O que mostra |
|---|---|---|
| **Turno já enviado** | `verificarTurnoHoje` retorna registro com `data === hoje` | Card de resumo do turno + botão "Iniciar novo mesmo assim" |
| **Com rascunho** | `rascunhoPct !== null` | Barra de progresso + botão "Continuar turno →" |
| **Zerado** | sem rascunho, sem turno hoje | Preview das etapas com horários + botão "Iniciar [turno] →" |
| **Carregando** | `turnoHoje === null` (ainda resolvendo) | Header renderiza imediatamente, cards carregam progressivamente |

**Regra importante:** o botão de ação principal aparece **imediatamente**, sem esperar o carregamento do histórico. O histórico (`analisarHistorico`) carrega em background e atualiza os cards progressivamente.

## 9. Regras de Pendências

### 9.1 O que vira pendência
Um item vira pendência quando:
```
resps[item.id] === 'nao'
&& (negs[item.id].prox === 'Sim, fica pendente'   // subger, noite
    || negs[item.id].prox === 'Sim')               // DP, gerência
```

### 9.2 Ciclo completo
```
Gabriela marca item como NÃO + "Sim, fica pendente"
  → handleFinalizar() chama salvarPendencias()
  → grava em checkon_pendencias com status='aberta'
  → SubgerenteNoiteHub chama buscarPendenciasManhaParaNoite()
  → Vitória vê card de alerta no briefing
  → CEO vê na aba Pendências
  → PendenciasBlock.resolver() atualiza status='resolvida'
```

### 9.3 `buscarPendenciasManhaParaNoite` — como funciona
Busca os últimos 5 registros de `subger_checklists` com `data = hoje`. Pega o mais recente. Conta itens onde `resps[id]==='nao'` e `negs[id].prox==='Sim, fica pendente'`. Retorna `{responsavel, score, pendencias, horario}`.

**Não usa a tabela `checkon_pendencias`** — lê diretamente do turno da manhã. Isso é intencional: é mais rápido e garante que o card da Vitória reflete o turno real de hoje, não pendências antigas.

## 10. Inteligência de Histórico — `analisarHistorico`

### Parâmetros de negócio
- **Cache válido:** 4 horas (evita query no Supabase a cada abertura do app)
- **Janela de score médio:** últimos 7 turnos
- **Janela de falhas frequentes:** últimos 5 turnos
- **Threshold de falha frequente:** 2+ ocorrências em 5 turnos → gera alerta
- **Threshold de streak de conquista:** 5+ turnos sem crítico → gera badge de conquista
- **Threshold de score baixo:** média < 70 com 3+ registros → gera alerta de atenção

### Por que esses valores
- 7 turnos para média = ~2 semanas de operação, suaviza outliers sem perder relevância
- 5 turnos para falhas frequentes = ~1 semana, detecta padrão recente
- 2 ocorrências em 5 = 40% de frequência — limiar razoável para alertar sem ruído
- 5 turnos para streak = ~1 semana sem crítico merece reconhecimento

## 11. Webhook e Envio de E-mail

### Payload do webhook (Make.com)
```js
{
  texto:          string,  // texto do relatório (multilinha)
  timestamp:      string,  // ISO datetime
  sistema:        'CheckON Pastel da Camilla',
  email_destino:  'pasteldacamilasuporte@gmail.com',
  email_assunto:  string,  // ex: '[CheckON Subgerência] OK – Gabriela'
  email_html:     string,  // texto com \n → <br>
  email_texto:    string,  // mesmo que texto
}
```

### Quando dispara
- Ao finalizar qualquer checklist (todos os perfis)
- **Não dispara por etapa** — apenas ao enviar o turno completo

### Problema atual
`sendWebhook` falha silenciosamente. Se o Make.com estiver fora, o usuário não sabe. O `sbInsert` também falha silenciosamente. **Não há confirmação real de que os dados chegaram.**

## 14. Convenções de Desenvolvimento

### Ao adicionar um novo item de checklist
1. Criar id único no formato `[prefixo][número]` (ex: `sg55`, `vt30`, `dp_b5_i1`)
2. Nunca reutilizar ids — ids são chaves em `resps` e `negs` no banco
3. Marcar `critico: true` apenas para itens que, se não feitos, comprometem diretamente segurança ou operação
4. Adicionar o item na etapa correta com base no horário

### Ao adicionar um novo perfil (role)
1. Adicionar em `DEFAULT_USERS` com role único
2. Adicionar rota em `App()` — `if(user.role === 'novo_role') return <NovoHub/>`
3. Criar tabela no Supabase com os campos canônicos
4. Usar a fórmula de score canônica: `100 - (falhas/total × 50) - (criticos × 8)`
5. Usar status canônicos: `'ok'` · `'atencao'` · `'critico'`
6. Chamar `salvarPendencias()` ao finalizar se o perfil tiver itens com prox
7. Adicionar ao CEO Dashboard em todas as abas relevantes

### Ao mudar uma regra de negócio
1. Atualizar este SPEC.md primeiro
2. Atualizar o código
3. Bump no `VERSION` (ex: `'2026.14'` → `'2026.15'`) para invalidar sessões antigas

### Convenção de nomenclatura de chaves localStorage
```
konclui_*   = dados de sessão e usuário (sistema)
checkon_*   = dados de checklist e rascunho (operacional)
ger_*       = rascunhos de gerência (legado — migrar para checkon_ger_*)
```

---

## 15. Variáveis de Ambiente e Configuração

Todas as configurações estão no topo do `<script>`:

```js
const SUPABASE_URL = 'https://crmeztihgrwnpoovzpqk.supabase.co'
const SUPABASE_KEY = 'sb_publishable_...'   // chave pública (anon key) — ok expor
const SISTEMA      = 'CheckON Pastel da Camilla'
const WEBHOOK      = 'https://hook.us2.make.com/...'
const WA_GROUP     = 'https://chat.whatsapp.com/...'
const VERSION      = '2026.14'
```

**`SUPABASE_KEY` é a chave anon/pública** — só tem acesso ao que as Row Level Security policies permitirem. Não é uma secret key. Ainda assim, não compartilhar publicamente.

**`WEBHOOK`** é o endpoint do Make.com que processa o relatório e envia e-mail. Se o Make.com mudar, atualizar aqui.

**`VERSION`** deve ser incrementado a cada deploy que mude dados do localStorage — invalida sessões e força releitura dos usuários.

## [2026.16] — Abril 2026 — Correções de consistência e confiabilidade

### Corrigido
- **Falha silenciosa em `sbInsert`** — todos os `handleFinalizar`/`handleEnviar` agora verificam o retorno do insert. Se o Supabase retornar erro, a tela de summary não avança e o rascunho não é apagado. O usuário vê toast de erro e pode tentar novamente.
- **Bug `GER_SAVE_KEY`** — `GerenciaHub` agora usa `konclui_ger_[login]`, mesma chave que `GerChecklistScreen`. O indicador de rascunho do Derik passa a funcionar corretamente.
- **Status com acento na Gerência** — `GerChecklistScreen` e `GerSummaryScreen` agora gravam e exibem `'ok'`/`'atencao'`/`'critico'` sem acento, alinhado com todos os outros perfis.

### Alterado
- **Fórmula de score unificada** — todos os perfis agora usam `100 - (falhas/total × 50) - (criticos × 8)`. Perfis afetados: DP (era `×60` sem crítico), Gerente/Suporte legado (era `×40` com `criticos×10`). **Scores históricos no banco não são recalculados** — ranking histórico anterior a esta versão é incomparável. A partir de 2026.16 todos os scores são comparáveis.
- **`sbSelectRecente`** — nova função que filtra por `data >= hoje - 90 dias`. Usada no CEODashboard e CEOHub em vez de `sbSelect` sem limite. Reduz volume de dados carregados à medida que o banco cresce.

# CheckON — Guia do Desenvolvedor
**Use antes de fazer qualquer mudança no sistema**

---

## Antes de qualquer alteração

- [ ] Li o SPEC.md na seção relevante?
- [ ] Atualizei o VERSION no topo do index.html? (`'2026.14'` → próximo número)
- [ ] A mudança afeta dados já gravados no Supabase? Se sim, dados antigos vão continuar funcionando?
- [ ] A mudança afeta o `analisarHistorico`? O cache de 4h pode estar servindo dados antigos.

---

## Adicionar um item ao checklist

### Subgerência Manhã (`SUBGER_ETAPAS`)
```
1. Definir o id: formato sg[número], ex: sg55
   - Verificar que o id não existe em nenhuma etapa
   - Ids são chaves no banco — reutilizar id quebra dados históricos

2. Decidir a etapa:
   - Etapa 1 (sg_e1): ações de abertura — 9h a 11h
   - Etapa 2 (sg_e2): controle durante operação — 11h a 13h
   - Etapa 3 (sg_e3): fechamento — 13h+

3. Definir critico:
   - true  = segurança, operação ou cliente impactado diretamente se não feito
   - false = importante mas não para a operação

4. Adicionar no array da etapa correta em SUBGER_ETAPAS

5. Verificar se o total de itens mudou:
   - SPEC.md seção 4.1 diz 'total sempre 28'
   - Atualizar o SPEC.md com o novo total
```

### Subgerência Noite (`NOITE_ETAPAS`)
Mesma lógica, ids no formato `vt[número]`.

### DP (`DP_BLOCOS_DATA`, `DP_BLOCOS_SEMANAL`, `DP_BLOCOS_MENSAL`)
```
1. Id no formato dp_[bloco]_i[número], ex: dp_b1_i5
2. Se o item só aparece em contexto específico, adicionar campo cond:
   cond: 'admissao' | 'assinatura' | 'comunicado' | 'uniforme' | 'exame' | 'colaborador_trouxe'
3. Verificar se a lógica em DPChecklistScreen allItems filtra corretamente o cond
```

---

## Adicionar um novo usuário

```
1. Adicionar em DEFAULT_USERS:
   novouser: {
     name: 'Nome',
     login: 'novouser',
     role: 'role_existente',   // usar role já mapeado no App()
     pwd: PWD_2026,
     first: false,
     color: '#HEX',
     active: true
   }

2. Ou criar pelo UserManager (Bruna tem acesso) — mais seguro

3. Se for um novo role:
   a. Adicionar rota em App(): if(user.role === 'novo_role') return <NovoHub/>
   b. Criar NovoHub seguindo o padrão dos outros hubs
   c. Criar tabela no Supabase
   d. Adicionar ao CEO Dashboard
   e. Documentar no SPEC.md seção 2 e 4
```

---

## Mudar a fórmula de score

**ATENÇÃO: scores históricos no banco não são recalculados.**
Mudar a fórmula quebra comparabilidade histórica. Só fazer se:
- O novo score for claramente superior
- Houver consciência de que o ranking histórico vai ser inconsistente
- O período de transição for documentado no CHANGELOG.md

```
1. Localizar TODAS as ocorrências:
   grep -n "var score=Math.max" index.html

2. Atualizar TODAS (não deixar uma de fora — isso cria inconsistência)

3. Atualizar SPEC.md seção 3

4. Atualizar CHANGELOG.md

5. Bump no VERSION
```

---

## Mudar um chip de resposta (aconteceu/feito/prox)

Os valores dos chips são gravados como strings no banco em `negs`.
Mudar um chip significa que dados históricos vão ter o valor antigo e dados novos vão ter o valor novo.

```
Antes de mudar:
- O novo valor vai quebrar alguma lógica que compara a string?
- Verificar: salvarPendencias(), verificarTurnoHoje(), buscarPendenciasManhaParaNoite()
- Verificar: CEO Dashboard — qualquer lugar que filtra por valor de neg

Se o valor de 'prox' mudar:
- salvarPendencias() usa: n.prox === 'Sim, fica pendente' || n.prox === 'Sim'
- Adicionar o novo valor ao OR, não remover os antigos
```

---

## Adicionar uma nova aba ao CEO Dashboard

```
1. Adicionar tab ao array de navegação (linha ~1295):
   ['nova_tab', '🎯 Nome']

2. Adicionar fetch no useEffect load():
   if(tab==='overview'||tab==='nova_tab'){...}

3. Adicionar state no componente:
   var _novaData=useState([]);var novaData=_novaData[0];var setNovaData=_novaData[1];

4. Adicionar render:
   {!loading&&tab==='nova_tab'&&(...)}

5. Se a aba mostra dados que devem aparecer no ranking ou alertas:
   Adicionar 'nova_tab' nas condições de load de subgerData e noiteData
```

## Quando o Supabase der erro

```
Sintomas: dados não aparecem, envio parece funcionar mas não grava

Verificar:
1. Console do browser (F12 > Console) — sbInsert e sbSelect logam erros
2. SUPABASE_KEY ainda é válida? (chave anon não expira, mas pode ser revogada)
3. Row Level Security no Supabase permite a operação?
4. A tabela existe com os campos esperados?

Fallback:
- analisarHistorico tem fallback para localStorage ('checkon_hist_[login]_[tabela]')
- Mas sbInsert não tem — dados podem se perder silenciosamente
```

---

## Quando um usuário reclamar que perdeu um rascunho

```
Rascunhos ficam no localStorage do dispositivo do usuário.
Se ela:
- Trocou de dispositivo: rascunho perdido (não há sync)
- Limpou dados do browser: rascunho perdido
- O VERSION mudou: SESSION foi limpa, mas rascunho pode ter sobrado

Verificar no console do dispositivo dela:
localStorage.getItem('checkon_subger_gabriela')  // subgerência manhã
localStorage.getItem('checkon_noite_vitoria')     // noite
localStorage.getItem('checkon_dp_viviane')        // DP
```

---

## Quando o CEO não ver dados de hoje

```
1. O turno foi enviado? (dados só aparecem ao finalizar, não durante)
2. A aba está carregando? (loading spinner)
3. O filtro de data está correto? hojeKpi usa todayISO() = new Date().toISOString().slice(0,10)
   Verificar se o dispositivo da Camila tem data/hora correta
4. Dados estão em qual tabela? Verificar no Supabase diretamente
```

---

## Regras que nunca devem ser quebradas

```
❌ Nunca reutilizar um id de item (sg1, vt1, dp_b1_i1, etc.)
❌ Nunca remover a verificação de role de gabriela e vitoria em getUsers()
❌ Nunca gravar status com valor diferente de 'ok'/'atencao'/'critico' em tabelas novas
❌ Nunca mudar o valor de prox sem adicionar o valor antigo ao OR em salvarPendencias()
❌ Nunca subir o arquivo sem bump no VERSION quando mudar dados de localStorage
❌ Nunca deletar registros do Supabase — apenas marcar status como inativo/resolvida
```

body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:calc(var(--fab-h) + 24px + env(safe-area-inset-bottom,0px))}
*{font-family:inherit}
button{cursor:pointer;border:none;outline:none;background:transparent;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

a{color:inherit}
img{display:block;max-width:100%}

.login-wrapper{width:100%;max-width:340px;animation:loginWrapIn .7s cubic-bezier(.34,1.4,.64,1) both;}

.login-card{width:100%;background:#F5F1EF;border-radius:24px;box-shadow:0 16px 48px rgba(0,0,0,.28);position:relative;overflow:visible;}
.card-top{width:100%;height:80px;display:flex;justify-content:center;align-items:flex-start;position:relative;}
.card-arch-bg{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:130px;height:130px;border-radius:50%;background:#fff;box-shadow:0 -4px 16px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:2;}

.card-body{padding:6px 24px 28px;}
.card-headline{font-family:'Sora',sans-serif;font-size:16px;font-weight:900;color:#1A1A1A;text-align:center;margin-bottom:4px;line-height:1.4;}

.card-sub{font-size:11px;color:#AAA;text-align:center;margin-bottom:20px;}
.login-f-group{margin-bottom:11px}
.login-f-label{display:block;font-size:10px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.login-input-wrap{position:relative}

.login-f-input{width:100%;background:#fff;border:1.5px solid #E4DCDA;border-radius:10px;padding:12px 12px 12px 40px;font-size:14px;color:#1A1A1A;transition:border-color .2s,box-shadow .2s;outline:none;-webkit-appearance:none;}

.login-btn{width:100%;padding:14px;background:#EA1D2C;color:#fff;border-radius:10px;border:none;font-family:'Sora',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;transition:background .15s,transform .1s;box-shadow:0 4px 14px rgba(234,29,44,.4);}
.login-btn:hover{background:#C0111E;transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}

.login-alert{background:#FEE2E2;border:1px solid #FECACA;color:#B91C1C;border-radius:10px;padding:9px 13px;font-size:12px;font-weight:600;margin-bottom:11px;text-align:center;}
.login-footer-txt{text-align:center;margin-top:14px;font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.3px;}
@media(min-width:640px){.login-wrapper{max-width:320px}.login-card{border-radius:22px}}
.hdr{background:var(--brand);color:#fff;height:56px;padding:0 16px;display:flex;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(180,0,20,.28)}

.hdr-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);border-radius:var(--r99);padding:6px 13px;font-size:11px;font-weight:700;transition:background .13s;min-height:32px}

.day-badge{display:inline-flex;align-items:center;gap:7px;margin:14px 16px 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r99);padding:6px 14px;font-size:11px;font-weight:700;color:var(--ink2);box-shadow:var(--sh0)}
.day-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0}

.turno-btn{padding:20px 14px;border-radius:var(--r12);border:2px solid var(--line);background:var(--surface);text-align:center;transition:all .15s;cursor:pointer;position:relative;overflow:hidden;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center}

.start-btn{width:100%;padding:16px;background:var(--brand);color:#fff;border-radius:var(--r12);font-family:'Sora',sans-serif;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;border:none;box-shadow:var(--sh-brand)}

.prog-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r12);box-shadow:var(--sh1);padding:16px;margin:12px 16px 0}
.prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.prog-lbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.prog-pct{font-family:'Sora',sans-serif;font-size:22px;font-weight:900;color:var(--brand)}
.prog-track{background:var(--line2);border-radius:var(--r99);height:6px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;border-radius:var(--r99);background:var(--brand);transition:width .4s ease}
.prog-stats{display:grid;grid-template-columns:repeat(4,1fr);text-align:center;gap:4px}
.pv{font-family:'Sora',sans-serif;font-size:20px;font-weight:900;line-height:1}
.pl{font-size:9px;color:var(--ink3);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.status-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r12);box-shadow:var(--sh1);padding:12px 16px;margin:10px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.s-badge{border-radius:var(--r99);padding:4px 12px;font-size:11px;font-weight:700;white-space:nowrap}
.s-ok{background:var(--ok-bg);color:var(--ok)}.s-warn{background:var(--warn-bg);color:var(--warn)}.s-err{background:var(--danger-bg);color:var(--danger)}
.sv{font-family:'Sora',sans-serif;font-size:17px;font-weight:900;line-height:1}
.sl{font-size:9px;color:var(--ink3);text-transform:uppercase;margin-top:2px;font-weight:600}
.section{margin:8px 16px 0;border-radius:var(--r12);overflow:hidden;border:1px solid var(--line);box-shadow:var(--sh0)}
.sec-head{padding:14px 16px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .12s;min-height:52px}

.sec-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.sec-name{font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:var(--ink)}

.sb-d{background:var(--line2);color:var(--ink2)}.sb-ok{background:var(--ok-bg);color:var(--ok)}.sb-err{background:var(--danger-bg);color:var(--danger)}

.chk-item{padding:14px 16px;border-top:1px solid var(--line2);background:var(--surface)}

.chk-item.lc{border-left:3px solid var(--brand)}.chk-item.li{border-left:3px solid var(--warn)}.chk-item.lr{border-left:3px solid var(--info-line)}
.lvl{display:inline-flex;align-items:center;font-size:9px;font-weight:800;border-radius:var(--r4);padding:2px 7px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}

.ans-sim:hover{border-color:var(--ok-line);background:var(--ok-bg);color:var(--ok)}

.req-msg{font-size:11px;color:var(--danger);margin-top:6px;font-weight:600;display:flex;align-items:center;gap:4px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 14px;border-radius:var(--r99);border:1.5px solid var(--line);background:var(--surface);font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .12s;white-space:nowrap;min-height:36px;display:inline-flex;align-items:center}
.chip:hover{border-color:var(--ink3);background:var(--surface2)}

.chip.sr{border-color:var(--info);background:var(--info);color:#fff}
.ger-neg-wrap{background:#FFF8F8;border:1.5px solid var(--danger-line);border-radius:var(--r12);padding:16px;margin-top:12px}

.ger-input,.neg-obs{width:100%;border:1.5px solid var(--line);border-radius:var(--r8);padding:10px 12px;font-size:14px;color:var(--ink);background:var(--surface);transition:border-color .15s;resize:none;min-height:52px;line-height:1.5}

.fab{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px));display:flex;gap:8px;box-shadow:0 -2px 12px rgba(0,0,0,.08);min-height:var(--fab-h)}
.fab-inner{width:100%;max-width:var(--content-max);margin:0 auto;display:flex;gap:6px;align-items:center}

async function sbInsert(table,data){
  try{const{error}=await sb.from(table).insert(data);if(error)console.error('SB insert error:',error);return !error;}catch(e){console.error('SB error:',e);return false;}
}
async function sbSelect(table,filters){
  try{
    let q=sb.from(table).select('*').order('created_at',{ascending:false});
    if(filters){Object.entries(filters).forEach(function([k,v]){q=q.eq(k,v);});}
    const{data,error}=await q;
    if(error){console.error('SB select error:',error);return[];}
    return data||[];
  }catch(e){console.error('SB error:',e);return[];}
}

async function sbSelectRecente(table,dias,filters){
  try{
    var cutoff=new Date();cutoff.setDate(cutoff.getDate()-(dias||90));
    var cutoffStr=cutoff.toISOString().slice(0,10);
    let q=sb.from(table).select('*').gte('data',cutoffStr).order('created_at',{ascending:false});
    if(filters){Object.entries(filters).forEach(function([k,v]){q=q.eq(k,v);});}
    const{data,error}=await q;
    if(error){console.error('SB select error:',error);return[];}
    return data||[];
  }catch(e){console.error('SB error:',e);return[];}
}

  var _s=useState({show:false,msg:''});var t=_s[0],sT=_s[1];var r=useRef();

    if(item.cond==='delivery'&&ctx.delivery!=='sim')return false;

function detectarCategoriaDP(texto,item){
  /* Usa campo categoria explícito do item quando disponível — evita fragilidade de keyword match */
  if(item&&item.categoria)return item.categoria;
  /* Fallback: keyword match para compatibilidade com itens sem categoria */
  var t=(texto||'').toLowerCase();
  if(t.indexOf('ifood')>=0||t.indexOf('ponto mais')>=0||t.indexOf('cartão bom')>=0||t.indexOf('benefício')>=0||t.indexOf('sistema')>=0||t.indexOf('acesso')>=0||t.indexOf('app')>=0)return'sistema';
  if(t.indexOf('document')>=0||t.indexOf('arquivo')>=0||t.indexOf('assinat')>=0||t.indexOf('prazo')>=0||t.indexOf('lançado')>=0)return'documentacao';
  if(t.indexOf('colabor')>=0||t.indexOf('solicit')>=0||t.indexOf('dúvida')>=0||t.indexOf('demanda')>=0||t.indexOf('comunicação')>=0)return'equipe';
  if(t.indexOf('fechamento')>=0||t.indexOf('próximo')>=0||t.indexOf('continuid')>=0||t.indexOf('pendência')>=0)return'fechamento';
  return'default';
}

function validateDPNeg(neg){
  var n=neg||{};
  var isEscalei=n.acao==='escalei';var isPendente=n.acao==='pendente';
  var isOutro=n.ocorrencia==='Outro'||n.ocorrencia==='Outro sistema';
  var precisaDetalhe=isOutro||isPendente||isEscalei;
  if(!n.ocorrencia||!n.acao||!n.prox)return false;
  if(isEscalei&&!n.escaladoPara)return false;
  if(precisaDetalhe&&!n.detalhe)return false;
  return true;
}

      var n=negs[it.id]||{};
      if(n.acao==='resolvi'){resolvidosNaHora++;}
      else if(n.acao==='escalei'){var destino=(n.escaladoPara||'').toLowerCase();if(destino==='camila'){paraCAMILA.push({motivo:n.ocorrencia||'',detalhe:n.detalhe||''});}else{paraOUTREM.push({resp:n.escaladoPara||'',motivo:n.ocorrencia||'',detalhe:n.detalhe||''});}}

      if(resolvidosNaHora>0){linhas.push('');linhas.push(resolvidosNaHora+' resolvido'+(resolvidosNaHora>1?'s':'')+' na hora.');}
    }else{
      linhas.push(nome+' fechou. Score '+score+', '+falhas+' aberto'+(falhas>1?'s':'')+'.');linhas.push('');
      if(paraOUTREM.length>0){var porResp={};paraOUTREM.forEach(function(p){if(!porResp[p.resp])porResp[p.resp]=[];porResp[p.resp].push(p.motivo);});Object.keys(porResp).forEach(function(r){linhas.push(r+' já está cuidando de: '+porResp[r].join(', ')+'.');});}
      if(pendentes.length>0){pendentes.forEach(function(p){linhas.push((p.motivo||'Um item')+' ficou pra amanhã'+(p.detalhe?' — '+p.detalhe:'')+'. ');});}

      linhas.push('');linhas.push('Está sob controle — só te deixando no loop.');
    }
    linhas.push('');linhas.push('— Glória · CheckON · Pastel da Camilla');
    if(linhas.length>12){linhas=linhas.slice(0,11);linhas.push('— Glória · CheckON · Pastel da Camilla');}
    return linhas.join('\n');

function DPChecklistScreen(props){
  var user=props.user;var onLogout=props.onLogout;var onBack=props.onBack;

  var _rs=useState({});var resps=_rs[0];var setResps=_rs[1];

  var _se=useState(false);var showErr=_se[0];var setShowErr=_se[1];
  var _ve=useState([]);var valErrs=_ve[0];var setValErrs=_ve[1];
  var _sn=useState(false);var sending=_sn[0];var setSending=_sn[1];
  var _toast=useToast();var toast=_toast[0];var showToast=_toast[1];
  var _inicio=useState(null);var horaInicio=_inicio[0];var setHoraInicio=_inicio[1];
  var _sug=useState({});var sugestao=_sug[0];var setSugestao=_sug[1];
  var _sugOpen=useState(false);var sugestaoAberta=_sugOpen[0];var setSugestaoAberta=_sugOpen[1];
  var _tempoTotal=useState('');var tempoTotal=_tempoTotal[0];var setTempoTotal=_tempoTotal[1];
  var _enviado=useState(false);var enviado=_enviado[0];var setEnviado=_enviado[1];
  var _enviadoScore=useState(0);var enviadoScore=_enviadoScore[0];var setEnviadoScore=_enviadoScore[1];
  var _dpCtx=useState({admissao:'',assinatura:'',comunicado:'',uniforme:'',exame:'',ocorrencia:'',colaborador_trouxe:''});var dpCtx=_dpCtx[0];var setDpCtx=_dpCtx[1];
  var freqCfg=DP_FREQ_MAP[freq]||DP_FREQ_MAP.diario;
  var blocos=freqCfg.blocos;
    var allItems=useMemo(function(){var raw=blocos.reduce(function(acc,b){return acc.concat(b.itens);},[]);return raw.filter(function(it){if(it.cond==='admissao'&&dpCtx.admissao!=='sim')return false;if(it.cond==='assinatura'&&dpCtx.assinatura!=='sim')return false;if(it.cond==='comunicado'&&dpCtx.comunicado!=='sim')return false;if(it.cond==='uniforme'&&dpCtx.uniforme!=='sim')return false;if(it.cond==='exame'&&dpCtx.exame!=='sim')return false;if(it.cond==='colaborador_trouxe'&&dpCtx.colaborador_trouxe!=='sim')return false;return true;});},[freq,dpCtx]);

  useEffect(function(){
    try{var s=JSON.parse(localStorage.getItem(DP_SAVE_KEY));if(s&&s.resps){setFreq(s.freq||'diario');setResps(s.resps||{});setNegs(s.negs||{});setHoraInicio(s.horaInicio||null);/* tela sempre começa em freq — banner de rascunho avisa o usuario */}}catch(e){}
  },[]);
  useEffect(function(){
    if(screen==='checklist'){try{localStorage.setItem(DP_SAVE_KEY,JSON.stringify({freq:freq,resps:resps,negs:negs,horaInicio:horaInicio}));}catch(e){}}
  },[resps,negs,screen,freq]);

  function onAns(id,val){setResps(function(r){return Object.assign({},r,{[id]:val});});if(val==='sim'){setNegs(function(n){var c=Object.assign({},n);delete c[id];return c;});}}
  function onNeg(id,updater){setNegs(function(n){var current=n[id]||{};var next=typeof updater==='function'?updater(current):updater;return Object.assign({},n,{[id]:next});});}
  function calcTempo(inicio){if(!inicio)return '';try{var parts=inicio.split(':');var now=new Date();var then=new Date();then.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);var diff=Math.round((now-then)/60000);if(diff<0||diff>480)return '';var h=Math.floor(diff/60);var m=diff%60;return h>0?h+'h '+(m>0?m+'min':''):(m+'min');}catch(e){return '';}}

/* ── CEO: linha expandível de turno da subgerência ── */
function SubgerCEORow(props){
  var d=props.d;
  var _o=useState(false);var open=_o[0];var setOpen=_o[1];
  var sc=d.score;var c=sc>=80?'var(--ok)':sc>=60?'#F59E0B':'var(--brand)';
  var st=d.status==='ok'?'Operação controlada':d.status==='atencao'?'Atenção':'Crítico';
  var stBg=st==='Operação controlada'?'#D1FAE5':st==='Atenção'?'#FEF3C7':'#FEE2E2';
  var stC=st==='Operação controlada'?'#065F46':st==='Atenção'?'#92400E':'#991B1B';
  var allSgItems=SUBGER_ETAPAS.reduce(function(a,e){return a.concat(e.itens);},[]);
  var etapasDef=[
    {titulo:'Abertura do Turno',ids:SUBGER_ETAPAS[0].itens.map(function(i){return i.id;})},
    {titulo:'Controle da Operação',ids:SUBGER_ETAPAS[1].itens.map(function(i){return i.id;})},

    <div style={{margin:'8px 16px 0',background:'#fff',borderRadius:12,border:'1px solid #E5E7EB',overflow:'hidden'}}>
      <div onClick={function(){setOpen(function(o){return !o;});}} style={{padding:'13px 14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,flexWrap:'wrap'}}>

            <span style={{fontSize:11,color:'var(--ink3)'}}>{d.data_fmt||d.data} · {d.hora}</span>
            <span style={{fontSize:11,fontWeight:700,color:'var(--ink2)'}}>{d.user_name}</span>
          </div>
          <div style={{display:'flex',gap:12,fontSize:11,color:'var(--ink2)',flexWrap:'wrap'}}>
            <span>✅ {d.total-(d.falhas||0)}/{d.total} OK</span>
            {(d.falhas||0)>0&&<span style={{color:'var(--danger)',fontWeight:600}}>❌ {d.falhas} falha{d.falhas>1?'s':''}</span>}
            {(d.pendencias||0)>0&&<span style={{color:'var(--warn)',fontWeight:600}}>⏳ {d.pendencias} pendência{d.pendencias>1?'s':''}</span>}

        </div>
      </div>

        <div style={{borderTop:'1px solid #F3F4F6',background:'#FAFAFA',padding:'12px 14px'}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:10}}>Etapas</div>

                      </div>

        </div>
      )}

  );
}

/* ══ CEO FEEDBACK — Camila comenta em turnos ══ */
async function sbUpsert(table,data,matchCol,matchVal){
  try{
    var{error}=await sb.from(table).upsert(data,{onConflict:matchCol});
    if(error)console.error('SB upsert error:',error);
    return !error;
  }catch(e){console.error('SB upsert error:',e);return false;}
}

function CEOFeedbackCard(props){
  var turno=props.turno;
  var pessoa=props.pessoa;
  var onClose=props.onClose;
  var _txt=useState('');var txt=_txt[0];var setTxt=_txt[1];
  var _loading=useState(false);var loading=_loading[0];var setLoading=_loading[1];
  var _ok=useState(false);var ok=_ok[0];var setOk=_ok[1];

  async function enviar(){
    if(!txt.trim())return;
    setLoading(true);
    try{
      await sbInsert('checkon_feedback_ceo',{
        login_destino:turno.login||pessoa.toLowerCase(),
        nome_destino:pessoa,
        login_ceo:'camila',
        turno_data:turno.data,
        turno_hora:turno.hora||'',
        tabela_origem:props.tabela||'',
        turno_id:turno.id||'',
        mensagem:txt.trim(),
        data_criacao:todayISO(),
        hora_criacao:nowTime(),
        lido:false
      });
      setOk(true);
      setTimeout(function(){onClose();},1400);
    }catch(e){console.error(e);}
    setLoading(false);
  }

  if(ok)return(
    <div style={{background:'#F0FDF4',border:'1.5px solid #BBF7D0',borderRadius:12,padding:'16px',textAlign:'center'}}>

    </div>
  );

  return(
    <div style={{background:'#fff',border:'1.5px solid #E5E7EB',borderRadius:14,padding:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div>
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800,color:'#111827'}}>Deixar recado para {pessoa}</div>

        </div>
        <button onClick={onClose} style={{background:'#F3F4F6',border:'none',borderRadius:8,padding:'6px 10px',fontSize:12,color:'#6B7280',cursor:'pointer',fontWeight:700}}>✕</button>

        style={{width:'100%',border:'1.5px solid #E5E7EB',borderRadius:10,padding:'11px 13px',fontSize:13,color:'#111',background:'#FAFAFA',resize:'none',minHeight:100,lineHeight:1.6,fontFamily:'inherit',outline:'none'}}
      />
      <div style={{display:'flex',gap:8,marginTop:10}}>
        <button onClick={onClose} style={{flex:1,padding:'10px',background:'transparent',color:'#9CA3AF',border:'1.5px solid #E5E7EB',borderRadius:8,fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,cursor:'pointer'}}>Cancelar</button>
        <button onClick={enviar} disabled={loading||!txt.trim()} style={{flex:2,padding:'10px',background:txt.trim()?'#EA1D2C':'#F3F4F6',color:txt.trim()?'#fff':'#9CA3AF',border:'none',borderRadius:8,fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,cursor:txt.trim()?'pointer':'not-allowed'}}>

/* Card que aparece nos hubs da equipe quando a Camila deixou um recado */
function FeedbackCEOCard(props){
  var login=props.login;
  var _feedbacks=useState([]);var feedbacks=_feedbacks[0];var setFeedbacks=_feedbacks[1];
  var _lido=useState({});var lido=_lido[0];var setLido=_lido[1];

  useEffect(function(){
    async function load(){
      try{
        var data=await sbSelect('checkon_feedback_ceo',{login_destino:login});
        var naoLidos=data.filter(function(f){return !f.lido;}).slice(0,3);
        setFeedbacks(naoLidos);
      }catch(e){}
    }
    load();
  },[login]);

  async function marcarLido(id){
    setLido(function(l){return Object.assign({},l,{[id]:true});});
    try{
      await sb.from('checkon_feedback_ceo').update({lido:true}).eq('id',id);
    }catch(e){}
  }

  if(feedbacks.length===0)return null;

  return(
    <div style={{margin:'10px 16px 0'}}>
      {feedbacks.filter(function(f){return !lido[f.id];}).map(function(f){return(
        <div key={f.id} style={{background:'#FFF7ED',border:'1.5px solid #FED7AA',borderRadius:14,padding:'14px 16px',marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:'#EA1D2C',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:900,color:'#fff',flexShrink:0}}>C</div>
            <div>
              <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:800,color:'#111827'}}>Recado da Camila</div>
              <div style={{fontSize:10,color:'#9CA3AF'}}>Sobre seu turno de {f.turno_data}</div>
            </div>
            <button onClick={function(){marcarLido(f.id);}} style={{marginLeft:'auto',background:'transparent',border:'none',fontSize:12,color:'#9CA3AF',cursor:'pointer',padding:'4px 8px',borderRadius:6,fontWeight:600}}>✓ Li</button>

        </div>
      );})}
    </div>
  );
}

function normSt(d){
  if(!d)return null;
  var s=d.status||'';
  if(s==='ok'||s==='conforme')return'ok';
  if(s==='critico'||s==='critico')return'critico';
  if(s==='atencao'||s==='aten\u00e7\u00e3o'||s==='ressalvas')return'atencao';
  if(d.criticos>0)return'critico';
  if(d.falhas>0)return'atencao';
  return'ok';
}
function normSc(d){
  if(!d)return null;
  if(d.score!=null)return d.score;
  if(d.falhas==null||d.total==null)return null;
  return Math.max(0,Math.round(100-(d.falhas/d.total*50)-(( d.criticos||0)*8)));
}
function stCor(st){return st==='ok'?'#16A34A':st==='atencao'?'#D97706':'#DC2626';}
function stLabel(st){return st==='ok'?'OK':st==='atencao'?'Aten\u00e7\u00e3o':'Cr\u00edtico';}

/* ══ CEOHub — nova arquitetura ══ */
function CEOHub(props){
  var user=props.user;var onLogout=props.onLogout;
  /* estado central: todos os dados carregam aqui uma vez */
  var _all=useState(null);var allData=_all[0];var setAllData=_all[1];
  var _loading=useState(true);var loading=_loading[0];var setLoading=_loading[1];
  var _view=useState('home');var view=_view[0];var setView=_view[1];
  var _tab=useState('overview');var tab=_tab[0];var setTab=_tab[1];
  var _psel=useState(0);var pessoaSel=_psel[0];var setPessoaSel=_psel[1];
  var _aiMsg=useState(null);var aiMsg=_aiMsg[0];var setAiMsg=_aiMsg[1];
  var _aiLoading=useState(false);var aiLoading=_aiLoading[0];var setAiLoading=_aiLoading[1];

  useEffect(function(){
    async function load(){
      setLoading(true);
      try{
        var sg=await sbSelectRecente('subger_checklists',90);
        var nt=await sbSelectRecente('subger_noite_checklists',90);
        var ger=await sbSelectRecente('ger_checklists',90);
        var dp=await sbSelectRecente('dp_checklists',90);
        var ck=await sbSelectRecente('checklists',90);
        var pend=await sbSelect('checkon_pendencias');
        var sugs=await sbSelect('dp_sugestoes');
        setAllData({sg:sg,nt:nt,ger:ger,dp:dp,ck:ck,pend:pend.filter(function(r){return r.status==='aberta';}),sugs:sugs});
      }catch(e){setAllData({sg:[],nt:[],ger:[],dp:[],ck:[],pend:[],sugs:[]});}
      setLoading(false);
    }
    load();
  },[]);

  /* ── dados derivados ── */
  var hoje=todayISO();
  var hojeStr=todayFmt();

  var pessoas=useMemo(function(){
    if(!allData)return[];
    return[
      {key:'sg',nome:'Gabriela',turno:'Manh\u00e3',emoji:'🌅',d:allData.sg.find(function(r){return r.data===hoje;})||null},
      {key:'nt',nome:'Vit\u00f3ria',turno:'Noite',emoji:'🌙',d:allData.nt.find(function(r){return r.data===hoje;})||null},
      {key:'ger',nome:'Derik',turno:'Ger\u00eancia',emoji:'🏢',d:allData.ger.find(function(r){return r.data===hoje;})||null},
      {key:'dp',nome:'Viviane',turno:'DP',emoji:'🗂️',d:(allData.dp.find(function(r){return r.data===hoje&&r.freq==='diario';})||null)},
    ];
  },[allData,hoje]);

  var insights=useMemo(function(){
    if(!allData)return{pendAbertas:0,criticosHoje:0,quedas:[],destaques:[],falhaMaisFreq:null};
    var pendAbertas=allData.pend.length;
    var criticosHoje=0;
    pessoas.forEach(function(p){if(p.d&&(p.d.criticos||0)>0)criticosHoje++;});
    /* tendência 7 dias — queda de score */
    var sete=new Date();sete.setDate(sete.getDate()-7);var seteStr=sete.toISOString().slice(0,10);
    var quedas=[];
    ['sg','nt'].forEach(function(k){
      var arr=k==='sg'?allData.sg:allData.nt;
      var recentes=arr.filter(function(r){return r.data>=seteStr;}).slice(0,7);
      if(recentes.length<3)return;
      var avg7=Math.round(recentes.reduce(function(a,b){return a+(b.score||0);},0)/recentes.length);
      var ultimos3=recentes.slice(0,3);
      var avg3=Math.round(ultimos3.reduce(function(a,b){return a+(b.score||0);},0)/ultimos3.length);
      var nome=k==='sg'?'Gabriela':'Vit\u00f3ria';
      if(avg3<avg7-8)quedas.push({nome:nome,avg7:avg7,avg3:avg3,diff:avg7-avg3});
      if(avg3>avg7+5)quedas.push({nome:nome,avg7:avg7,avg3:avg3,diff:-(avg3-avg7),positivo:true});
    });
    /* falha mais frequente últimos 7 dias */
    var contFalhas={};
    [].concat(allData.sg,allData.nt).filter(function(r){return r.data>=seteStr;}).forEach(function(r){
      var negs=r.negs||{};
      Object.keys(negs).forEach(function(id){if(negs[id]&&negs[id].aconteceu)contFalhas[negs[id].aconteceu]=(contFalhas[negs[id].aconteceu]||0)+1;});
    });
    var topFalha=Object.entries(contFalhas).sort(function(a,b){return b[1]-a[1];})[0]||null;
    return{pendAbertas:pendAbertas,criticosHoje:criticosHoje,quedas:quedas,falhaMaisFreq:topFalha?{texto:topFalha[0],count:topFalha[1]}:null};
  },[allData,pessoas]);

  var ranking=useMemo(function(){
    if(!allData)return[];
    var todos=[].concat(
      allData.sg.map(function(d){return{nome:d.user_name,score:d.score||0};}),
      allData.nt.map(function(d){return{nome:d.user_name,score:d.score||0};}),
      allData.ck.map(function(d){return{nome:d.user_name,score:d.score||0};})
    );
    var nomes=[];todos.forEach(function(d){if(nomes.indexOf(d.nome)<0&&d.nome)nomes.push(d.nome);});
    return nomes.map(function(n){
      var arr=todos.filter(function(x){return x.nome===n;});
      return{nome:n,avg:Math.round(arr.reduce(function(a,b){return a+b.score;},0)/arr.length),turnos:arr.length};
    }).sort(function(a,b){return b.avg-a.avg;}).slice(0,6);
  },[allData]);

  /* ── resumo IA ── */
  async function gerarResumo(){
    if(!allData)return;
    setAiLoading(true);setAiMsg(null);

      linhas.push('STATUS DE HOJE:');
      pessoas.forEach(function(p){
        var d=p.d;
        if(!d){linhas.push('- '+p.nome+' ('+p.turno+'): nao enviou ainda');}

        }
      });
      linhas.push('');
      linhas.push('Pendencias abertas: '+allData.pend.length);
      if(allData.pend.length>0){
        allData.pend.slice(0,5).forEach(function(p){
          linhas.push('  - '+p.user_name+': '+p.item_texto+' ('+p.data_fmt+')');
        });
      }
      if(insights.quedas.length>0){
        linhas.push('');linhas.push('TENDENCIAS (7 dias):');
        insights.quedas.forEach(function(q){
          linhas.push('- '+(q.positivo?'MELHORA':'QUEDA')+': '+q.nome+
            ', media 7d='+q.avg7+', ultimos 3 turnos='+q.avg3+
            ', variacao='+(q.positivo?'+':'')+(-q.diff));
        });
      }
      if(insights.falhaMaisFreq){
        linhas.push('');
        linhas.push('Falha mais recorrente (7 dias): "'+insights.falhaMaisFreq.texto+'" ('+insights.falhaMaisFreq.count+'x)');
      }
      if(ranking.length>0){
        linhas.push('');linhas.push('RANKING ATUAL:');
        ranking.slice(0,4).forEach(function(r,i){
          linhas.push((i+1)+'o '+r.nome+' - media '+r.avg+' ('+r.turnos+' turnos)');
        });
      }
      var contexto=linhas.join('\n');
      var resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:600,
          system:'Voce e o assistente de gestao da Camila, CEO do Pastel da Camilla. Com base nos dados operacionais fornecidos, escreva um resumo executivo curto e direto — maximo 4 frases. Formato: 1) o que esta bem hoje, 2) o que precisa de atencao imediata, 3) uma recomendacao pratica e especifica. Linguagem direta, como gerente experiente falando pra dona do negocio. Sem emojis. Sem titulos. Sem bullet points. Texto corrido.',
          messages:[{role:'user',content:contexto}]
        })
      });
      if(!resp.ok){
        var errText=await resp.text();
        throw new Error('HTTP '+resp.status+': '+errText.slice(0,200));
      }
      var data=await resp.json();
      var txt=(data.content&&data.content[0]&&data.content[0].text)||'';
      setAiMsg(txt||'Sem resposta da IA.');
    }catch(e){
      var msg=e.message||'';
      if(msg.indexOf('Failed to fetch')>=0||msg.indexOf('NetworkError')>=0||msg.indexOf('CORS')>=0){
        setAiMsg('A análise por IA está disponível quando o sistema está hospedado online (não funciona em arquivo local). Suba o arquivo no Netlify e o botão vai funcionar normalmente.');
      }else{
        setAiMsg('Erro ao gerar análise: '+msg.slice(0,120));

    setAiLoading(false);

  /* ── se ainda carregando ── */

    return(
      <div style={{minHeight:'100vh',background:'#F5F5F5',display:'flex',flexDirection:'column'}}>

        </div>

          <div style={{textAlign:'center'}}>
            <div className="spin" style={{margin:'0 auto 12px'}}/>

          </div>
        </div>
      </div>
    );
  }

  /* ── view: dashboard (9 abas herdadas) ── */
  if(view==='dashboard'){
    return(
      <CEODashboardNew
        user={user}

        onBack={function(){setView('home');}}

  /* ── view: pessoa individual ── */

  /* ── view: home ── */
  var pendAbertas=insights.pendAbertas;
  var criticosHoje=insights.criticosHoje;

  return(
    <div style={{minHeight:'100vh',background:'#F5F5F5',display:'flex',flexDirection:'column',paddingBottom:32}}>

      {/* HEADER */}
      <div style={{background:'#EA1D2C',padding:'28px 20px 20px',color:'#fff'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:'uppercase',opacity:.75,marginBottom:5}}>CheckON · Pastel da Camilla</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:24,fontWeight:900,letterSpacing:'-.3px'}}>{'Olá, '+user.name+'.'}</div>
            <div style={{fontSize:13,opacity:.8,marginTop:3}}>{hojeStr}</div>
          </div>
          <div style={{width:44,height:44,borderRadius:'50%',background:'rgba(255,255,255,.2)',border:'2px solid rgba(255,255,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:900,color:'#fff',flexShrink:0}}>

            var dot=!p.d?'rgba(255,255,255,.25)':st==='ok'?'#4ADE80':st==='atencao'?'#FCD34D':'#FCA5A5';

      </div>
    </div>
  );
}



/* ══ CEODashboardNew — dashboard completo herdado, paleta corrigida ══ */
function CEODashboardNew(props){

function CEOPessoaView(props){
  var allData=props.allData;var normSt=props.normSt;var normSc=props.normSc;var stCor=props.stCor;var stLabel=props.stLabel;var onBack=props.onBack;
  var _sel=useState(props.initialSel||0);var sel=_sel[0];var setSel=_sel[1];
  var _fbt=useState(null);var fbTarget=_fbt[0];var setFbTarget=_fbt[1];
  var pessoas=[
    {nome:'Gabriela',emoji:'🌅',data:allData.sg,turno:'Subger. Manhã',tabela:'subger_checklists',login:'gabriela'},
    {nome:'Vitória',emoji:'🌙',data:allData.nt,turno:'Subger. Noite',tabela:'subger_noite_checklists',login:'vitoria'},
    {nome:'Derik',emoji:'🏢',data:allData.ger,turno:'Gerência',tabela:'ger_checklists',login:'derik'},
    {nome:'Viviane',emoji:'🗂️',data:allData.dp,turno:'DP',tabela:'dp_checklists',login:'viviane'},
  ];
  var p=pessoas[sel];
  var ultimos=p.data.slice(0,10);
  var avg=ultimos.length>0?Math.round(ultimos.reduce(function(a,b){return a+(b.score||0);},0)/ultimos.length):null;
  var tendencia=ultimos.length>=3?(function(){var a3=Math.round(ultimos.slice(0,3).reduce(function(a,b){return a+(b.score||0);},0)/3);var a7=ultimos.length>=7?Math.round(ultimos.slice(0,7).reduce(function(a,b){return a+(b.score||0);},0)/Math.min(7,ultimos.length)):a3;return{a3:a3,a7:a7,delta:a3-a7};})():null;

  return(
    <div style={{minHeight:'100vh',background:'#F5F5F5',paddingBottom:32}}>
      <div style={{background:'#EA1D2C',color:'#fff',padding:'14px 16px',position:'sticky',top:0,zIndex:100}}>

          {pessoas.map(function(px,i){return(
            <button key={px.nome} onClick={function(){setSel(i);}} style={{padding:'6px 12px',borderRadius:99,fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:700,border:'1.5px solid '+(sel===i?'#fff':'rgba(255,255,255,.3)'),background:sel===i?'#fff':'transparent',color:sel===i?'#EA1D2C':'#fff',flexShrink:0,cursor:'pointer'}}>{px.nome}</button>
          );})}
        </div>
      </div>

      <div style={{padding:'14px 16px 0'}}>
        {/* Card de resumo */}
        <div style={{background:'#fff',border:'1.5px solid #E5E7EB',borderRadius:14,padding:'16px',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
            <div style={{fontSize:32}}>{p.emoji}</div>
            <div>
              <div style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:900,color:'#111827'}}>{p.nome}</div>
              <div style={{fontSize:12,color:'#6B7280'}}>{p.turno} · {p.data.length} turnos registrados</div>
            </div>
          </div>
          {avg!=null&&(
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              <div style={{textAlign:'center',background:'#F9FAFB',borderRadius:8,padding:'10px 4px'}}>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:900,color:avg>=80?'#16A34A':avg>=60?'#D97706':'#DC2626'}}>{avg}</div>
                <div style={{fontSize:10,color:'#9CA3AF',fontWeight:600,marginTop:2}}>Score médio</div>
              </div>
              {tendencia&&<div style={{textAlign:'center',background:'#F9FAFB',borderRadius:8,padding:'10px 4px'}}>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:900,color:tendencia.delta>0?'#DC2626':tendencia.delta<0?'#16A34A':'#6B7280'}}>{tendencia.delta>0?'↓':'↑'}{Math.abs(tendencia.delta)}</div>
                <div style={{fontSize:10,color:'#9CA3AF',fontWeight:600,marginTop:2}}>Tendência 3d</div>
              </div>}
              <div style={{textAlign:'center',background:'#F9FAFB',borderRadius:8,padding:'10px 4px'}}>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:900,color:'#111827'}}>{p.data.reduce(function(a,b){return a+(b.falhas||0);},0)}</div>

              </div>
            </div>

        {ultimos.length>0&&(function(){
          var fc={};ultimos.forEach(function(d){
            var ng=d.negs||{};
            Object.keys(ng).forEach(function(id){var n=ng[id];if(n&&n.aconteceu)fc[n.aconteceu]=(fc[n.aconteceu]||0)+1;});
          });
          var top=Object.entries(fc).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
          if(!top.length)return null;
          return(
            <div style={{background:'#fff',border:'1.5px solid #E5E7EB',borderRadius:12,padding:'14px 16px',marginBottom:12}}>
              <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:800,color:'#111827',marginBottom:10}}>Falhas mais frequentes</div>
              {top.map(function(x,i){return(
                <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:i<top.length-1?'1px solid #F3F4F6':'none'}}>
                  <span style={{fontSize:12,color:'#374151',flex:1,lineHeight:1.4}}>{x[0]}</span>
                  <span style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:900,color:'#EA1D2C',marginLeft:8}}>{x[1]}x</span>
                </div>
              );})}
            </div>
          );
        })()}
        {ultimos.length===0&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #E5E7EB',padding:'24px',textAlign:'center',color:'#9CA3AF',fontSize:13}}>Nenhum turno ainda.</div>}
        {ultimos.map(function(d,i){var sc=normSc(d);var st=normSt(d);return(
          <div key={d.id||i} style={{background:'#fff',border:'1px solid #E5E7EB',borderRadius:12,padding:'12px 14px',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <div style={{fontSize:12,color:'#6B7280'}}>{d.data_fmt||d.data}{d.hora?' · '+d.hora:''}</div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontFamily:"'Sora',sans-serif",fontSize:16,fontWeight:900,color:stCor(st)}}>{sc}</span>
                <span style={{background:st==='ok'?'#D1FAE5':st==='atencao'?'#FEF3C7':'#FEE2E2',color:st==='ok'?'#065F46':st==='atencao'?'#92400E':'#991B1B',borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{stLabel(st)}</span>
              </div>
            </div>
            <div style={{display:'flex',gap:12,fontSize:11,color:'#6B7280'}}>
              <span>✅ {(d.total||0)-(d.falhas||0)}/{d.total||0}</span>
              {(d.falhas||0)>0&&<span style={{color:'#DC2626',fontWeight:600}}>❌ {d.falhas} falha{d.falhas>1?'s':''}</span>}
              {(d.pendencias||0)>0&&<span style={{color:'#D97706',fontWeight:600}}>⏳ {d.pendencias}</span>}
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

function getMensagem(falhas,criticos){
  /* Rotaciona pelo dia do mês — muda todo dia, determinístico (mesma pessoa vê a mesma no mesmo dia) */
  var diaDoMes=new Date().getDate();
  var pool=criticos>0?MSGS_CRITICO:falhas===0?MSGS_PERFEITO:MSGS_BOM;
  return pool[diaDoMes % pool.length];
}

/* Busca pendências da manhã (subger_checklists) para a Vitória */
async function buscarPendenciasManhaParaNoite(){
  try{
    var hoje=todayISO();

    var q=sb.from('subger_checklists').select('*').eq('data',hoje).order('created_at',{ascending:false}).limit(5);
    var res=await q;

      return resps[id]==='nao'&&negs[id]&&(negs[id].prox==='Sim, fica pendente'||negs[id].prox==='Sim');
    });
    return{
      responsavel:turnoHoje.user_name||'Manhã',
      score:turnoHoje.score||0,
      pendencias:pendentes.length,
      horario:turnoHoje.hora||'',
    };
  }catch(e){return null;}
}

async function analisarHistorico(user, tabela, itensCriticos){
  var CACHE_KEY=getCacheKey(user.login);
  var hoje=todayISO();
  
  // Tenta cache local primeiro (válido por 4h)
  try{
    var cached=JSON.parse(localStorage.getItem(CACHE_KEY));
    if(cached&&cached.tabela===tabela&&cached.data===hoje&&cached.hora){
      var diff=(new Date()-new Date(hoje+'T'+cached.hora))/3600000;
      if(diff<4)return cached.resultado;
    }
  }catch(e){}

  // Busca Supabase
  var resultado={
    scoresMedio:0,
    streak:0,
    falhasFrequentes:[],
    alertas:[],
    ultimoTurno:null,
    totalRegistros:0,
  };

  try{
    var rows=await sbSelectRecente(tabela,90,{login:user.login});
    if(!rows||rows.length===0){
      // Salva cache vazio
      try{localStorage.setItem(CACHE_KEY,JSON.stringify({tabela,data:hoje,hora:nowTime(),resultado}));}catch(e){}
      return resultado;
    }

    resultado.totalRegistros=rows.length;
    resultado.ultimoTurno=rows[0];

    // Score médio últimos 7
    var ultimos7=rows.slice(0,7);
    var scores=ultimos7.map(function(r){return r.score||0;});
    resultado.scoresMedio=Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length);

    // Streak sem crítico
    var streak=0;
    for(var i=0;i<rows.length;i++){
      if((rows[i].criticos||0)===0)streak++;
      else break;
    }
    resultado.streak=streak;

    // Falhas frequentes: contar quais ids aparecem como 'nao' nos últimos 5 turnos
    var falhaCount={};
    rows.slice(0,5).forEach(function(row){
      var rs=row.resps||{};
      Object.keys(rs).forEach(function(id){
        if(rs[id]==='nao'){
          falhaCount[id]=(falhaCount[id]||0)+1;
        }
      });
    });

    // Items que falharam 2+ vezes nos últimos 5
    var frequentes=Object.entries(falhaCount)
      .filter(function(e){return e[1]>=2;})
      .sort(function(a,b){return b[1]-a[1];})
      .slice(0,3);
    
    // Mapear ids para textos
    resultado.falhasFrequentes=frequentes.map(function(entry){
      var id=entry[0];var count=entry[1];
      var item=itensCriticos&&itensCriticos.find(function(it){return it.id===id;});
      return{id:id,texto:item?item.texto:id,vezes:count};
    });

    // Alertas baseados em padrão
    resultado.alertas=[];
    if(resultado.falhasFrequentes.length>0){
      resultado.falhasFrequentes.forEach(function(f){
        resultado.alertas.push({
          tipo:'falha_frequente',
          msg:'"'+f.texto+'" falhou '+f.vezes+'x nos últimos 5 turnos.',
          icone:'🔁'
        });
      });
    }
    if(resultado.streak>=5){
      resultado.alertas.push({tipo:'conquista',msg:resultado.streak+' turnos seguidos sem item crítico! 🔥',icone:'🏆'});
    }
    if(resultado.scoresMedio<70&&resultado.totalRegistros>=3){
      resultado.alertas.push({tipo:'atencao',msg:'Score médio abaixo de 70 nos últimos 7 turnos.',icone:'⚠️'});
    }

    // Salva cache
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({tabela,data:hoje,hora:nowTime(),resultado}));}catch(e){}

  }catch(err){
    // Fallback: usa localStorage de registros locais se disponível
    try{
      var localKey='checkon_hist_'+user.login+'_'+tabela;
      var local=JSON.parse(localStorage.getItem(localKey)||'[]');
      if(local.length>0){
        resultado.totalRegistros=local.length;
        resultado.ultimoTurno=local[0];
        var sc=local.slice(0,7).map(function(r){return r.score||0;});
        resultado.scoresMedio=Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length);
      }
    }catch(e2){}
  }

  return resultado;
}

/* ── Etapa por etapa (paginação de blocos) ── */
function SubgerChecklistScreen(props){
  var user=props.user;var onLogout=props.onLogout;var onBack=props.onBack;
  var SAVE_KEY=SUBGER_SAVE_KEY_PREFIX+user.login;
  var _sc=useState('inicio');var screen=_sc[0];var setScreen=_sc[1];
  var _etapaIdx=useState(0);var etapaIdx=_etapaIdx[0];var setEtapaIdx=_etapaIdx[1];
  var _resps=useState({});var resps=_resps[0];var setResps=_resps[1];
  var _negs=useState({});var negs=_negs[0];var setNegs=_negs[1];
  var _showErr=useState(false);var showErr=_showErr[0];var setShowErr=_showErr[1];
  var _sending=useState(false);var sending=_sending[0];var setSending=_sending[1];
  var _toast=useToast();var toast=_toast[0];var showToast=_toast[1];
  var _inicio=useState(null);var horaInicio=_inicio[0];var setHoraInicio=_inicio[1];
  var _sug=useState({});var sugestao=_sug[0];var setSugestao=_sug[1];
  var _sugOpen=useState(false);var sugestaoAberta=_sugOpen[0];var setSugestaoAberta=_sugOpen[1];
  var _enviado=useState(false);var enviado=_enviado[0];var setEnviado=_enviado[1];
  var _envScore=useState(0);var envScore=_envScore[0];var setEnvScore=_envScore[1];

  useEffect(function(){
    try{
      var s=JSON.parse(localStorage.getItem(SAVE_KEY));
      if(s&&s.resps&&Object.keys(s.resps).length>0){
        setResps(s.resps||{});setNegs(s.negs||{});setHoraInicio(s.horaInicio||null);
        if(s.sugestao)setSugestao(s.sugestao);
      }
    }catch(e){}
  },[]);

  useEffect(function(){
    if(screen==='checklist'){
      try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio,sugestao:sugestao}));}catch(e){}
    }
  },[resps,negs,screen,horaInicio,sugestao]);

  function onAns(id,val){
    setResps(function(r){return Object.assign({},r,{[id]:val});});
    if(val==='sim'){setNegs(function(n){var c=Object.assign({},n);delete c[id];return c;});}
  }
  function onNeg(id,updater){
    setNegs(function(n){var current=n[id]||{};var next=typeof updater==='function'?updater(current):updater;return Object.assign({},n,{[id]:next});});
  }

  var allItems=useMemo(function(){return SUBGER_ETAPAS.reduce(function(acc,e){return acc.concat(e.itens);},[]);},[]);
  var totalItems=allItems.length;
  var respondidos=allItems.filter(function(i){return resps[i.id];}).length;
  var falhasTotal=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
  var pct=totalItems>0?Math.round(respondidos/totalItems*100):0;

  var etapaAtual=SUBGER_ETAPAS[etapaIdx];

  function validateEtapa(idx){
    var etapa=SUBGER_ETAPAS[idx];
    var errs=[];
    etapa.itens.forEach(function(item){
      if(!resps[item.id]){errs.push(item.texto);return;}
      if(resps[item.id]==='nao'&&!validateSubgerNeg(negs[item.id])){errs.push(item.texto+' — complete o registro');}
    });
    return errs;
  }

  function handleAvancar(){
    var errs=validateEtapa(etapaIdx);
    if(errs.length>0){setShowErr(true);window.scrollTo({top:0,behavior:'smooth'});showToast('⚠ Preencha todos os itens');return;}
    setShowErr(false);
    if(etapaIdx<SUBGER_ETAPAS.length-1){
      setEtapaIdx(function(i){return i+1;});
      window.scrollTo({top:0,behavior:'smooth'});
    }else{
      setScreen('ocorrencias');
      window.scrollTo({top:0,behavior:'smooth'});
    }
  }

  function handleVoltar(){
    if(etapaIdx>0){setEtapaIdx(function(i){return i-1;});window.scrollTo({top:0,behavior:'smooth'});}
    else{setScreen('inicio');}
    setShowErr(false);
  }

  async function handleFinalizar(relato){
    setSending(true);
    var criticos=allItems.filter(function(i){return i.critico&&resps[i.id]==='nao';}).length;
    var falhas=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
    var pendencias=allItems.filter(function(i){var n=negs[i.id]||{};return resps[i.id]==='nao'&&n.prox==='Sim, fica pendente';}).length;
    var statusKey=criticos>0?'critico':falhas>0?'atencao':'ok';
    var score=Math.max(0,Math.round(100-(falhas/totalItems*50)-(criticos*8)));
    var etapasConcluidas=SUBGER_ETAPAS.filter(function(e){return e.itens.every(function(i){return resps[i.id];});}).length;
    var ok=await sbInsert('subger_checklists',{login:user.login,user_name:user.name,turno:'manha',data:todayISO(),data_fmt:todayFmt(),hora:nowTime(),hora_inicio:horaInicio,score:score,total:totalItems,falhas:falhas,criticos:criticos,pendencias:pendencias,status:statusKey,etapas_concluidas:etapasConcluidas,resps:resps,negs:negs,relato:relato||'',sugestao:(sugestao&&sugestao.atividade?sugestao:{})});
    if(!ok){setSending(false);showToast('❌ Erro ao salvar. Verifique sua conexão e tente novamente.');return;}
    await salvarPendencias(allItems,negs,resps,user,'manha','subger_checklists');
    await sendWebhookComAviso(SISTEMA+' — SUBGERÊNCIA MANHÃ\n'+user.name+' · '+todayFmt()+'\nStatus: '+statusKey.toUpperCase()+' · Score: '+score+'/100',{assunto:'[CheckON Subgerência] '+statusKey.toUpperCase()+' – '+user.name},showToast);
    try{localStorage.removeItem(SAVE_KEY);}catch(e){}
    setEnvScore(score);setEnviado(true);
    setTimeout(function(){setSending(false);setEnviado(false);setScreen('summary');},2200);
  }

  function handleLimpar(){
    if(!window.confirm('Limpar checklist atual?'))return;
    try{localStorage.removeItem(SAVE_KEY);}catch(e){}
    setResps({});setNegs({});setShowErr(false);setEtapaIdx(0);setHoraInicio(null);setSugestao({});setSugestaoAberta(false);setScreen('inicio');
  }

  var subgerHdr=(
    <div style={{background:'var(--brand)',color:'#fff',height:52,padding:'0 16px',display:'flex',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
      <div style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:9,opacity:.7,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>CheckON · Subgerência</div>
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:800}}>Turno da Manhã</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          
          {onBack&&<button className="hdr-btn" onClick={function(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio,data:todayISO()}));}catch(e){}onBack();}}>← Voltar</button>}
          
        </div>
      </div>
    </div>
  );

  if(screen==='summary'){
    return<SubgerSummaryScreen resps={resps} negs={negs} user={user} horaInicio={horaInicio} onBack={onBack} onLogout={onLogout} onNovo={function(){setResps({});setNegs({});setShowErr(false);setEtapaIdx(0);setHoraInicio(null);setScreen('inicio');}}/>;
  }

  if(screen==='ocorrencias'){
    var falhasItems=allItems.filter(function(i){return resps[i.id]==='nao';});
    return(
      <div style={{minHeight:'100vh',background:'#F4F4F6',paddingBottom:24}}>
        {subgerHdr}
        <div style={{maxWidth:720,margin:'0 auto',padding:'16px'}}>
          <div style={{background:'#fff',borderRadius:12,border:'1px solid #E5E7EB',padding:'18px',marginBottom:12}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:900,marginBottom:4}}>{falhasItems.length===0?'🎉 Turno impecável!':'📋 Resumo final'}</div>
            <div style={{fontSize:13,color:'var(--ink2)',marginBottom:12}}>{respondidos} de {totalItems} itens respondidos · {falhasTotal} {falhasTotal===1?'falha':'falhas'}</div>
            {falhasItems.length>0&&(
              <div style={{marginBottom:12}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'var(--ink)',marginBottom:6}}>Observações finais do turno (opcional)</label>
                <SubgerRelatoField onFinalizar={handleFinalizar}/>
              </div>
            )}
            {falhasItems.length===0&&<button onClick={function(){handleFinalizar('');}} style={{width:'100%',padding:15,background:'var(--brand)',color:'#fff',borderRadius:12,fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:700,cursor:'pointer',border:'none'}}>🚀 Enviar relatório</button>}
          </div>
          <button onClick={function(){setScreen('checklist');setShowErr(false);}} style={{width:'100%',padding:11,background:'transparent',color:'var(--ink3)',borderRadius:12,fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB'}}>← Revisar checklist</button>
        </div>
      </div>
    );
  }

  /* ── Início ── (estado de entrada, imediatamente vai para checklist) */
  var rascunhoSalvo=(function(){try{var s=JSON.parse(localStorage.getItem(SAVE_KEY));return s&&s.resps&&Object.keys(s.resps).length>0?s:null;}catch(e){return null;}})();

  if(screen==='inicio'){
    /* Auto-avança para o checklist com a hora de início definida */
    if(!horaInicio)setHoraInicio(nowTime());
    setEtapaIdx(0);setShowErr(false);setScreen('checklist');
    return null;
  }


  /* ── Checklist por etapa ── */
  return(
    <div>
      <EnviadoPopup show={enviado} user={user} score={envScore} label='Subgerência Manhã'/>
      {sending&&!enviado&&<div className="overlay"><div className="overlay-card"><div className="spin"/><div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:800}}>Salvando...</div></div></div>}
      <Toast msg={toast.msg} show={toast.show}/>
      {subgerHdr}
      <div className="prog-card">
        <div className="prog-top"><div className="prog-lbl">Progresso geral</div><div className="prog-pct">{pct}%</div></div>
        <div className="prog-track"><div className="prog-fill" style={{width:pct+'%',background:'var(--brand)'}}/></div>
        <div className="prog-stats">
          <div><div className="pv" style={{color:'var(--ok)'}}>{respondidos}</div><div className="pl">Resp.</div></div>
          <div><div className="pv" style={{color:'var(--ink3)'}}>{totalItems-respondidos}</div><div className="pl">Pend.</div></div>
          <div><div className="pv" style={{color:'var(--brand)'}}>{falhasTotal}</div><div className="pl">Falhas</div></div>
          <div><div className="pv" style={{color:'var(--brand)'}}>{SUBGER_ETAPAS.length}</div><div className="pl">Etapas</div></div>
        </div>
      </div>
      <div style={{margin:'10px 16px 0',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'var(--surface)',borderRadius:'var(--r12)',border:'1px solid var(--line)'}}>
        <div>
          <div style={{fontSize:12,color:'var(--ink3)',fontWeight:600}}>Etapa {etapaIdx+1} de {SUBGER_ETAPAS.length}</div>
          {etapaAtual.horario&&<div style={{fontSize:11,color:'var(--brand)',fontWeight:700,marginTop:1}}>🕐 {etapaAtual.horario}</div>}
        </div>
        <div style={{display:'flex',gap:4}}>
          {SUBGER_ETAPAS.map(function(e,i){var done=e.itens.every(function(it){return resps[it.id];});return(<div key={e.id} style={{width:28,height:6,borderRadius:3,background:i===etapaIdx?'var(--brand)':done?'var(--ok)':'var(--line)',transition:'background .2s'}}/>);})}
        </div>
      </div>
      <SubgerEtapaAcc etapa={etapaAtual} resps={resps} negs={negs} onAns={onAns} onNeg={onNeg} showErr={showErr}/>
      <SugestaoForm data={sugestao} onChange={setSugestao} aberto={sugestaoAberta} onAbrir={function(){setSugestaoAberta(true);}} onFechar={function(){setSugestaoAberta(false);}} cor="var(--brand)"/>
      {(function(){
        var pendentesEtapa=etapaAtual.itens.filter(function(i){if(!resps[i.id])return true;if(resps[i.id]==='nao'&&!validateSubgerNeg(negs[i.id]))return true;return false;}).length;
        var etapaOk=pendentesEtapa===0;
        return(
          <div className="fab">
            <div className="fab-inner">
              {etapaIdx>0&&<button onClick={handleVoltar} style={{flexShrink:0,padding:'10px 13px',borderRadius:'var(--r8)',background:'var(--surface2)',border:'1.5px solid var(--line)',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:'var(--ink2)',cursor:'pointer',whiteSpace:'nowrap'}}>← Voltar</button>}
              {etapaIdx===0&&<button onClick={function(){if(onBack)onBack();else handleVoltar();}} style={{flexShrink:0,padding:'10px 13px',borderRadius:'var(--r8)',background:'var(--surface2)',border:'1.5px solid var(--line)',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:'var(--ink2)',cursor:'pointer',whiteSpace:'nowrap'}}>← Início</button>}
              <button className="fab-send" onClick={handleAvancar} disabled={sending} style={{opacity:etapaOk?1:.45,background:etapaOk?'var(--brand)':'var(--ink3)',boxShadow:etapaOk?'var(--sh-brand)':'none',transition:'all .2s'}}>
                {etapaOk
                  ?(etapaIdx<SUBGER_ETAPAS.length-1?'Próxima etapa →':'Finalizar turno 🚀')
                  :(pendentesEtapa+' item'+(pendentesEtapa>1?'s':'')+' pendente'+(pendentesEtapa>1?'s':''))}
              </button>
              <button onClick={function(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio,data:todayISO()}));}catch(e){}showToast('📝 Rascunho salvo.');setTimeout(function(){if(onBack)onBack();},700);}} style={{flexShrink:0,padding:'10px 13px',borderRadius:'var(--r8)',background:'var(--surface2)',border:'1.5px solid var(--line)',fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:700,color:'var(--ink2)',cursor:'pointer',whiteSpace:'nowrap'}}>⏸ Depois</button>
            </div>
          </div>
        );
      })()}
      <div style={{height:90}}/>
    </div>
  );

/* ══════════════════════════════════════════════
   HISTÓRICO PESSOAL — compartilhado por todos
   ══════════════════════════════════════════════ */
function HistoricoPanel(props){
  var user=props.user;var tabela=props.tabela;var labelTurno=props.labelTurno||function(d){return d.turno||d.freq||'–';};
  var _data=useState([]);var data=_data[0];var setData=_data[1];
  var _loading=useState(true);var loading=_loading[0];var setLoading=_loading[1];
  useEffect(function(){
    async function load(){
      setLoading(true);
      var rows=await sbSelectRecente(tabela,90,{login:user.login});
      setData(rows.slice(0,14));
      setLoading(false);
    }
    load();
  },[]);
  if(loading)return(<div style={{padding:'24px',textAlign:'center',color:'var(--ink3)',fontSize:13}}><div className="spin" style={{margin:'0 auto 10px'}}/> Carregando histórico...</div>);
  if(data.length===0)return(<div style={{padding:'24px',textAlign:'center',color:'var(--ink3)',fontSize:13,background:'#fff',borderRadius:'var(--r12)',border:'1px solid var(--line)',margin:'12px 16px 0'}}>Nenhum registro ainda. Complete seu primeiro turno!</div>);
  var ultimo=data[0];var penultimo=data[1];
  var streak=0;for(var i=0;i<data.length;i++){if((data[i].criticos||0)===0)streak++;else break;}
  var falhaMap={};data.forEach(function(d){var rs=d.resps||{};var ng=d.negs||{};Object.keys(rs).forEach(function(id){if(rs[id]==='nao'){var texto=(ng[id]&&ng[id].aconteceu)||id;falhaMap[texto]=(falhaMap[texto]||0)+1;}});});
  var topFalha=Object.entries(falhaMap).sort(function(a,b){return b[1]-a[1];})[0];
  var diff=penultimo?ultimo.falhas-penultimo.falhas:null;
  var statusCor=ultimo.status==='ok'||ultimo.status==='conforme'?'var(--ok)':ultimo.status==='atencao'||ultimo.status==='ressalvas'?'var(--warn)':'var(--danger)';
  return(
    <div style={{paddingBottom:16}}>
      <div style={{margin:'12px 16px 0',background:'#EA1D2C',borderRadius:'var(--r12)',padding:'16px',color:'#fff'}}>
        <div style={{fontSize:10,opacity:.7,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Sua evolução</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
          <div style={{textAlign:'center'}}><div style={{fontFamily:"'Sora',sans-serif",fontSize:26,fontWeight:900}}>{ultimo.score}</div><div style={{fontSize:10,opacity:.7}}>Último score</div></div>
          <div style={{textAlign:'center'}}><div style={{fontFamily:"'Sora',sans-serif",fontSize:26,fontWeight:900}}>{streak}</div><div style={{fontSize:10,opacity:.7}}>Sem crítico 🔥</div></div>
          <div style={{textAlign:'center'}}><div style={{fontFamily:"'Sora',sans-serif",fontSize:26,fontWeight:900}}>{data.length}</div><div style={{fontSize:10,opacity:.7}}>Registros</div></div>
        </div>
        {diff!==null&&<div style={{fontSize:12,opacity:.85,marginBottom:6}}>{diff<0?'📈 Você melhorou! '+Math.abs(diff)+' falha'+(Math.abs(diff)!==1?'s':'')+ ' a menos que antes.':diff===0?'➡️ Mesmo número de falhas que antes.':'📉 Mais '+diff+' falha'+(diff!==1?'s':'')+' que antes. Você consegue melhorar!'}</div>}
        {topFalha&&topFalha[1]>1&&<div style={{fontSize:11,opacity:.8,background:'rgba(255,255,255,.12)',borderRadius:'var(--r8)',padding:'7px 10px'}}>⚠️ Falha mais frequente: <strong>{topFalha[0]}</strong> ({topFalha[1]}x)</div>}
        {streak>=5&&<div style={{fontSize:11,opacity:.9,marginTop:8,background:'rgba(255,255,255,.15)',borderRadius:'var(--r8)',padding:'7px 10px'}}>🏆 {streak} turnos sem nenhum item crítico! Continue assim.</div>}

          var stBg=st==='OK'?'#D1FAE5':st==='Atenção'?'#FEF3C7':'#FEE2E2';
          var stC=st==='OK'?'#065F46':st==='Atenção'?'#92400E':'#991B1B';
          return(
            <div key={d.id||i} style={{padding:'11px 14px',borderBottom:'1px solid var(--line2)',display:'flex',alignItems:'center',gap:10}}>

        })}

    </div>
  );
}
