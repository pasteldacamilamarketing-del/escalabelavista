function gerarMes(yr,mo,folgasDomingo){
  const WDS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
  const daysInMonth=new Date(yr,mo,0).getDate()
  const dias=[]
  let _gid=Date.now()
  const gmk=(r,p)=>({id:'g'+(++_gid),role:r,person:p,obs:'',status:'pending',faltaTipo:null})

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const jsDay=new Date(dateStr+'T12:00:00').getDay()
    const wd=WDS[jsDay]
    const folgandoDom=(folgasDomingo&&folgasDomingo[dateStr])||[]
    const padrao=ESCALA_PADRAO[jsDay]
    if(!padrao)continue

    if(jsDay===1){
      // Segunda: só Iolete
      dias.push({date:dateStr,wd,jsDay,manha:[gmk('Limpeza','Iolete')],noite:[]})
      continue
    }

    const filtrar=arr=>arr
      .filter(([role,pessoa])=>{
        const folgas=FOLGAS_FIXAS_JS[pessoa]||[]
        if(folgas.includes(jsDay))return false
        if(jsDay===0&&folgandoDom.includes(pessoa))return false
        return true
      })
      .map(([role,pessoa])=>gmk(role,pessoa))

    const manha=filtrar(padrao.manha)
    const noite=filtrar(padrao.noite)
    if(manha.length>0||noite.length>0)
      dias.push({date:dateStr,wd,jsDay,manha,noite})
  }
  return dias
}

// ── Modal de geração automática do próximo mês (só admin) ──
function showGerarMesModal(){
  document.getElementById('geramodal')?.remove()
  let nextMo=G.viewMonth+1,nextYr=G.viewYear
  if(nextMo>12){nextMo=1;nextYr++}
  const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  const mesLabel=MESES[nextMo-1]+' '+nextYr
  const daysInMonth=new Date(nextYr,nextMo,0).getDate()
  const domingos=[]
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${nextYr}-${String(nextMo).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    if(new Date(ds+'T12:00:00').getDay()===0) domingos.push(ds)
  }
  // Pessoas com direito a folga de domingo (Suelen só quinta, não tem dom)
  const PESSOAS_DOM=['Bruna','David','Derik','Gabriela','Iolete','Isabelly','Íris','Julia','Larissa','Letícia','Lucca','Luis','Táis','Túlio','Victor','Vitória','Wirislaine']
  const domOpts=domingos.map(ds=>{
    const dn=String(parseInt(ds.split('-')[2])).padStart(2,'0')
    return`<option value="${ds}">${dn}/${ds.split('-')[1]}</option>`
  }).join('')
  const pessoasRows=PESSOAS_DOM.map(p=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)">
      <span style="flex:1;font-size:14px;font-weight:700;color:var(--g900)">${esc(p)}</span>
      <select id="fdom-${p}" style="border:1.5px solid var(--g200);border-radius:7px;padding:5px 8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--g700)">
        <option value="">— sem folga dom —</option>
        ${domOpts}
      </select>
    </div>`).join('')
  const m=document.createElement('div');m.id='geramodal'
  m.innerHTML=`<div class="modal-bg" id="gerabg">
    <div class="modal-card" style="max-width:460px">
      <div class="modal-head"><div class="modal-title">📅 Gerar ${mesLabel}</div><button class="modal-close" id="geraclose">✕</button></div>
      <div class="modal-body" style="padding:0">
        <div style="padding:12px 18px;background:var(--g50);border-bottom:1px solid var(--g100);font-size:13px;color:var(--g700);line-height:1.6">
          Defina a <b>folga de domingo</b> de cada pessoa em ${mesLabel}.<br/>
          Cada um tem direito a <b>1 domingo de folga</b> no mês.
        </div>
        <div style="padding:0 18px 4px;max-height:50vh;overflow-y:auto">${pessoasRows}</div>
        <div style="padding:14px 18px;border-top:1px solid var(--g100);display:flex;gap:10px">
          <button class="unif-btn unif-btn-cancel" id="geracancel">Cancelar</button>
          <button class="unif-btn" id="gerago" style="flex:1;background:var(--red);color:#fff;border:none;border-radius:11px;padding:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer">📅 Gerar escala</button>
        </div>
      </div>
    </div>
  </div>`
  document.body.appendChild(m)
  document.getElementById('geraclose').onclick=()=>m.remove()
  document.getElementById('geracancel').onclick=()=>m.remove()
  document.getElementById('gerabg').onclick=ev=>{if(ev.target===ev.currentTarget)m.remove()}
  document.getElementById('gerago').onclick=()=>{
    const folgasDomingo={}
    PESSOAS_DOM.forEach(p=>{
      const sel=document.getElementById('fdom-'+p)
      if(sel&&sel.value){
        if(!folgasDomingo[sel.value])folgasDomingo[sel.value]=[]
        folgasDomingo[sel.value].push(p)
      }
    })
    const diasGerados=gerarMes(nextYr,nextMo,folgasDomingo)
    if(!diasGerados.length){toast('Nenhum dia gerado.','error');return}
    const prefixo=`${nextYr}-${String(nextMo).padStart(2,'0')}`
    const jaExiste=G.days.some(d=>d.date.startsWith(prefixo))
    if(jaExiste&&!confirm(`Já existe escala para ${mesLabel}. Substituir?`))return
    if(jaExiste)G.days=G.days.filter(d=>!d.date.startsWith(prefixo))
    G.days=[...G.days,...diasGerados].sort((a,b)=>a.date.localeCompare(b.date))
    G.days.forEach(d=>{dayMap[d.date]=d})
    save()
    G.viewYear=nextYr;G.viewMonth=nextMo;G.selectedDate=null
    m.remove();render()
    toast(`${mesLabel} gerado — ${diasGerados.length} dias!`,'success')
  }
}

// ================================================================
// HISTÓRICO DE PERFORMANCE (só admin)
// ================================================================
// Agrega faltas e ocorrências registradas nos dados da escala.
// Fonte: G.days — lê status 'absent' e faltaTipo de cada entrada.
// ================================================================

// ── Modal de performance da equipe (só admin) ──
function showPerformanceModal(){
  document.getElementById('perfmodal')?.remove()
  const stats={}
  G.days.forEach(d=>{
    ;[...d.manha,...d.noite].forEach(e=>{
      if(!e.person)return
      if(!stats[e.person])stats[e.person]={just:0,injust:0,ocorr:0,trabalhados:0,escalados:0}
      stats[e.person].escalados++
      if(e.status==='absent'){
        if(e.faltaTipo==='just')stats[e.person].just++
        else if(e.faltaTipo==='ocorrencia')stats[e.person].ocorr++
        else stats[e.person].injust++
      } else {
        stats[e.person].trabalhados++
      }
    })
  })
  const pessoas=Object.entries(stats).sort((a,b)=>(b[1].just+b[1].injust)-(a[1].just+a[1].injust))
  const rows=pessoas.map(([nome,s])=>{
    const totalF=s.just+s.injust
    const pct=s.escalados>0?Math.round((s.trabalhados/s.escalados)*100):100
    const cor=totalF===0?'var(--ok)':totalF<=1?'var(--pend)':'var(--abs)'
    return`<div style="padding:10px 0;border-bottom:1px solid var(--g100)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="flex:1;font-size:14px;font-weight:800;color:var(--g900)">${esc(nome)}</span>
        <span style="font-size:12px;font-weight:800;color:${cor}">${totalF===0?'✓ Sem faltas':totalF+' falta'+(totalF>1?'s':'')}</span>
      </div>
      <div style="display:flex;gap:8px;font-size:11px;color:var(--g400);margin-bottom:5px;flex-wrap:wrap">
        <span>📅 ${s.escalados} escalados</span>
        <span>✓ ${s.trabalhados} presentes</span>
        ${s.just?`<span style="color:#E65100">📋 ${s.just} justif.</span>`:''}
        ${s.injust?`<span style="color:var(--abs)">🚨 ${s.injust} injustif.</span>`:''}
        ${s.ocorr?`<span style="color:var(--pend)">⚠️ ${s.ocorr} ocorr.</span>`:''}
      </div>
      <div style="background:var(--g100);border-radius:4px;height:5px;overflow:hidden">
        <div style="width:${Math.max(4,pct)}%;height:100%;background:${cor};border-radius:4px"></div>
      </div>
      <div style="font-size:10px;color:var(--g300);margin-top:2px;text-align:right">${pct}% presença</div>
    </div>`
  }).join('')
  const m=document.createElement('div');m.id='perfmodal'
  m.innerHTML=`<div class="modal-bg" id="perfbg">
    <div class="modal-card" style="max-width:460px">
      <div class="modal-head"><div class="modal-title">📊 Performance da Equipe</div><button class="modal-close" id="perfclose">✕</button></div>
      <div class="modal-body" style="padding:0">
        <div style="padding:10px 18px;background:var(--g50);border-bottom:1px solid var(--g100);font-size:12px;color:var(--g400)">
          Baseado nos registros de falta e ocorrência da escala atual.
        </div>
        <div style="padding:0 18px;max-height:60vh;overflow-y:auto">
          ${rows||'<div style="padding:20px;text-align:center;color:var(--g400)">Nenhum registro ainda.</div>'}
        </div>
      </div>
    </div>
  </div>`
  document.body.appendChild(m)
  document.getElementById('perfclose').onclick=()=>m.remove()
  document.getElementById('perfbg').onclick=ev=>{if(ev.target===ev.currentTarget)m.remove()}
}

init()
</script>
