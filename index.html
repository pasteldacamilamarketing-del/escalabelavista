<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Pastel da Camila – Escala Abril</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
/*
  ANTI-BRANCO: html/body têm background antes de qualquer JS.
  window.onerror exibe mensagem de erro na tela.
  Cache v6 — incrementar ao mudar estrutura de dados.
*/
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#EA1D2C;--red2:#C0121F;--red-bg:#FFF0F1;
  --g50:#F7F7F7;--g100:#F0F0F0;--g200:#E0E0E0;--g300:#BDBDBD;
  --g400:#9E9E9E;--g700:#424242;--g900:#212121;
  --ok:#27AE60;--ok-bg:#E8F5E9;
  --pend:#F39C12;--pend-bg:#FFF8E1;
  --abs:#E74C3C;--abs-bg:#FFEBEE;
  --manha:#F9A825;--manha-bg:#FFFDE7;--manha-b:#FFE082;
  --noite:#5E35B1;--noite-bg:#F3E5F5;--noite-b:#CE93D8;
  --panel-w:420px;
}
html,body{min-height:100vh;background:var(--g50);color:var(--g900)}
body{font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none}
input{font-family:'Nunito',sans-serif;outline:none}
#app{min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  height:58px;background:var(--red);
  display:flex;align-items:center;padding:0 18px;gap:14px;
  box-shadow:0 2px 16px rgba(234,29,44,.35)
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-logo{height:42px;width:42px;object-fit:contain;filter:drop-shadow(0 1px 6px rgba(0,0,0,.3))}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#fff;line-height:1.1}
.brand-sub{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.topbar-mid{flex:1;text-align:center;font-size:13px;color:rgba(255,255,255,.85);font-weight:700}
.topbar-mid b{color:#fff}
.top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tbtn-white{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:9px;padding:6px 12px;color:#fff;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;transition:background .15s}
.tbtn-white:hover,.tbtn-white:active{background:rgba(255,255,255,.28)}
.av{width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);min-width:200px;padding:6px;z-index:400;animation:fadeIn .2s ease}
.ddi{display:flex;align-items:center;gap:8px;width:100%;padding:11px 14px;border-radius:8px;background:none;border:none;font-size:14px;font-weight:700;color:var(--g700);cursor:pointer;text-align:left;font-family:'Nunito',sans-serif}
.ddi:hover{background:var(--g50)}
.ddi.danger{color:var(--red);background:var(--red-bg)}
.ddi.red{color:var(--red)}
.dd-div{height:1px;background:var(--g100);margin:4px 0}
.ov{position:fixed;inset:0;z-index:300}

/* ── LAYOUT PRINCIPAL ── */
.main-layout{
  position:relative;
  min-height:calc(100vh - 58px);
}

/* ── ÁREA DO CALENDÁRIO ── */
.cal-area{
  padding:20px 18px 40px;
  transition:margin-right .3s ease;
}
/* Quando painel aberto: empurra calendário pra esquerda */
.cal-area.panel-open{
  margin-right:var(--panel-w);
}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--g900);letter-spacing:.3px}
.cal-sub{font-size:13px;color:var(--g400);font-weight:600;margin-top:2px}
.cal-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cta-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;font-size:13px;font-weight:700;color:var(--g700);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;white-space:nowrap}
.cta-btn:hover{border-color:var(--red);color:var(--red)}
.cta-btn.red{background:var(--red);border-color:var(--red);color:#fff}
.cta-btn.red:hover{background:var(--red2)}

/* ── GRID CALENDÁRIO ── */
.cal-grid-wrap{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);overflow:hidden;border:1px solid var(--g200)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--g900)}
.cal-wd{padding:8px 4px;text-align:center;font-size:11px;font-weight:800;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px}
.cal-wd:first-child{color:#FF6B6B}/* Dom vermelho */
.cal-wd:last-child{color:#FF6B6B}/* Sáb vermelho */

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--g200)}

/* Célula do dia */
.cal-cell{
  background:#fff;min-height:100px;padding:8px 8px 6px;
  cursor:pointer;position:relative;
  transition:background .15s;
  display:flex;flex-direction:column;gap:4px;
  overflow:hidden;
}
/* Quando painel aberto, células ficam mais compactas */
.cal-area.panel-open .cal-cell{min-height:80px;padding:6px 6px 4px}
.cal-cell:hover{background:#FAFAFA}
.cal-cell.empty{background:var(--g50);cursor:default}
.cal-cell.selected{background:#FFF0F1;outline:2px solid var(--red);outline-offset:-2px;z-index:1}
.cal-cell.today{background:#FFF8E1}
.cal-cell.today .cal-day-num{background:var(--red);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.cal-cell.no-data{opacity:.4;cursor:default}

.cal-day-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:700;color:var(--g700);
  line-height:1;margin-bottom:4px;
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px
}
.cal-cell.selected .cal-day-num{background:var(--red);color:#fff;border-radius:50%}
.cal-cell.today:not(.selected) .cal-day-num{background:var(--red);color:#fff;border-radius:50%}

/* Chips de resumo dentro da célula */
.cal-chips{display:flex;flex-direction:column;gap:3px}
.cal-chip{
  display:flex;align-items:center;gap:4px;
  border-radius:5px;padding:2px 6px;font-size:10px;font-weight:800;
  white-space:nowrap;overflow:hidden
}
.chip-m{background:var(--manha-bg);color:#795500}
.chip-n{background:var(--noite-bg);color:#311B92}
.chip-f{background:var(--abs-bg);color:var(--abs)}
.cal-wd-label{font-size:9px;font-weight:700;color:var(--g300);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.cal-closed-lbl{font-size:9px;font-weight:700;color:var(--g300);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── PAINEL LATERAL ── */
.day-panel{
  position:fixed;
  top:58px;
  right:0;
  bottom:0;
  width:var(--panel-w);
  background:#fff;
  border-left:1px solid var(--g200);
  box-shadow:-8px 0 32px rgba(0,0,0,.08);
  z-index:150;
  display:flex;
  flex-direction:column;
  animation:slideRight .25s ease;
  overflow:hidden;
}
.panel-head{
  background:var(--red);padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;/* cabeçalho não encolhe */
}
.panel-date{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:.3px}
.panel-wd{font-size:11px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.panel-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}
.panel-body{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 16px 32px;
  display:block;
}
.panel-body > *{margin-bottom:12px;}
.panel-body > *:last-child{margin-bottom:0;}
/* Indicador de scroll: sombra no topo quando não está no início */
.panel-body.scrolled{
  box-shadow:inset 0 8px 12px -8px rgba(0,0,0,.12);
}

/* Turno dentro do painel */
.shift-block{border-radius:12px;overflow:hidden}
.shift-block.manha{border:1.5px solid var(--manha-b);background:var(--manha-bg)}
.shift-block.noite{border:1.5px solid var(--noite-b);background:var(--noite-bg)}
.shift-head{display:flex;align-items:center;gap:8px;padding:9px 14px}
.shift-block.manha .shift-head{background:var(--manha)}
.shift-block.noite .shift-head{background:var(--noite)}
.shift-head-icon{font-size:14px}
.shift-head-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff;flex:1}
.shift-head-count{font-size:11px;color:rgba(255,255,255,.8);font-weight:600}

/* Botão adicionar */
.add-btn{display:block;width:100%;padding:9px;background:none;border:none;border-top:1.5px dashed var(--g200);font-size:13px;font-weight:700;color:var(--red);cursor:pointer;text-align:center;font-family:'Nunito',sans-serif}
.add-btn:hover{background:var(--red-bg)}

/* Cards de entrada no painel — agrupados por pessoa */
.entry-cards{display:flex;flex-direction:column;gap:8px;padding:8px 10px 4px;background:#fff}

/* Card agrupado: uma pessoa, múltiplas funções */
.person-card{
  background:#fff;border:1px solid var(--g100);border-radius:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;
}
.person-card-head{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px 6px;
}
.ec-name{font-size:14px;font-weight:800;color:var(--g900)}
.person-card-roles{
  display:flex;flex-wrap:wrap;gap:4px;
  padding:0 12px 8px;
}
.person-card-foot{
  padding:0 12px 9px;
  display:flex;flex-direction:column;gap:3px;
}

/* Card individual (compatibilidade — modo edição) */
.entry-card{
  display:flex;align-items:flex-start;gap:9px;
  background:#fff;border:1px solid var(--g100);border-radius:10px;
  padding:10px 11px;box-shadow:0 1px 3px rgba(0,0,0,.04)
}
.entry-card.falta{background:var(--abs-bg);border-color:#FFCDD2}
.entry-card.editing{background:var(--pend-bg);border-color:var(--pend)}
.ec-role{
  background:var(--g100);color:var(--g700);
  border-radius:6px;padding:3px 8px;
  font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:1px
}
.ec-right{flex:1;min-width:0}
.ec-name{font-size:14px;font-weight:800;color:var(--g900);margin-bottom:2px}
.ec-obs{font-size:11px;color:var(--g400);font-style:italic;margin-bottom:4px}
.ec-hor{font-size:10px;color:var(--g400);font-weight:600;margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
.ec-status{display:inline-flex;align-items:center;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.ec-actions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ec-btn{display:inline-flex;align-items:center;gap:3px;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;min-height:30px}
.ec-btn.edit{background:#E3F2FD;color:#1565C0}
.ec-btn.del{background:var(--red-bg);color:var(--red)}
.ec-btn.falta-btn{background:#FFF3E0;color:#E65100}

/* Edição inline no card */
.ec-inputs{display:flex;flex-direction:column;gap:6px;flex:1}
.ec-inp-row{display:flex;flex-direction:column;gap:2px}
.ec-inp-label{font-size:9px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px}
.ec-inp{border:1.5px solid var(--g200);border-radius:7px;padding:7px 9px;font-size:13px;color:var(--g900);background:#fff;font-family:'Nunito',sans-serif;width:100%}
.ec-inp:focus{border-color:var(--red);outline:none}
.ec-save-row{display:flex;gap:7px;margin-top:3px}
.ec-save{background:var(--ok);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex:1}
.ec-cancel{background:var(--g100);color:var(--g700);border:none;border-radius:7px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}

/* ── MODAIS ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
.modal-card{background:#fff;border-radius:20px;box-shadow:0 8px 48px rgba(0,0,0,.2);width:100%;overflow:hidden;animation:fadeIn .25s ease}
.modal-head{background:var(--red);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.3px}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}
.modal-body{padding:18px 20px 22px;max-height:75vh;overflow-y:auto}

/* Login */
.card-top{background:var(--red);padding:24px 20px 16px;display:flex;flex-direction:column;align-items:center}
.card-top img{width:110px;height:110px;object-fit:contain;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.card-top .fallback{font-size:48px;line-height:1}
.card-top-sub{font-size:10px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:7px}
.card-body{padding:20px 22px 24px}
.l-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--g700);text-align:center;margin-bottom:3px}
.l-sub{font-size:12px;color:var(--g400);font-weight:600;text-align:center;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.7px}
.inp{border:2px solid var(--g200);border-radius:10px;padding:10px 13px;font-size:15px;color:var(--g900);background:#FAFAFA;width:100%;transition:border-color .2s;font-family:'Nunito',sans-serif}
.inp:focus{border-color:var(--red);background:#fff;outline:none}
.inp-wr{position:relative}
.inp-wr .inp{padding-right:40px}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--g300);cursor:pointer;font-size:15px;padding:4px}
.l-err{background:var(--red-bg);border:1px solid #FFCDD2;border-radius:8px;padding:9px 13px;font-size:13px;color:#C0121F;font-weight:700;margin-bottom:12px;display:none}
.l-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;width:100%;min-height:46px;display:flex;align-items:center;justify-content:center;transition:background .2s;font-family:'Nunito',sans-serif}
.l-btn:hover{background:var(--red2)}
.l-btn:disabled{opacity:.6;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* Folgas */
.folga-dom{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--g100)}
.folga-dom:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.folga-dom-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--red);margin-bottom:10px}
.folga-section{margin-bottom:7px}
.folga-lbl{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.folga-pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;margin:2px}

/* Falta */
.falta-info{background:#FFF3E0;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:14px;color:var(--g700);line-height:1.7}
.falta-btns{display:flex;flex-direction:column;gap:9px}
.falta-btn{border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:#fff;display:flex;align-items:center;gap:8px}
.falta-btn.just{background:#E65100}
.falta-btn.injust{background:#B71C1C}
.falta-btn.cancel{background:var(--g100);color:var(--g700)}

/* ── CARD: horário automático e botão detalhes ── */
.ec-hor{
  font-size:11px;color:var(--g400);font-weight:600;
  margin-bottom:3px;letter-spacing:.2px;
}
.ec-hor-empty{
  font-size:10px;color:var(--g300);font-style:italic;margin-bottom:3px;
}
.ec-detalhe-btn{
  display:inline-flex;align-items:center;gap:3px;
  background:none;border:1px solid var(--g200);border-radius:6px;
  padding:3px 8px;font-size:10px;font-weight:700;
  color:var(--g400);cursor:pointer;margin-top:4px;
  transition:all .15s;font-family:'Nunito',sans-serif;
}
.ec-detalhe-btn:hover{background:var(--g50);border-color:var(--g300);color:var(--g700)}

/* ── POPUP DE DETALHES DA PESSOA ── */
.detalhe-popup{
  position:fixed;inset:0;z-index:800;
  display:flex;align-items:center;justify-content:center;
  padding:16px;background:rgba(0,0,0,.5);
  animation:fadeIn .2s ease;
}
.detalhe-card{
  background:#fff;border-radius:18px;
  box-shadow:0 12px 48px rgba(0,0,0,.22);
  width:100%;max-width:420px;
  max-height:80vh;display:flex;flex-direction:column;
  overflow:hidden;animation:slideUp .2s ease;
}
.detalhe-head{
  background:var(--g900);padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.detalhe-nome{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:700;color:#fff;letter-spacing:.3px;
}
.detalhe-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;font-weight:600;}
.detalhe-close{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  border-radius:8px;padding:6px 12px;font-size:13px;
  font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;
}
.detalhe-body{
  flex:1;overflow-y:auto;padding:16px 18px 24px;
  -webkit-overflow-scrolling:touch;
}
.detalhe-section{margin-bottom:16px;}
.detalhe-section:last-child{margin-bottom:0;}
.detalhe-section-title{
  font-size:10px;font-weight:800;color:var(--g400);
  text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:8px;
}
.detalhe-hor-row{
  display:flex;align-items:center;gap:8px;
  background:var(--g50);border-radius:10px;padding:10px 12px;
  margin-bottom:6px;
}
.detalhe-hor-icon{font-size:16px;}
.detalhe-hor-info{flex:1;}
.detalhe-hor-label{font-size:10px;color:var(--g400);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.detalhe-hor-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--g900);}
.detalhe-funcao-item{
  border:1px solid var(--g100);border-radius:10px;
  padding:10px 12px;margin-bottom:8px;
}
.detalhe-funcao-nome{
  font-size:13px;font-weight:800;color:var(--g900);margin-bottom:4px;
  display:flex;align-items:center;gap:6px;
}
.detalhe-funcao-desc{

}
.detalhe-bloco-badge{

  margin-bottom:10px;display:inline-block;
}
.detalhe-bloco{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;font-weight:600;letter-spacing:.3px}
.det-hor-box{background:var(--g50);border-radius:10px;padding:10px 13px;margin-bottom:12px}
.det-hor-row{font-size:12px;color:var(--g700);font-weight:600;margin-bottom:3px;display:flex;gap:6px;align-items:center}
.det-hor-row:last-child{margin-bottom:0}
.det-hor-row span{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--g900)}
.det-role-badge{display:flex;flex-direction:column;gap:2px;background:var(--g900);border-radius:10px;padding:10px 13px;margin-bottom:12px}
.det-role-label{font-size:9px;font-weight:800;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.7px}
.det-role-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:.3px}
.det-func-detalhe{background:var(--manha-bg);border:1px solid var(--manha-b);border-radius:10px;padding:12px 13px;margin-bottom:12px}
.det-func-titulo{font-size:11px;font-weight:800;color:#795500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.det-func-texto{font-size:13px;color:var(--g700);line-height:1.65;white-space:pre-line}
.det-section{margin-bottom:4px}
.det-section-title{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.det-func-item{border:1px solid var(--g100);border-radius:9px;padding:9px 12px;margin-bottom:6px}
.det-func-item:last-child{margin-bottom:0}
.det-func-nome{font-size:13px;font-weight:800;color:var(--g900);margin-bottom:3px}
.det-func-desc{font-size:11px;color:var(--g400);line-height:1.55;white-space:pre-line}

/* ── MODAL HORÁRIOS ── */
.hor-section{margin-bottom:20px}
.hor-section:last-child{margin-bottom:0}
.hor-section-title{
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
  padding:8px 14px;border-radius:8px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px
}
.hor-section-title.manha{background:var(--manha-bg);color:#795500}
.hor-section-title.noite{background:var(--noite-bg);color:#311B92}
.hor-section-title.est{background:var(--g100);color:var(--g700)}
.hor-table{width:100%;border-collapse:collapse}
.hor-table th{
  font-size:10px;font-weight:800;color:var(--g400);
  text-transform:uppercase;letter-spacing:.5px;
  padding:5px 10px;text-align:left;border-bottom:1px solid var(--g100)
}
.hor-table td{
  padding:10px 10px;font-size:14px;border-bottom:1px solid var(--g100);
  vertical-align:middle
}
.hor-table tr:last-child td{border-bottom:none}
.hor-table tr:hover td{background:var(--g50)}
.hor-nome{font-weight:800;color:var(--g900)}
.hor-time{
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  color:var(--g700);white-space:nowrap
}
.hor-almoco{
  font-size:12px;color:var(--g400);font-weight:600;white-space:nowrap
}
.hor-badge{
  display:inline-block;font-size:10px;font-weight:800;
  padding:2px 7px;border-radius:20px;
}

/* ── REGRAS OPERACIONAIS NO PAINEL (RODADA 3) ── */
.regras-block{
  background:linear-gradient(135deg,#F0FDF4,#EFF6FF);
  border:1px solid #BBF7D0;border-radius:10px;
  padding:10px 14px;margin-bottom:10px;
}
.regras-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.regra-item{
  font-size:11px;font-weight:700;color:#166534;
  display:inline-flex;align-items:center;gap:4px;
}
.transicao-row{display:flex;flex-wrap:wrap;gap:8px;border-top:1px solid #BBF7D0;padding-top:6px;margin-top:2px}
.trans-atual{font-size:10px;color:#047857;font-weight:600}
.trans-futuro{font-size:10px;color:#B45309;font-weight:700}

/* ── POPUP OPERACIONAL (RODADA 3) ── */
.dp-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:2000;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
@media(min-width:480px){
  .dp-overlay{align-items:center}
  .dp-card{border-radius:18px!important;max-height:85vh}
}
.dp-card{
  background:#fff;width:100%;max-width:480px;
  border-radius:18px 18px 0 0;
  max-height:90vh;display:flex;flex-direction:column;
  animation:slideUp .22s ease;overflow:hidden;
}
.dp-head{
  background:var(--red);padding:16px 18px;
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-shrink:0;
}
.dp-nome{
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px;font-weight:700;color:#fff;line-height:1;
}
.dp-turno{font-size:11px;color:rgba(255,255,255,.75);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.dp-close{
  background:rgba(255,255,255,.2);border:none;color:#fff;
  border-radius:8px;padding:6px 11px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;margin-top:2px;
}
.dp-body{
  flex:1;overflow-y:auto;padding:14px 16px 28px;
  display:flex;flex-direction:column;gap:0;
  -webkit-overflow-scrolling:touch;
}
/* Seções */
.dp-section{
  padding:10px 0 10px;
  border-bottom:1px solid var(--g100);
}
.dp-section:last-of-type{border-bottom:none}
.dp-section-label{
  font-size:9px;font-weight:800;color:var(--g300);
  text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;
}
/* Horário */
.dp-hor-row{display:flex;gap:8px;flex-wrap:wrap}
.dp-hor-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--g50);border:1px solid var(--g200);
  border-radius:7px;padding:4px 10px;
  font-size:13px;font-weight:700;color:var(--g700);
  font-family:'Barlow Condensed',sans-serif;
}
/* Função principal */
.dp-funcao-principal{
  display:inline-flex;align-items:center;
  background:#FFF7ED;border:1.5px solid #F97316;
  color:#C2410C;border-radius:8px;
  padding:4px 12px;font-size:13px;font-weight:800;
  margin-bottom:2px;
}
.dp-funcao-principal::before{content:'⭐ ';font-size:11px}

/* Padrão do dia */
.dp-padrao-dia{
  display:inline-flex;align-items:center;
  background:#EFF6FF;border:1.5px solid #BFDBFE;
  color:#1D4ED8;border-radius:8px;
  padding:4px 12px;font-size:12px;font-weight:700;
  margin-bottom:2px;
}
.dp-padrao-dia::before{content:'📅 ';font-size:11px}

/* Função hoje */
.dp-funcao-hoje{
  display:inline-flex;align-items:center;
  background:var(--red-bg);border:1.5px solid var(--red);
  color:var(--red);border-radius:8px;
  padding:4px 12px;font-size:13px;font-weight:800;
}
/* Funções possíveis */
.dp-bloco-badge{
  display:inline-flex;background:var(--g100);color:var(--g700);
  border-radius:5px;padding:2px 8px;font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;
}
.dp-func-item{
  border:1px solid var(--g100);border-radius:8px;
  padding:8px 11px;margin-bottom:5px;
  background:#fff;
}
.dp-func-hoje{border-color:var(--red)!important;background:var(--red-bg)!important}
.dp-func-nome{font-size:13px;font-weight:700;color:var(--g900);line-height:1.3}
.dp-func-desc{font-size:11px;color:var(--g400);margin-top:3px;line-height:1.5}
.dp-hoje-tag{
  font-size:9px;background:var(--red);color:#fff;
  padding:1px 6px;border-radius:10px;font-weight:700;vertical-align:middle;margin-left:4px;
}
/* Responsabilidades */
.dp-resp-list{display:flex;flex-wrap:wrap;gap:6px}
.dp-resp-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--g50);border:1px solid var(--g200);
  color:var(--g600,#616161);border-radius:6px;
  padding:4px 9px;font-size:11px;font-weight:700;
}
/* Crítica: destaque visual */
.dp-resp-critica{
  background:#FFF7ED;border-color:#FED7AA;
  color:#C2410C;font-weight:800;
}
/* Obs */
.dp-obs{
  font-size:12px;color:var(--g700);line-height:1.6;
  background:var(--g50);border-radius:7px;padding:8px 10px;
}
/* Regra do dia */
.dp-regra{
  background:linear-gradient(135deg,#F0FDF4,#EFF6FF);
  border:1px solid #BBF7D0;border-radius:8px;
  padding:9px 12px;margin-top:10px;
}
.dp-regra-item{font-size:11px;font-weight:700;color:#166534;line-height:1.7}
/* Transição */
.dp-trans{
  background:#FFFBEB;border:1px solid #FDE68A;
  border-radius:8px;padding:9px 12px;margin-top:8px;
}
.dp-trans-atual{font-size:11px;color:#047857;font-weight:700;line-height:1.6}
.dp-trans-futuro{font-size:11px;color:#B45309;font-weight:800;line-height:1.6}

/* ── AJUSTE MANUAL NO CARD ── */
.ec-ajuste-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:#FFF7ED;border:1px solid #FED7AA;
  color:#C2410C;border-radius:5px;
  padding:2px 8px;font-size:10px;font-weight:700;
  margin-bottom:3px;cursor:default;
}
.ec-btn-ajuste{
  background:#F0F9FF;color:#0369A1;
  border:1px solid #BAE6FD!important;
}
.ec-btn-ajuste:hover{background:#E0F2FE!important}

/* ── AJUSTE NO POPUP ── */
.dp-ajuste-bloco{
  background:#FFF7ED;border:1px solid #FED7AA;
  border-radius:8px;padding:10px 12px;
}
.dp-ajuste-tipo{
  font-size:13px;font-weight:800;color:#C2410C;
  display:block;margin-bottom:4px;
}
.dp-ajuste-desc{font-size:12px;color:#7C2D12;font-weight:600;margin-bottom:3px}
.dp-ajuste-obs{font-size:11px;color:#92400E;font-style:italic}
.dp-ajuste-apr{font-size:10px;color:#047857;font-weight:700;margin-top:4px}

/* ── RESPONSABILIDADES NO CARD (RODADA 2) ── */
/* Hierarquia visual: nome > função/horário > responsabilidade */
.ec-resp-wrap{
  display:flex;align-items:center;flex-wrap:wrap;
  gap:4px;margin:4px 0 3px;
}
.ec-resp-label{
  font-size:9px;font-weight:800;
  color:var(--g300);text-transform:uppercase;
  letter-spacing:.6px;margin-right:1px;flex-shrink:0;
}
.ec-resp-chip{
  display:inline-flex;align-items:center;
  background:var(--g50);border:1px solid var(--g200);
  color:var(--g400);border-radius:4px;
  padding:1px 6px;font-size:9px;font-weight:700;
  white-space:nowrap;letter-spacing:.1px;
  line-height:1.4;
}
/* Chip extra (oculto inicialmente) */
.ec-resp-extra{
  background:#EEF2FF;border-color:#C7D2FE;color:#4F46E5;
}
/* Botão +N */
.ec-resp-mais{
  display:inline-flex;align-items:center;justify-content:center;
  background:none;border:1px dashed var(--g300);border-radius:4px;
  color:var(--g400);font-size:9px;font-weight:800;
  padding:1px 6px;cursor:pointer;
  font-family:'Nunito',sans-serif;line-height:1.4;
  transition:background .12s,color .12s,border-color .12s;
}
.ec-resp-mais:hover,.ec-resp-mais:active{
  background:var(--g100);border-color:var(--g400);color:var(--g700);
}
/* Bloco de extras expandido */
.ec-resp-extras{
  display:none;width:100%;
  flex-wrap:wrap;gap:4px;
  padding-top:3px;
}
.ec-resp-extras.aberto{display:flex!important;}

/* Mobile: chips menores para não estoura */
@media(max-width:640px){
  .ec-resp-chip{font-size:8px;padding:1px 5px}
  .ec-resp-mais{font-size:8px;padding:1px 5px}
  .ec-resp-label{font-size:8px}
}

/* Botão falta explícito no card agrupado */
.pc-falta-row{
  display:flex;flex-wrap:wrap;gap:5px;
  padding:0 12px 10px;border-top:1px solid var(--g100);margin-top:2px;padding-top:8px;
}
.pc-falta-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:#FFF3E0;border:1px solid #FFCC80;
  color:#E65100;border-radius:7px;
  padding:5px 10px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:'Nunito',sans-serif;
  white-space:nowrap;
  transition:background .12s;
}
.pc-falta-btn:hover,.pc-falta-btn:active{
  background:#FFE0B2;border-color:#FF9800;
}

/* Chips de função no card agrupado */
.pc-role-chip{
  display:inline-flex;align-items:center;gap:4px;
  border:1.5px solid;border-radius:6px;
  padding:3px 8px;font-size:11px;font-weight:800;
  cursor:default;white-space:nowrap;position:relative;
}
.pc-hor{font-size:10px;color:var(--g400);font-weight:600;display:block;margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;}
/* Botões admin dentro do chip — ocultos até hover */
.pc-chip-actions{
  display:none;align-items:center;gap:2px;margin-left:2px;
}
.pc-role-editable:hover .pc-chip-actions,
.pc-role-editable:active .pc-chip-actions{
  display:inline-flex;
}
.pc-chip-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border:none;border-radius:4px;
  font-size:10px;font-weight:800;cursor:pointer;padding:0;
  background:rgba(0,0,0,.08);color:currentColor;
  font-family:'Nunito',sans-serif;
  transition:background .1s;
}
.pc-chip-btn:hover{background:rgba(0,0,0,.18)}
.pc-chip-btn.danger{background:rgba(234,29,44,.15);color:var(--red)}
.pc-chip-btn.danger:hover{background:rgba(234,29,44,.3)}
.pc-chip-btn.warn{background:rgba(230,81,0,.15);color:#E65100}
.pc-chip-btn.warn:hover{background:rgba(230,81,0,.3)}
/* Mobile: sempre mostrar ações se logado (sem hover) */
@media(max-width:640px){
  .pc-chip-actions{display:inline-flex}
}

/* ── HISTÓRICO ── */
.hist-block{background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:12px 14px;margin-top:4px}
.hist-title{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.hist-item{font-size:11px;color:var(--g700);padding:5px 0;border-bottom:1px solid var(--g100);line-height:1.5}
.hist-item:last-child{border-bottom:none}
.hist-time{font-weight:800;color:var(--g900);font-family:'Barlow Condensed',sans-serif;font-size:13px}
.hist-editor{font-weight:700;color:var(--red)}
.hist-pessoa{font-weight:700}
.hist-change{color:var(--g400);display:block;font-size:10px}
.hist-motivo{color:var(--ok);font-weight:700;font-size:10px;display:block}

/* TOAST */
.toast-stack{position:fixed;bottom:16px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:10px 15px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.18);animation:slideUp .3s ease;max-width:280px}
.ts{background:var(--ok)}.te{background:var(--red)}.ti{background:var(--g700)}

/* ── MOBILE ── */
/* ── TABLET: painel cobre por cima em vez de empurrar ── */
@media(max-width:900px){
  :root{--panel-w:min(440px,100vw)}
  .cal-area.panel-open{
    margin-right:0;/* painel flutua por cima, calendário não se move */
  }
  .day-panel{
    box-shadow:-4px 0 40px rgba(0,0,0,.18);
  }
}

/* ── MOBILE ── */
@media(max-width:640px){
  :root{--panel-w:100vw}
  .topbar-mid{display:none}
  .topbar{height:54px;padding:0 12px}
  .brand-sub{display:none}
  .brand-logo{height:38px;width:38px}
  /* No mobile: botões viram só ícones para caber tudo */
  #btn-horarios{display:flex}
  .tbtn-txt{display:none}
  .tbtn-white{padding:6px 8px;gap:0;font-size:16px}
  .top-actions{gap:5px}
  .day-panel{
    top:54px;
    left:0;
    width:100%;
    animation:slideUp .25s ease;
    z-index:500;
  }
  .cal-cell{min-height:72px;padding:5px 5px 4px}
  .cal-day-num{font-size:14px;width:22px;height:22px}
  .cal-chip{font-size:9px;padding:1px 5px}
  .cal-area{padding:12px 8px 32px}
  .cal-header{margin-bottom:12px}
  .cal-title{font-size:22px}
}

/* ── MODAL TEMPERATURAS ── */
.temp-bloco{padding:14px 18px;border-bottom:1px solid var(--g100)}
.temp-bloco:last-child{border-bottom:none}
.temp-blue{background:#F0F7FF}
.temp-orange{background:#FFFBF0}
.temp-gray{background:#F7F7F7}
.temp-bloco-titulo{font-size:14px;font-weight:800;color:var(--g900);margin-bottom:10px}
.temp-sub-titulo{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.temp-linha-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:7px;margin-bottom:10px}
.temp-faixa{border-radius:8px;padding:8px 10px;text-align:center;border:1px solid transparent}
.temp-ok{background:#E8F5E9;border-color:#A5D6A7}
.temp-warn{background:#FFF8E1;border-color:#FFE082}
.temp-crit{background:#FFEBEE;border-color:#FFCDD2}
.temp-pre{background:#FFF3E0;border-color:#FFCC80}
.temp-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;color:var(--g400)}
.temp-valor{font-size:14px;font-weight:800;color:var(--g900);font-family:'Barlow Condensed',sans-serif}
.temp-hint{font-size:9px;color:var(--g400);margin-top:2px}
.temp-regras{display:flex;flex-direction:column;gap:4px}
.temp-regra{font-size:11px;color:var(--g700);line-height:1.5;padding:2px 0}
.temp-regra strong{font-weight:800;color:var(--g900)}
.temp-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.temp-table tr{border-bottom:1px solid var(--g100)}
.temp-table td{padding:6px 4px;vertical-align:middle;color:var(--g700)}
.temp-t-ok{color:#2E7D32;font-weight:800;white-space:nowrap}
.temp-t-warn{color:#F57F17;font-weight:800;white-space:nowrap}
.temp-t-crit{color:#C62828;font-weight:800;white-space:nowrap}
.temp-principio{margin-top:10px;background:#E8EAF6;border-radius:8px;padding:10px 12px;font-size:12px;font-weight:700;color:#3949AB;line-height:1.5}

/* ── MODAL MANUAL DE USO ── */
.man-intro{
  padding:14px 20px;font-size:13px;color:var(--g700);
  background:var(--g50);border-bottom:1px solid var(--g100);
  line-height:1.6;
}
.man-intro strong{color:var(--g900)}
.man-section{padding:14px 20px;border-bottom:1px solid var(--g100)}
.man-section-admin{background:#FFFBF0}
.man-section-title{
  font-size:13px;font-weight:800;color:var(--g900);
  margin-bottom:10px;
}
.man-item{
  display:flex;align-items:flex-start;gap:10px;
  margin-bottom:8px;font-size:12px;color:var(--g700);line-height:1.5;
}
.man-item:last-child{margin-bottom:0}
.man-item-icon{
  flex-shrink:0;width:22px;text-align:center;

}
.man-item strong{color:var(--g900);font-weight:700}
.man-badge-row{margin-bottom:8px}
.man-badge{
  display:inline-flex;padding:2px 9px;border-radius:20px;
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
}

}

  display:flex;align-items:center;gap:8px;
  background:var(--g50);border:1px solid var(--g100);
  border-radius:8px;padding:8px 10px;
}
.man-av{
  width:30px;height:30px;border-radius:50%;
  background:var(--red);color:#fff;

  if(!supa)return false
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),3000))
    const query=supa.from('escala_dias').select('*').order('date')
    const {data,error}=await Promise.race([query,timeout])
    if(error)throw error
    if(!data||data.length===0)return false
    // Converter formato banco → formato app
    G.days=data.map(row=>({
      date:row.date,
      wd:row.wd,
      jsDay:row.js_day,
      manha:row.manha||[],
      noite:row.noite||[]
    }))
    G.days.forEach(d=>dayMap[d.date]=d)
    return true
  }catch(e){
    console.warn('Supabase load falhou:',e.message)
    return false
  }

function hardReset(){localStorage.clear();location.reload()}
function toast(m,t='info'){
  try{
    const el=document.createElement('div')
    el.className='toast t'+t[0]
    el.textContent=(t==='success'?'✓ ':t==='error'?'⚠ ':'ℹ ')+m
    document.getElementById('toasts').appendChild(el)
    setTimeout(()=>el.remove(),3000)
  }catch(e){}
}

// ── Expande/colapsa responsabilidades extras no card ──
function toggleResps(btn){
  const id=btn.dataset.mais
  const bloco=document.getElementById('extras-'+id)
  if(!bloco)return
  const aberto=bloco.classList.toggle('aberto')
  btn.textContent=aberto?'−':'+'+btn.textContent.replace(/[^0-9]/g,'')
}

// ===== INIT =====
async function init(){
  // Sem persistência de sessão — sempre começa deslogado

  // Setar visualização no mês/ano atual
  const _now=new Date()
  G.viewYear=_now.getFullYear()
  G.viewMonth=_now.getMonth()+1

  // Tentar carregar do Supabase primeiro
  const loaded=await loadFromSupabase()

  if(!loaded){
    // Fallback: localStorage ou BASE hardcoded
    try{
      const d=localStorage.getItem(SD)
      if(d){const p=JSON.parse(d);if(Array.isArray(p)&&p.length>0&&p[0].date)G.days=p;else throw 0}
      else G.days=clone(BASE)
    }catch(e){localStorage.removeItem(SD);G.days=clone(BASE)}
    G.days.forEach(d=>dayMap[d.date]=d)
    // Primeira vez: popular o banco com os dados do BASE
    populateSupabase()
  }

  // Seleciona hoje se existir na escala
  const today=new Date().toISOString().split('T')[0]
  if(dayMap[today])G.selectedDate=today
  render()
}

// ── Popula o banco com os dados do BASE (apenas primeira vez) ──
async function populateSupabase(){
  if(!supa)return
  try{
    const rows=BASE.map(d=>({
      date:d.date,wd:d.wd,js_day:d.jsDay,
      manha:d.manha,noite:d.noite
    }))
    const {error}=await supa.from('escala_dias').upsert(rows,{onConflict:'date',ignoreDuplicates:true})
    if(error)throw error
    console.log('Base populada no Supabase')
  }catch(e){
    console.warn('populateSupabase falhou:',e.message)
  }
}

function render(){
  try{
    document.getElementById('app').innerHTML=buildPage()
    bindAll()
  }catch(e){
    document.getElementById('app').innerHTML='<div style="padding:32px;text-align:center;font-family:\'Nunito\',sans-serif"><div style="color:#C0121F;font-weight:700;margin-bottom:14px">Erro ao renderizar.</div><button onclick="hardReset()" style="background:#EA1D2C;color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:800;cursor:pointer">🔄 Recarregar</button></div>'
  }
}

// ── CALENDÁRIO ──
function buildCalendar(){
  const today=new Date().toISOString().split('T')[0]
  const yr=G.viewYear, mo=G.viewMonth
  const firstDay=new Date(yr,mo-1,1).getDay()// 0=Dom
  const daysInMonth=new Date(yr,mo,0).getDate()
  const MESES_LONG=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  const MESES_SHORT=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']
  const monthLabel=MESES_LONG[mo-1]+' '+yr

  // Contar dias com escala neste mês (para o subtítulo)
  const daysThisMonth=G.days.filter(d=>d.date.startsWith(`${yr}-${String(mo).padStart(2,'0')}`))
  G._calMeta={monthLabel,shortLabel:MESES_SHORT[mo-1].charAt(0).toUpperCase()+MESES_SHORT[mo-1].slice(1)+' '+yr,daysCount:daysThisMonth.length}

  let cells=''
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-cell empty"></div>`

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const dayData=dayMap[dateStr]
    const isToday=dateStr===today
    const isSel=dateStr===G.selectedDate

    if(!dayData){
      cells+=`<div class="cal-cell no-data"><div class="cal-day-num">${d}</div><div class="cal-closed-lbl">Fechado</div></div>`
      continue
    }

    const allE=[...dayData.manha,...dayData.noite]
    const faltas=allE.filter(e=>e.status==='absent').length

    let chips=''
    if(dayData.manha.length) chips+=`<div class="cal-chip chip-m">☀️ ${dayData.manha.length}</div>`
    if(dayData.noite.length) chips+=`<div class="cal-chip chip-n">🌙 ${dayData.noite.length}</div>`
    if(faltas) chips+=`<div class="cal-chip chip-f">✕${faltas}</div>`

    cells+=`<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}" data-date="${dateStr}">
      <div class="cal-day-num">${d}</div>
      <div class="cal-chips">${chips}</div>
    </div>`
  }

  // Células vazias no final para completar a semana
  const totalCells=firstDay+daysInMonth
  const remainder=totalCells%7
  if(remainder>0){for(let i=0;i<7-remainder;i++) cells+=`<div class="cal-cell empty"></div>`}

  return `<div class="cal-grid-wrap">
    <div class="cal-weekdays">
      <div class="cal-wd">Dom</div><div class="cal-wd">Seg</div><div class="cal-wd">Ter</div>
      <div class="cal-wd">Qua</div><div class="cal-wd">Qui</div><div class="cal-wd">Sex</div><div class="cal-wd">Sáb</div>
    </div>
    <div class="cal-grid">${cells}</div>
  </div>`
}

function showPeriodModal(){

  m.innerHTML=`<div class="modal-bg" id="pmbg">

      </div>
    </div>
  </div>`
  document.body.appendChild(m)

function buildShiftPanel(day,shift){
  const m=shift==='manha'
  const entries=day[shift]
  const canAdd=G.user&&G.user.can&&G.user.can.add

  // Agrupar entries por pessoa
  const grupos={}
  const ordemPessoas=[]
  entries.forEach(e=>{
    const nome=e.person||'—'
    if(!grupos[nome]){grupos[nome]=[];ordemPessoas.push(nome)}
    grupos[nome].push(e)
  })

  // Construir HTML agrupado — sempre usa buildPersonCard para layout consistente
  const cardsHtml=ordemPessoas.map(nome=>{
    const entriesDaPessoa=grupos[nome]
    return buildPersonCard(day.date,shift,nome,entriesDaPessoa)
  }).join('')

  const totalPessoas=ordemPessoas.length
  const totalFuncoes=entries.length
  const countLabel=totalPessoas===totalFuncoes
    ?`${totalPessoas} pessoas`
    :`${totalPessoas} pessoas · ${totalFuncoes} funções`

  return `<div class="shift-block ${m?'manha':'noite'}">
    <div class="shift-head">
      <span class="shift-head-icon">${m?'☀️':'🌙'}</span>
      <span class="shift-head-label">${m?'Manhã':'Noite'}</span>
      <span class="shift-head-count">${countLabel}</span>
    </div>
    <div class="entry-cards" id="cards-${day.date}-${shift}">
      ${cardsHtml}
    </div>
    ${canAdd?`<button class="add-btn" data-add="${day.date}|${shift}">+ Adicionar</button>`:''}
  </div>`
}

// ── Card agrupado: uma pessoa com múltiplas funções ──
function buildPersonCard(date,shift,nome,entries){
  const hor=getHorario(nome)
  const resps=getResponsabilidades(nome)||[]
  const func=getFuncoes(nome)
  const temDetalhes=func!==null
  const logado=G.user&&G.user.can&&G.user.can.edit

  // Chips de função — cada um com seu status e data-k para edição
  const roleChips=entries.map(e=>{
    const st=ST[e.status]||ST.pending
    const isFalta=e.status==='absent'
    const k=`${date}|${shift}|${e.id}`
    const cor=isFalta?'var(--abs)':st.c
    const bg=isFalta?'var(--abs-bg)':st.c+'22'
    return `<span class="pc-role-chip" data-k="${k}" style="border-color:${cor};color:${cor};background:${bg}"
      title="${esc(e.role)}${e.obs?' — '+e.obs:''}">${esc(e.role||'—')}${isFalta?' ✕':''}</span>`
  }).join('')

  // Horário
  const horHtml=hor&&hor.horario
    ?`<span class="pc-hor">${esc(hor.horario)} · 🍽 ${esc(hor.almoco)}</span>`
    :''

  // Responsabilidades (máx 2 + ver mais)
  let respHtml=''
  if(resps.length){
    const vis=resps.slice(0,2)
    const ext=resps.slice(2)
    const chips=vis.map(r=>`<span class="ec-resp-chip">${esc(r)}</span>`).join('')
    const maisBtn=ext.length?`<button class="ec-resp-mais" data-mais="${esc(entries[0].id)}" onclick="toggleResps(this)">+${ext.length}</button>`:''
    const extHtml=ext.length?`<div class="ec-resp-extras" id="extras-${esc(entries[0].id)}" style="display:none">${ext.map(r=>`<span class="ec-resp-chip ec-resp-extra">${esc(r)}</span>`).join('')}</div>`:''
    respHtml=`<div class="ec-resp-wrap"><span class="ec-resp-label">Resp.</span>${chips}${maisBtn}${extHtml}</div>`
  }

  // Status: só mostrar quando é confirmado ou falta — aguardando some
  const statusRelevante=entries.filter(e=>e.status!=='pending')
  const statusHtml=statusRelevante.length
    ?statusRelevante.map(e=>{
        const st=ST[e.status]||ST.pending
        const isFalta=e.status==='absent'
        return isFalta
          ?`<span class="ec-status" style="background:var(--abs-bg);color:var(--abs)">✕ ${e.faltaTipo==='injust'?'Injustificada':'Justificada'} — ${esc(e.role)}</span>`
          :`<span class="ec-status" style="background:${st.c}22;color:${st.c}">✓ ${esc(e.role)}</span>`
      }).join('')
    :''

  const detalheBtn=temDetalhes
    ?`<button class="ec-detalhe-btn" data-det-nome="${esc(nome)}" data-det-role="${esc(entries[0].role||'')}">📋 Ver funções</button>`
    :''

  // Chips de função — quando logado, cada chip tem botões inline ocultos que aparecem no hover
  const roleChipsHtml=entries.map(e=>{
    const isFalta=e.status==='absent'
    const k=`${date}|${shift}|${e.id}`
    const chipStyle=isFalta
      ?'border-color:var(--abs);color:var(--abs);background:var(--abs-bg)'
      :'border-color:var(--g200);color:var(--g700);background:#fff'
    const adminBtns=logado?`<span class="pc-chip-actions">
      <button class="pc-chip-btn" data-ed="${k}" title="Editar ${esc(e.role)}">✏</button>
      <button class="pc-chip-btn danger" data-dl="${k}" title="Excluir">✕</button>
      ${!isFalta?`<button class="pc-chip-btn warn" data-falta="${k}" title="Registrar falta">⚠</button>`:''}
    </span>`:''
    return `<span class="pc-role-chip${logado?' pc-role-editable':''}" style="${chipStyle}">
      ${esc(e.role||'—')}${isFalta?' ✕':''}${adminBtns}
    </span>`
  }).join('')

  // Botão de falta por função — visível e claro quando logado
  const faltaBtnsHtml=logado
    ?`<div class="pc-falta-row">
        ${entries.filter(e=>e.status!=='absent').map(e=>{
          const k=`${date}|${shift}|${e.id}`
          return `<button class="pc-falta-btn" data-falta="${k}">⚠ Falta — ${esc(e.role)}</button>`
        }).join('')}
      </div>`
    :''

  return `<div class="person-card">
    <div class="person-card-head">
      <div class="ec-right" style="flex:1;min-width:0">
        <div class="ec-name">${esc(nome)}</div>
        ${horHtml}
        ${respHtml}
      </div>
      ${detalheBtn}
    </div>
    <div class="person-card-roles">${roleChipsHtml}</div>
    ${statusHtml?`<div style="padding:0 12px 6px;display:flex;flex-wrap:wrap;gap:4px">${statusHtml}</div>`:''}
    ${faltaBtnsHtml}
  </div>`
}

      if(day.manha.length) chips+=`<div class="cal-chip chip-m">☀️ ${day.manha.length}</div>`
      if(day.noite.length) chips+=`<div class="cal-chip chip-n">🌙 ${day.noite.length}</div>`
      if(faltas) chips+=`<div class="cal-chip chip-f">✕${faltas}</div>`
      c.innerHTML=`<div class="cal-day-num">${parseInt(dateStr.split('-')[2])}</div><div class="cal-chips">${chips}</div>`
    }
  })
}

  }

    await logoutSupabase()
    G.user=null;localStorage.removeItem(SU);G.menu=false;toast('Sessão encerrada.','info');render()
  }
  const bmanual=document.getElementById('btn-manual');if(bmanual)bmanual.onclick=showManualModal
  const btemp=document.getElementById('btn-temp');if(btemp)btemp.onclick=showTempModal
  const bhorarios=document.getElementById('btn-horarios');if(bhorarios)bhorarios.onclick=showHorariosModal
  const bfolgas=document.getElementById('btn-folgas');if(bfolgas)bfolgas.onclick=showFolgasModal
  const btoday=document.getElementById('btn-today');if(btoday)btoday.onclick=()=>{
    const now=new Date()
    G.viewYear=now.getFullYear();G.viewMonth=now.getMonth()+1
    const today=now.toISOString().split('T')[0]
    G.selectedDate=dayMap[today]?today:null
    render()
  }
  const bprev=document.getElementById('btn-prev');if(bprev)bprev.onclick=()=>{
    G.viewMonth--;if(G.viewMonth<1){G.viewMonth=12;G.viewYear--}
    G.selectedDate=null;render()
  }
  const bnext=document.getElementById('btn-next');if(bnext)bnext.onclick=()=>{
    G.viewMonth++;if(G.viewMonth>12){G.viewMonth=1;G.viewYear++}
    G.selectedDate=null;render()
  }
  const bperiod=document.getElementById('btn-period');if(bperiod)bperiod.onclick=showPeriodModal
  // Painel fechar
  const pc=document.getElementById('panel-close');if(pc)pc.onclick=()=>{G.selectedDate=null;render()}

  // ESC fecha qualquer modal aberto ou painel
  document.onkeydown=ev=>{
    if(ev.key!=='Escape')return
    if(document.getElementById('dmodal'))  {document.getElementById('dmodal').remove();return}
    if(document.getElementById('det-popup')) {document.getElementById('det-popup').remove();return}
    if(document.getElementById('ajmodal')) {document.getElementById('ajmodal').remove();return}
    if(document.getElementById('mmanual')) {document.getElementById('mmanual').remove();return}
    if(document.getElementById('tmodal'))  {document.getElementById('tmodal').remove();return}
    if(document.getElementById('hmodal'))  {document.getElementById('hmodal').remove();return}
    if(document.getElementById('lmodal'))  {document.getElementById('lmodal').remove();return}
    if(document.getElementById('fmodal'))  {document.getElementById('fmodal').remove();return}
    if(document.getElementById('ftmodal')) {document.getElementById('ftmodal').remove();return}
    if(document.getElementById('pmodal'))  {document.getElementById('pmodal').remove();return}
    if(G.selectedDate){G.selectedDate=null;render()}
  }

  // Células do calendário
  document.querySelectorAll('[data-date]').forEach(cell=>{
    cell.onclick=()=>{
      const date=cell.dataset.date
      if(!dayMap[date])return
      G.selectedDate=G.selectedDate===date?null:date
      // Atualiza seleção visual sem full render
      document.querySelectorAll('[data-date]').forEach(c=>c.classList.toggle('selected',c.dataset.date===G.selectedDate))
      const area=document.getElementById('cal-area')
      if(area)area.classList.toggle('panel-open',!!G.selectedDate)
      // Remove painel antigo e insere novo
      document.getElementById('day-panel')?.remove()
      if(G.selectedDate){
        const layout=document.querySelector('.main-layout')
        if(layout){layout.insertAdjacentHTML('beforeend',buildDayPanel(G.selectedDate));bindPanel()}
      }
    }
  })

  bindPanel()
}

function bindPanel(){
  const pc=document.getElementById('panel-close');if(pc)pc.onclick=()=>{G.selectedDate=null;render()}
  // Scroll indicator
  const pb=document.getElementById('panel-body')
  if(pb){
    pb.onscroll=()=>pb.classList.toggle('scrolled',pb.scrollTop>10)
  }
  // Bind botões "Ver funções" → popup operacional completo
  document.querySelectorAll('.ec-detalhe-btn').forEach(b=>{
    b.onclick=ev=>{ev.stopPropagation();showDetalhes(b.dataset.detNome,b.dataset.detRole)}
  })
  // Carregar histórico remoto do dia selecionado (sem bloquear UI)
  if(G.selectedDate) loadHistoricoRemoto(G.selectedDate)

  // Botão ajuste manual
  document.querySelectorAll('[data-ajuste]').forEach(b=>{
    b.onclick=ev=>{ev.stopPropagation();showAjusteModal(b.dataset.ajuste)}
  })

  document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift]=b.dataset.add.split('|')
      const day=dayMap[date];if(!day)return
      day[shift].push({id:'n'+Date.now(),role:'',person:'',obs:'',status:'pending',confirmedAt:null,faltaTipo:null})
      save();rebuildPanel();rebuildCell(date)
    })
  })
  document.querySelectorAll('[data-ed]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift,id]=b.dataset.ed.split('|')
      const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
      b.closest('[data-k]').outerHTML=buildCard(date,shift,e,true)
      bindEdit(date,shift,id)
    })
  })
  document.querySelectorAll('[data-dl]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      if(!confirm('Excluir esta linha?'))return
      const[date,shift,id]=b.dataset.dl.split('|')
      const day=dayMap[date];if(!day)return
      day[shift]=day[shift].filter(e=>e.id!==id)
      save();toast('Linha removida.','info');rebuildPanel();rebuildCell(date)
    })
  })
  document.querySelectorAll('[data-falta]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift,id]=b.dataset.falta.split('|')
      const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
      showFaltaModal(date,shift,e)
    })
  })
}

function bindEdit(date,shift,id){
  const k=`${date}|${shift}|${id}`
  const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
  document.querySelectorAll(`[data-k="${k}"] [data-f]`).forEach(inp=>{
    inp.oninput=()=>{e[inp.dataset.f]=inp.value;save()}
  })
  const sv=document.querySelector(`[data-sv="${k}"]`)
  if(sv)sv.onclick=()=>{
    // Fase 4: exigir motivo antes de salvar
    const wrap=document.getElementById(`motivo-${k}`)
    if(wrap)wrap.style.display='block'
    sv.style.display='none'
    // Mostrar/ocultar input de texto quando "outro"
    const sel=document.getElementById(`motivo-sel-${k}`)
    const txt=document.getElementById(`motivo-txt-${k}`)
    if(sel&&txt) sel.onchange=()=>{txt.style.display=sel.value==='outro'?'block':'none'}
    // Botão confirmar
    const ok=document.getElementById(`motivo-ok-${k}`)
    if(ok)ok.onclick=()=>{
      const motivo=sel&&sel.value?( sel.value==='outro'?(txt&&txt.value.trim()||'outro')  :sel.value )  :''
      if(!motivo){toast('Selecione um motivo.','error');return}
      // Capturar antes/depois para histórico
      const antes=`${e.role} — ${e.person}`
      document.querySelectorAll(`[data-k="${k}"] [data-f]`).forEach(i=>{e[i.dataset.f]=i.value})
      const depois=`${e.role} — ${e.person}`
      // Fase 5: registrar no histórico
      registrarHistorico(e.person,antes,depois,motivo)
      save();toast('Salvo ✓ — motivo: '+motivo,'success')
      rebuildPanel();rebuildCell(date)
    }
  }
  const cx=document.querySelector(`[data-cx="${k}"]`)
  if(cx)cx.onclick=()=>{cx.closest('[data-k]').outerHTML=buildCard(date,shift,e);bindPanel()}
  document.querySelector(`[data-k="${k}"] input`)?.focus()
}

// Registra cada alteração feita pelo admin
let HISTORICO=[]
function registrarHistorico(pessoa,antes,depois,motivo){
  const entrada={
    at: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    editor: G.user?G.user.name:'?',
    pessoa,antes,depois,motivo
  }
  HISTORICO.push(entrada)
  if(HISTORICO.length>100) HISTORICO=HISTORICO.slice(-100)
  // Salvar no Supabase em background
  saveHistoricoRemoto(entrada)
}

// ===== AUTH =====
function requireAuth(fn){
  if(G.user&&G.user.can&&G.user.can.edit){fn();return}
  showLoginModal(fn)
}

function showLoginModal(onSuccess){
  document.getElementById('lmodal')?.remove()
  const useSupaAuth = false // Login local por enquanto
  const m=document.createElement('div');m.id='lmodal'
  // Campo de email (Supabase) ou usuário (fallback local)
  const inputLabel = useSupaAuth ? 'E-mail' : 'Usuário'
  const inputPlaceholder = useSupaAuth ? 'seu@email.com' : 'admin, vitoria, viviane ou gabriela'
  const inputType = useSupaAuth ? 'email' : 'text'

  m.innerHTML=`<div class="modal-bg" id="lmbg">
    <div class="modal-card" style="max-width:360px">
      <div class="card-top">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
        <span class="fallback" style="display:none">🥟</span>
        <div class="card-top-sub">Acesso restrito</div>
      </div>
      <div class="card-body">
        <div class="l-title">Identificação necessária</div>
        <div class="l-sub">Logins: <b>admin</b> · <b>vitoria</b> · <b>viviane</b> · <b>gabriela</b><br/>Senha: <b>2026</b></div>
        <div class="field">
          <label>${inputLabel}</label>
          <input class="inp" id="mu" type="${inputType}" placeholder="${inputPlaceholder}" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="inp-wr">
            <input class="inp" id="mp" type="password" placeholder="••••••"/>
            <button class="eye" id="meye">👁</button>
          </div>
        </div>
        <div class="l-err" id="merr"></div>
        <div style="display:flex;gap:9px">
          <button class="l-btn" id="mcancel" style="background:var(--g200);color:var(--g700);flex:0 0 auto;width:auto;padding:12px 16px">Cancelar</button>
          <button class="l-btn" id="mlogin" style="flex:1">Entrar</button>
        </div>
      </div>
    </div>
  </div>`

  document.body.appendChild(m)
  document.getElementById('mu').focus()
  document.getElementById('meye').onclick=()=>{const p=document.getElementById('mp');p.type=p.type==='password'?'text':'password'}
  document.getElementById('mcancel').onclick=()=>m.remove()
  document.getElementById('lmbg').onclick=ev=>{if(ev.target===ev.currentTarget)m.remove()}
  document.getElementById('mp').onkeydown=ev=>{if(ev.key==='Enter')tryLogin()}
  document.getElementById('mu').onkeydown=ev=>{if(ev.key==='Enter')document.getElementById('mp').focus()}
  document.getElementById('mlogin').onclick=tryLogin

  async function tryLogin(){
    const u=(document.getElementById('mu').value||'').trim()
    const p=document.getElementById('mp').value||''
    const err=document.getElementById('merr')
    const btn=document.getElementById('mlogin')
    if(!u){err.textContent='⚠ Informe o '+inputLabel.toLowerCase()+'.';err.style.display='block';return}
    if(!p){err.textContent='⚠ Informe a senha.';err.style.display='block';return}
    btn.innerHTML='<span class="spinner"></span>';btn.disabled=true

    if(useSupaAuth){
      // ── Login via Supabase Auth ──
      const supaUser = await loginSupabase(u, p)
      if(supaUser){
        const profile=USER_PROFILES[u]||USER_PROFILES[supaUser.email]
        if(profile){
          G.user={u:supaUser.email,email:supaUser.email,...profile}
          localStorage.setItem(SU,JSON.stringify(G.user))
          m.remove();toast('Olá, '+G.user.name+'! ✓','success');render()
          if(onSuccess)onSuccess()
        } else {
          show('Usuário sem permissão de acesso.')
          await logoutSupabase()
        }
      } else {
        show('E-mail ou senha incorretos.')
      }
    } else {
      // ── Fallback: login local (modo offline/dev) ──
      setTimeout(()=>{
        const f=USERS_DEV.find(x=>x.u.toLowerCase()===u.toLowerCase())
        if(!f){show('Usuário não encontrado.');return}
        if(p!==f.p){show('Senha incorreta.');return}
        G.user={u:f.u,role:f.role,name:f.name,av:f.av,can:f.can}
        m.remove();toast('Olá, '+G.user.name+'! ✓','success');render()
        if(onSuccess)onSuccess()
      },350)
    }
    function show(msg){err.textContent='⚠ '+msg;err.style.display='block';btn.innerHTML='Entrar';btn.disabled=false}
  }
}

// ── POPUP DETALHES DA PESSOA — PAINEL OPERACIONAL COMPLETO ──
function showDetalhes(nome, funcaoAtual){
  document.getElementById('dmodal')?.remove()
  const hor=getHorario(nome)
  const func=getFuncoes(nome)
  const resps=getResponsabilidades(nome)||[]
  const m=document.createElement('div');m.id='dmodal'
  m.className='detalhe-popup'

  // 2. Horário
  const horSection=hor&&hor.horario?`
    <div class="dp-section">
      <div class="dp-section-label">Horário</div>
      <div class="dp-hor-row">
        <span class="dp-hor-badge">🕐 ${esc(hor.horario)}</span>
        <span class="dp-hor-badge">🍽 ${esc(hor.almoco)}</span>
      </div>
    </div>`:''

  // 3. Função principal + padrão do dia + função de hoje
  const funcPrincipal=func?.funcaoPrincipal||null
  const padraoDia=func?.padraoDia||null
  // Descobrir o dia da semana do painel aberto
  const wdAtual=G.selectedDate?dayMap[G.selectedDate]?.wd:null
  const padraoHoje=padraoDia&&wdAtual?padraoDia[wdAtual]:null

  const funcDiaSection=`
    <div class="dp-section">
      ${funcPrincipal?`
        <div class="dp-section-label">Função principal</div>
        <span class="dp-funcao-principal">${esc(funcPrincipal)}</span>
      `:''}
      ${padraoHoje?`
        <div class="dp-section-label" style="margin-top:8px">Padrão de hoje (${esc(wdAtual)})</div>
        <span class="dp-padrao-dia">${esc(padraoHoje)}</span>
      `:''}
      ${funcaoAtual&&funcaoAtual!==funcPrincipal?`
        <div class="dp-section-label" style="margin-top:8px">Função escalada agora</div>
        <span class="dp-funcao-hoje">${esc(funcaoAtual)}</span>
      `:''}
    </div>`

  // 4. Funções possíveis
  let funcSection=''
  if(func&&func.funcoes.length){
    const itens=func.funcoes.map(f=>{
      const isCurr=funcaoAtual&&f.toLowerCase()===funcaoAtual.toLowerCase()
      const desc=func.detalhes[f]||''
      return`<div class="dp-func-item${isCurr?' dp-func-hoje':''}">
        <div class="dp-func-nome">${isCurr?'🔴 ':''}${esc(f)}${isCurr?' <span class="dp-hoje-tag">HOJE</span>':''}</div>
        ${desc?`<div class="dp-func-desc">${esc(desc)}</div>`:''}
      </div>`
    }).join('')
    funcSection=`
      <div class="dp-section">
        <div class="dp-section-label">Funções</div>
        <div class="dp-bloco-badge">${esc(func.bloco)}</div>
        ${itens}
      </div>`
  }

  // 5+6. Responsabilidades operacionais (com destaque para críticas)
  let respSection=''
  if(resps.length){
    const chips=resps.map(r=>{
      const crit=isCritica(r)
      return`<span class="dp-resp-chip${crit?' dp-resp-critica':''}">${crit?'⚡ ':''}${esc(r)}</span>`
    }).join('')
    respSection=`
      <div class="dp-section">
        <div class="dp-section-label">Responsabilidades</div>
        <div class="dp-resp-list">${chips}</div>
      </div>`
  }

  // 7. Obs operacionais (vem de func.detalhes da função atual se houver)
  const obsText=func&&funcaoAtual&&func.detalhes[funcaoAtual]?func.detalhes[funcaoAtual]:''
  const obsSection=obsText?`
    <div class="dp-section">
      <div class="dp-section-label">Obs. operacional</div>
      <div class="dp-obs">${esc(obsText)}</div>
    </div>`:''

  // 7b. Ajuste do dia (se houver) — busca no dayMap
  let ajusteSection=''
  if(G.selectedDate){
    const day=dayMap[G.selectedDate]
    if(day){
      const allE=[...day.manha,...day.noite]
      const entry=allE.find(x=>normStr(x.person||'').startsWith(normStr(nome||'').split(' ')[0]))
      const aj=entry&&entry.ajuste&&entry.ajuste.tipo?entry.ajuste:null
      if(aj){
        const meta=getAjusteMeta(aj.tipo)
        ajusteSection=`
          <div class="dp-section">
            <div class="dp-section-label">Ajuste do dia</div>
            <div class="dp-ajuste-bloco">
              <span class="dp-ajuste-tipo">${meta.icon} ${meta.label}</span>
              ${aj.descricao?`<div class="dp-ajuste-desc">${esc(aj.descricao)}</div>`:''}
              ${aj.observacao?`<div class="dp-ajuste-obs">${esc(aj.observacao)}</div>`:''}
              ${aj.aprovadoPor?`<div class="dp-ajuste-apr">✓ Aprovado por ${esc(aj.aprovadoPor)}</div>`:''}
            </div>
          </div>`
      }
    }
  }

  // 8. Regra do dia
  const regraSection=`
    <div class="dp-regra">
      ${REGRA_OPERACIONAL.itens.map(i=>`<div class="dp-regra-item">${esc(i)}</div>`).join('')}
    </div>`

  // 9. Transição checklist
  const transSection=`
    <div class="dp-trans">
      <div class="dp-trans-atual">${esc(TRANSICAO_CHECKLIST.atual)}</div>
      <div class="dp-trans-futuro">${esc(TRANSICAO_CHECKLIST.futuro)}</div>
    </div>`

  const turnoLabel=hor?(hor.turno==='manha'?'☀️ Manhã':hor.turno==='estagiario'?'📋 Estagiário':'🌙 Noite'):''

  m.innerHTML=`
    <div class="dp-overlay" id="dp-overlay">
      <div class="dp-card">
        <div class="dp-head">
          <div>
            <div class="dp-nome">${esc(nome)}</div>
            ${turnoLabel?`<div class="dp-turno">${turnoLabel}</div>`:''}
          </div>
          <button class="dp-close" onclick="document.getElementById('dmodal').remove()">✕</button>
        </div>
        <div class="dp-body">
          ${horSection}
          ${funcDiaSection}
          ${funcSection}
          ${respSection}
          ${obsSection}
          ${ajusteSection}
          ${regraSection}
          ${transSection}
        </div>
      </div>
    </div>`

  document.body.appendChild(m)
  document.getElementById('dp-overlay').onclick=ev=>{if(ev.target.id==='dp-overlay')m.remove()}
}

    if(!tipo){toast('Selecione um tipo.','error');return}
    const desc=document.getElementById('aj-desc').value.trim()
    if(!desc){toast('Informe uma descrição.','error');return}
    const antes=e.ajuste?getAjusteMeta(e.ajuste.tipo).label:'—'
    e.ajuste={
      tipo,
      descricao:desc,
      observacao:document.getElementById('aj-obs').value.trim(),
      aprovadoPor:document.getElementById('aj-apr').value.trim()
    }
    save()
    saveDay(date)
    registrarHistorico(e.person,
      `Ajuste: ${antes}`,
      `Ajuste: ${getAjusteMeta(tipo).label} — ${desc}`,
      'ajuste manual')
    toast(`Ajuste registrado para ${e.person}.`,'success')
    m.remove()
    rebuildPanel();rebuildCell(date)
  }

  const remBtn=document.getElementById('aj-remover')
  if(remBtn)remBtn.onclick=()=>{
    const antes=getAjusteMeta(e.ajuste?.tipo||'').label
    delete e.ajuste
    save();saveDay(date)
    registrarHistorico(e.person,`Ajuste: ${antes}`,'Ajuste removido','remoção de ajuste')
    toast('Ajuste removido.','info')
    m.remove()
    rebuildPanel();rebuildCell(date)
  }
}

function showFolgasModal(){
  document.getElementById('fmodal')?.remove()
  const todos=new Set()
  G.days.forEach(d=>[...d.manha,...d.noite].forEach(e=>{if(e.person)todos.add(e.person)}))
  const doms=G.days.filter(d=>d.wd==='Dom')
  const linhas=doms.map(dom=>{
    const trab=new Set([...dom.manha,...dom.noite].map(e=>e.person).filter(Boolean))
    const folg=[...todos].filter(p=>!trab.has(p)).sort()
    const dn=parseInt(dom.date.split('-')[2])
    const domParts=dom.date.split('-')
    return`<div class="folga-dom">
      <div class="folga-dom-title">Domingo ${String(dn).padStart(2,'0')}/${domParts[1]}/${domParts[0]}</div>

      <div class="folga-section"><div class="folga-lbl">De folga (${folg.length})</div>${folg.length?folg.map(p=>`<span class="folga-pill" style="background:var(--g100);color:var(--g700)">🌴 ${esc(p)}</span>`).join(''):'<span style="font-size:12px;color:var(--g300);font-style:italic">Todos escalados</span>'}</div>

function registrarFalta(date,shift,entry,tipo,dn,turno){
  try{
    const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===entry.id);if(!e)return
    e.status='absent';e.faltaTipo=tipo;e.faltaAt=Date.now()
    save()
    rebuildPanel();rebuildCell(date)
    const data=String(dn).padStart(2,'0')+'/'+date.split('-')[1]+'/'+date.split('-')[0]
    const texto=tipo==='just'
      ?`📋 *Comunicado de Falta — Pastel da Camila*\n\n*Colaborador:* ${e.person}\n*Função:* ${e.role}\n*Turno:* ${turno}\n*Data:* ${data}\n*Tipo:* Falta JUSTIFICADA\n\nFavor registrar em folha de ponto e solicitar atestado.`
      :`🚨 *Comunicado de Falta — Pastel da Camila*\n\n*Colaborador:* ${e.person}\n*Função:* ${e.role}\n*Turno:* ${turno}\n*Data:* ${data}\n*Tipo:* Falta NÃO JUSTIFICADA ⚠\n\nFavor registrar em folha de ponto para desconto conforme CLT.`
    window.open('https://wa.me/'+RH+'?text='+encodeURIComponent(texto),'_blank')
    toast('Falta de '+e.person+' registrada.','success')
  }catch(err){toast('Erro ao registrar falta.','error')}
}
