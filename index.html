<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Pastel da Camila – Escala Abril</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
/*
  ANTI-BRANCO: html/body têm background antes de qualquer JS.
  window.onerror exibe mensagem de erro na tela.
  Cache v6 — incrementar ao mudar estrutura de dados.
*/
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#EA1D2C;--red2:#C0121F;--red-bg:#FFF0F1;
  --g50:#F7F7F7;--g100:#F0F0F0;--g200:#E0E0E0;--g300:#BDBDBD;
  --g400:#9E9E9E;--g700:#424242;--g900:#212121;
  --ok:#27AE60;--ok-bg:#E8F5E9;
  --pend:#F39C12;--pend-bg:#FFF8E1;
  --abs:#E74C3C;--abs-bg:#FFEBEE;
  --manha:#F9A825;--manha-bg:#FFFDE7;--manha-b:#FFE082;
  --noite:#5E35B1;--noite-bg:#F3E5F5;--noite-b:#CE93D8;
  --panel-w:420px;
}
html,body{min-height:100vh;background:var(--g50);color:var(--g900)}
body{font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none}
input{font-family:'Nunito',sans-serif;outline:none}
#app{min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  height:58px;background:var(--red);
  display:flex;align-items:center;padding:0 18px;gap:14px;
  box-shadow:0 2px 16px rgba(234,29,44,.35)
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-logo{height:42px;width:42px;object-fit:contain;filter:drop-shadow(0 1px 6px rgba(0,0,0,.3))}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#fff;line-height:1.1}
.brand-sub{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.topbar-mid{flex:1;text-align:center;font-size:13px;color:rgba(255,255,255,.85);font-weight:700}
.topbar-mid b{color:#fff}
.top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tbtn-white{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:9px;padding:6px 12px;color:#fff;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;transition:background .15s}
.tbtn-white:hover,.tbtn-white:active{background:rgba(255,255,255,.28)}
.av{width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);min-width:200px;padding:6px;z-index:400;animation:fadeIn .2s ease}
.ddi{display:flex;align-items:center;gap:8px;width:100%;padding:11px 14px;border-radius:8px;background:none;border:none;font-size:14px;font-weight:700;color:var(--g700);cursor:pointer;text-align:left;font-family:'Nunito',sans-serif}
.ddi:hover{background:var(--g50)}
.ddi.danger{color:var(--red);background:var(--red-bg)}
.ddi.red{color:var(--red)}
.dd-div{height:1px;background:var(--g100);margin:4px 0}
.ov{position:fixed;inset:0;z-index:300}

/* ── LAYOUT PRINCIPAL ── */
.main-layout{
  position:relative;
  min-height:calc(100vh - 58px);
}

/* ── ÁREA DO CALENDÁRIO ── */
.cal-area{
  padding:20px 18px 40px;
  transition:margin-right .3s ease;
}
/* Quando painel aberto: empurra calendário pra esquerda */
.cal-area.panel-open{
  margin-right:var(--panel-w);
}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--g900);letter-spacing:.3px}
.cal-sub{font-size:13px;color:var(--g400);font-weight:600;margin-top:2px}
.cal-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cta-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;font-size:13px;font-weight:700;color:var(--g700);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;white-space:nowrap}
.cta-btn:hover{border-color:var(--red);color:var(--red)}
.cta-btn.red{background:var(--red);border-color:var(--red);color:#fff}
.cta-btn.red:hover{background:var(--red2)}

/* ── GRID CALENDÁRIO ── */
.cal-grid-wrap{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);overflow:hidden;border:1px solid var(--g200)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--g900)}
.cal-wd{padding:8px 4px;text-align:center;font-size:11px;font-weight:800;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px}
.cal-wd:first-child{color:#FF6B6B}/* Dom vermelho */
.cal-wd:last-child{color:#FF6B6B}/* Sáb vermelho */

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--g200)}

/* Célula do dia */
.cal-cell{
  background:#fff;min-height:100px;padding:8px 8px 6px;
  cursor:pointer;position:relative;
  transition:background .15s;
  display:flex;flex-direction:column;gap:4px;
  overflow:hidden;
}
/* Quando painel aberto, células ficam mais compactas */
.cal-area.panel-open .cal-cell{min-height:80px;padding:6px 6px 4px}
.cal-cell:hover{background:#FAFAFA}
.cal-cell.empty{background:var(--g50);cursor:default}
.cal-cell.selected{background:#FFF0F1;outline:2px solid var(--red);outline-offset:-2px;z-index:1}
.cal-cell.today{background:#FFF8E1}
.cal-cell.today .cal-day-num{background:var(--red);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.cal-cell.no-data{opacity:.4;cursor:default}

.cal-day-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:700;color:var(--g700);
  line-height:1;margin-bottom:4px;
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px
}
.cal-cell.selected .cal-day-num{background:var(--red);color:#fff;border-radius:50%}
.cal-cell.today:not(.selected) .cal-day-num{background:var(--red);color:#fff;border-radius:50%}

/* Chips de resumo dentro da célula */
.cal-chips{display:flex;flex-direction:column;gap:3px}
.cal-chip{
  display:flex;align-items:center;gap:4px;
  border-radius:5px;padding:2px 6px;font-size:10px;font-weight:800;
  white-space:nowrap;overflow:hidden
}
.chip-m{background:var(--manha-bg);color:#795500}
.chip-n{background:var(--noite-bg);color:#311B92}
.chip-f{background:var(--abs-bg);color:var(--abs)}
.cal-wd-label{font-size:9px;font-weight:700;color:var(--g300);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}

/* ── PAINEL LATERAL ── */
.day-panel{
  position:fixed;
  top:58px;
  right:0;
  bottom:0;
  width:var(--panel-w);
  background:#fff;
  border-left:1px solid var(--g200);
  box-shadow:-8px 0 32px rgba(0,0,0,.08);
  z-index:150;
  display:flex;
  flex-direction:column;
  animation:slideRight .25s ease;
  overflow:hidden;
}
.panel-head{
  background:var(--red);padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;/* cabeçalho não encolhe */
}
.panel-date{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:.3px}
.panel-wd{font-size:11px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.panel-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}
.panel-body{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 16px 32px;
  display:block;
}
.panel-body > *{margin-bottom:12px;}
.panel-body > *:last-child{margin-bottom:0;}

/* Turno dentro do painel */
.shift-block{border-radius:12px;overflow:hidden}
.shift-block.manha{border:1.5px solid var(--manha-b);background:var(--manha-bg)}
.shift-block.noite{border:1.5px solid var(--noite-b);background:var(--noite-bg)}
.shift-head{display:flex;align-items:center;gap:8px;padding:9px 14px}
.shift-block.manha .shift-head{background:var(--manha)}
.shift-block.noite .shift-head{background:var(--noite)}
.shift-head-icon{font-size:14px}
.shift-head-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff;flex:1}
.shift-head-count{font-size:11px;color:rgba(255,255,255,.8);font-weight:600}

/* Botão adicionar */
.add-btn{display:block;width:100%;padding:9px;background:none;border:none;border-top:1.5px dashed var(--g200);font-size:13px;font-weight:700;color:var(--red);cursor:pointer;text-align:center;font-family:'Nunito',sans-serif}
.add-btn:hover{background:var(--red-bg)}

/* Cards de entrada no painel */
.entry-cards{display:flex;flex-direction:column;gap:6px;padding:8px 10px 4px;background:#fff}
.entry-card{
  display:flex;align-items:flex-start;gap:9px;
  background:#fff;border:1px solid var(--g100);border-radius:10px;
  padding:10px 11px;box-shadow:0 1px 3px rgba(0,0,0,.04)
}
.entry-card.falta{background:var(--abs-bg);border-color:#FFCDD2}
.entry-card.editing{background:var(--pend-bg);border-color:var(--pend)}
.ec-role{
  background:var(--g100);color:var(--g700);
  border-radius:6px;padding:3px 8px;
  font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:1px
}
.ec-right{flex:1;min-width:0}
.ec-name{font-size:14px;font-weight:800;color:var(--g900);margin-bottom:2px}
.ec-obs{font-size:11px;color:var(--g400);font-style:italic;margin-bottom:4px}
.ec-status{display:inline-flex;align-items:center;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.ec-actions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ec-btn{display:inline-flex;align-items:center;gap:3px;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;min-height:30px}
.ec-btn.edit{background:#E3F2FD;color:#1565C0}
.ec-btn.del{background:var(--red-bg);color:var(--red)}
.ec-btn.falta-btn{background:#FFF3E0;color:#E65100}

/* Edição inline no card */
.ec-inputs{display:flex;flex-direction:column;gap:6px;flex:1}
.ec-inp-row{display:flex;flex-direction:column;gap:2px}
.ec-inp-label{font-size:9px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px}
.ec-inp{border:1.5px solid var(--g200);border-radius:7px;padding:7px 9px;font-size:13px;color:var(--g900);background:#fff;font-family:'Nunito',sans-serif;width:100%}
.ec-inp:focus{border-color:var(--red);outline:none}
.ec-save-row{display:flex;gap:7px;margin-top:3px}
.ec-save{background:var(--ok);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex:1}
.ec-cancel{background:var(--g100);color:var(--g700);border:none;border-radius:7px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}

/* ── MODAIS ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
.modal-card{background:#fff;border-radius:20px;box-shadow:0 8px 48px rgba(0,0,0,.2);width:100%;overflow:hidden;animation:fadeIn .25s ease}
.modal-head{background:var(--red);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.3px}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}
.modal-body{padding:18px 20px 22px;max-height:75vh;overflow-y:auto}

/* Login */
.card-top{background:var(--red);padding:24px 20px 16px;display:flex;flex-direction:column;align-items:center}
.card-top img{width:110px;height:110px;object-fit:contain;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.card-top .fallback{font-size:48px;line-height:1}
.card-top-sub{font-size:10px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:7px}
.card-body{padding:20px 22px 24px}
.l-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--g700);text-align:center;margin-bottom:3px}
.l-sub{font-size:12px;color:var(--g400);font-weight:600;text-align:center;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.7px}
.inp{border:2px solid var(--g200);border-radius:10px;padding:10px 13px;font-size:15px;color:var(--g900);background:#FAFAFA;width:100%;transition:border-color .2s;font-family:'Nunito',sans-serif}
.inp:focus{border-color:var(--red);background:#fff;outline:none}
.inp-wr{position:relative}
.inp-wr .inp{padding-right:40px}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--g300);cursor:pointer;font-size:15px;padding:4px}
.l-err{background:var(--red-bg);border:1px solid #FFCDD2;border-radius:8px;padding:9px 13px;font-size:13px;color:#C0121F;font-weight:700;margin-bottom:12px;display:none}
.l-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;width:100%;min-height:46px;display:flex;align-items:center;justify-content:center;transition:background .2s;font-family:'Nunito',sans-serif}
.l-btn:hover{background:var(--red2)}
.l-btn:disabled{opacity:.6;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* Folgas */
.folga-dom{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--g100)}
.folga-dom:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.folga-dom-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--red);margin-bottom:10px}
.folga-section{margin-bottom:7px}
.folga-lbl{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.folga-pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;margin:2px}

/* Falta */
.falta-info{background:#FFF3E0;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:14px;color:var(--g700);line-height:1.7}
.falta-btns{display:flex;flex-direction:column;gap:9px}
.falta-btn{border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:#fff;display:flex;align-items:center;gap:8px}
.falta-btn.just{background:#E65100}
.falta-btn.injust{background:#B71C1C}
.falta-btn.cancel{background:var(--g100);color:var(--g700)}

/* TOAST */
.toast-stack{position:fixed;bottom:16px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:10px 15px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.18);animation:slideUp .3s ease;max-width:280px}
.ts{background:var(--ok)}.te{background:var(--red)}.ti{background:var(--g700)}

/* ── MOBILE ── */
@media(max-width:640px){
  :root{--panel-w:100vw}
  .topbar-mid{display:none}
  .topbar{height:54px;padding:0 12px}
  .brand-sub{display:none}
  .brand-logo{height:38px;width:38px}
  /* No mobile o painel cobre tudo - ajusta o top para a topbar menor */
  .day-panel{
    top:54px;
    left:0;
    width:100%;
    animation:slideUp .25s ease;
    z-index:500;
  }
  /* No mobile o calendário não precisa de margin quando painel aberto */
  .cal-area.panel-open{
    margin-right:0;
  }
  .cal-cell{min-height:72px;padding:5px 5px 4px}
  .cal-day-num{font-size:14px;width:22px;height:22px}
  .cal-chip{font-size:9px;padding:1px 5px}
  .cal-area{padding:12px 8px 32px}
  .cal-header{margin-bottom:12px}
  .cal-title{font-size:22px}
}
@media(max-width:380px){
  .cal-cell{min-height:58px;padding:4px 3px 3px}
  .cal-chips{gap:2px}
  .cal-chip{display:none}
  .cal-wd{font-size:9px;padding:6px 2px}
}
</style>
</head>

function toast(m,t='info'){
  try{
    const el=document.createElement('div')
    el.className='toast t'+t[0]
    el.textContent=(t==='success'?'✓ ':t==='error'?'⚠ ':'ℹ ')+m
    document.getElementById('toasts').appendChild(el)
    setTimeout(()=>el.remove(),3000)
  }catch(e){}
}

// ── INIT ──
function init(){
  try{const u=localStorage.getItem(SU);if(u)G.user=JSON.parse(u)}catch(e){localStorage.removeItem(SU)}
  try{
    const d=localStorage.getItem(SD)
    if(d){const p=JSON.parse(d);if(Array.isArray(p)&&p.length>0&&p[0].date)G.days=p;else throw 0}
    else G.days=clone(BASE)
  }catch(e){localStorage.removeItem(SD);G.days=clone(BASE)}
  // Rebuilds dayMap from loaded days
  G.days.forEach(d=>dayMap[d.date]=d)
  // Seleciona hoje se existir na escala
  const today=new Date().toISOString().split('T')[0]
  if(dayMap[today])G.selectedDate=today
  render()
}

}

// ── CALENDÁRIO ──
function buildCalendar(){
  const today=new Date().toISOString().split('T')[0]
  // Abril 2025 começa na Terça (jsDay=2). Preenche células vazias antes.
  // 01/04/2025 = dia da semana 2 (Ter), grid começa no Dom (0)
  const firstDay=2 // Terça
  const daysInMonth=30

  let cells=''
  // Células vazias antes do dia 1
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-cell empty"></div>`

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`2025-04-${String(d).padStart(2,'0')}`
    const dayData=dayMap[dateStr]
    const isToday=dateStr===today
    const isSel=dateStr===G.selectedDate

    if(!dayData){
      // Segunda-feira (fechado)
      cells+=`<div class="cal-cell no-data"><div class="cal-day-num">${d}</div></div>`
      continue
    }

    const allE=[...dayData.manha,...dayData.noite]
    const faltas=allE.filter(e=>e.status==='absent').length

    let chips=''
    if(dayData.manha.length) chips+=`<div class="cal-chip chip-m">☀️ ${dayData.manha.length}</div>`
    if(dayData.noite.length) chips+=`<div class="cal-chip chip-n">🌙 ${dayData.noite.length}</div>`
    if(faltas) chips+=`<div class="cal-chip chip-f">✕${faltas}</div>`

    cells+=`<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}" data-date="${dateStr}">
      <div class="cal-day-num">${d}</div>
      <div class="cal-chips">${chips}</div>
    </div>`
  }

  // Células vazias no final para completar a semana
  const totalCells=firstDay+daysInMonth
  const remainder=totalCells%7
  if(remainder>0){for(let i=0;i<7-remainder;i++) cells+=`<div class="cal-cell empty"></div>`}

  return `<div class="cal-grid-wrap">
    <div class="cal-weekdays">
      <div class="cal-wd">Dom</div><div class="cal-wd">Seg</div><div class="cal-wd">Ter</div>
      <div class="cal-wd">Qua</div><div class="cal-wd">Qui</div><div class="cal-wd">Sex</div><div class="cal-wd">Sáb</div>
    </div>
    <div class="cal-grid">${cells}</div>
  </div>`
}

// ── PAINEL DO DIA ──
function buildDayPanel(dateStr){
  const day=dayMap[dateStr];if(!day)return''
  const d=parseInt(dateStr.split('-')[2])
  const MESES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']
  const title=`${String(d).padStart(2,'0')} abr 2025`
  return `<div class="day-panel" id="day-panel">
    <div class="panel-head">
      <div>
        <div class="panel-date">${title}</div>
        <div class="panel-wd">${day.wd} · ${day.manha.length} manhã · ${day.noite.length} noite</div>
      </div>
      <button class="panel-close" id="panel-close">✕ Fechar</button>
    </div>
    <div class="panel-body" id="panel-body">
      ${day.manha.length?buildShiftPanel(day,'manha'):''}
      ${day.noite.length?buildShiftPanel(day,'noite'):''}
    </div>
  </div>`
}

function buildShiftPanel(day,shift){
  const m=shift==='manha'
  const entries=day[shift]
  const canAdd=G.user&&G.user.can&&G.user.can.add
  return `<div class="shift-block ${m?'manha':'noite'}">
    <div class="shift-head">
      <span class="shift-head-icon">${m?'☀️':'🌙'}</span>
      <span class="shift-head-label">${m?'Manhã':'Noite'}</span>
      <span class="shift-head-count">${entries.length} funções</span>
    </div>
    <div class="entry-cards" id="cards-${day.date}-${shift}">
      ${entries.map(e=>buildCard(day.date,shift,e)).join('')}
    </div>
    ${canAdd?`<button class="add-btn" data-add="${day.date}|${shift}">+ Adicionar</button>`:''}
  </div>`
}

function buildCard(date,shift,e,editing){
  const st=ST[e.status]||ST.pending
  const k=`${date}|${shift}|${e.id}`
  const logado=G.user&&G.user.can&&G.user.can.edit
  const isFalta=e.status==='absent'

  if(editing){
    return `<div class="entry-card editing" data-k="${k}">
      <div class="ec-inputs">
        <div class="ec-inp-row"><span class="ec-inp-label">Função</span><input class="ec-inp" data-f="role" value="${esc(e.role)}" placeholder="Função"/></div>
        <div class="ec-inp-row"><span class="ec-inp-label">Pessoa</span><input class="ec-inp" data-f="person" value="${esc(e.person)}" placeholder="Nome"/></div>
        <div class="ec-inp-row"><span class="ec-inp-label">Obs.</span><input class="ec-inp" data-f="obs" value="${esc(e.obs)}" placeholder="Observação..."/></div>
        <div class="ec-save-row">
          <button class="ec-save" data-sv="${k}">✓ Salvar</button>
          <button class="ec-cancel" data-cx="${k}">Cancelar</button>
        </div>
      </div>
    </div>`
  }

  const statusHtml=isFalta
    ?`<span class="ec-status" style="background:var(--abs-bg);color:var(--abs)">✕ ${e.faltaTipo==='injust'?'Injustificada':'Justificada'}</span>`
    :`<span class="ec-status" style="background:${st.c}22;color:${st.c}">${st.l}</span>`

  const acoes=logado?`<div class="ec-actions">
    <button class="ec-btn edit" data-ed="${k}">✏️ Editar</button>
    <button class="ec-btn del" data-dl="${k}">🗑️</button>
    ${!isFalta?`<button class="ec-btn falta-btn" data-falta="${k}">⚠ Falta</button>`:''}
  </div>`:''

  return `<div class="entry-card${isFalta?' falta':''}" data-k="${k}">
    <span class="ec-role">${esc(e.role||'—')}</span>
    <div class="ec-right">
      <div class="ec-name">${esc(e.person||'—')}</div>
      ${e.obs?`<div class="ec-obs">${esc(e.obs)}</div>`:''}
      ${statusHtml}
      ${acoes}
    </div>
  </div>`
}

// ── REBIND PAINEL ──
function rebuildPanel(){
  if(!G.selectedDate)return
  const body=document.getElementById('panel-body')
  if(!body)return
  const day=dayMap[G.selectedDate];if(!day)return
  body.innerHTML=(day.manha.length?buildShiftPanel(day,'manha'):'')+(day.noite.length?buildShiftPanel(day,'noite'):'')
  bindPanel()
}

// Rebuid só a célula do calendário selecionada
function rebuildCell(dateStr){
  const cells=document.querySelectorAll('[data-date]')
  cells.forEach(c=>{
    if(c.dataset.date===dateStr){
      const today=new Date().toISOString().split('T')[0]
      const day=dayMap[dateStr];if(!day)return
      const allE=[...day.manha,...day.noite]
      const faltas=allE.filter(e=>e.status==='absent').length
      let chips=''
      if(day.manha.length) chips+=`<div class="cal-chip chip-m">☀️ ${day.manha.length}</div>`
      if(day.noite.length) chips+=`<div class="cal-chip chip-n">🌙 ${day.noite.length}</div>`
      if(faltas) chips+=`<div class="cal-chip chip-f">✕${faltas}</div>`
      c.innerHTML=`<div class="cal-day-num">${parseInt(dateStr.split('-')[2])}</div><div class="cal-chips">${chips}</div>`
    }
  })
}

// ── BIND GERAL ──
function bindAll(){
  // Topbar
  const mb=document.getElementById('mbtn')
  if(mb)mb.onclick=()=>{if(!G.user){showLoginModal(()=>{});return}G.menu=!G.menu;render()}
  const dov=document.getElementById('dov');if(dov)dov.onclick=()=>{G.menu=false;render()}
  const dref=document.getElementById('dref');if(dref)dref.onclick=()=>{
    const keep=[SU,SD];Object.keys(localStorage).forEach(k=>{if(!keep.includes(k))localStorage.removeItem(k)})
    G.menu=false;toast('Painel atualizado.','info');render()
  }
  const dreset=document.getElementById('dreset');if(dreset)dreset.onclick=()=>{
    if(!G.cr){G.cr=true;render();setTimeout(()=>{G.cr=false;if(G.menu)render()},3000);return}
    localStorage.removeItem(SD);G.days=clone(BASE);G.days.forEach(d=>dayMap[d.date]=d)
    G.cr=false;G.menu=false;G.selectedDate=null;toast('Escala resetada.','info');render()
  }
  const dout=document.getElementById('dout');if(dout)dout.onclick=()=>{
    G.user=null;localStorage.removeItem(SU);G.menu=false;toast('Sessão encerrada.','info');render()
  }
  const bfolgas=document.getElementById('btn-folgas');if(bfolgas)bfolgas.onclick=showFolgasModal
  const btoday=document.getElementById('btn-today');if(btoday)btoday.onclick=()=>{
    const today=new Date().toISOString().split('T')[0]
    if(dayMap[today]){G.selectedDate=today;render()}
  }
  // Painel fechar
  const pc=document.getElementById('panel-close');if(pc)pc.onclick=()=>{G.selectedDate=null;render()}

  // Células do calendário
  document.querySelectorAll('[data-date]').forEach(cell=>{
    cell.onclick=()=>{
      const date=cell.dataset.date
      if(!dayMap[date])return
      G.selectedDate=G.selectedDate===date?null:date
      // Atualiza seleção visual sem full render
      document.querySelectorAll('[data-date]').forEach(c=>c.classList.toggle('selected',c.dataset.date===G.selectedDate))
      const area=document.getElementById('cal-area')
      if(area)area.classList.toggle('panel-open',!!G.selectedDate)
      // Remove painel antigo e insere novo
      document.getElementById('day-panel')?.remove()
      if(G.selectedDate){
        const layout=document.querySelector('.main-layout')
        if(layout){layout.insertAdjacentHTML('beforeend',buildDayPanel(G.selectedDate));bindPanel()}
      }
    }
  })

  bindPanel()
}

function bindPanel(){
  document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift]=b.dataset.add.split('|')
      const day=dayMap[date];if(!day)return
      day[shift].push({id:'n'+Date.now(),role:'',person:'',obs:'',status:'pending',confirmedAt:null,faltaTipo:null})
      save();rebuildPanel();rebuildCell(date)
    })
  })
  document.querySelectorAll('[data-ed]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift,id]=b.dataset.ed.split('|')
      const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
      b.closest('[data-k]').outerHTML=buildCard(date,shift,e,true)
      bindEdit(date,shift,id)
    })
  })
  document.querySelectorAll('[data-dl]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      if(!confirm('Excluir esta linha?'))return
      const[date,shift,id]=b.dataset.dl.split('|')
      const day=dayMap[date];if(!day)return
      day[shift]=day[shift].filter(e=>e.id!==id)
      save();toast('Linha removida.','info');rebuildPanel();rebuildCell(date)
    })
  })
  document.querySelectorAll('[data-falta]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift,id]=b.dataset.falta.split('|')
      const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
      showFaltaModal(date,shift,e)
    })
  })
}

function bindEdit(date,shift,id){
  const k=`${date}|${shift}|${id}`
  const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
  document.querySelectorAll(`[data-k="${k}"] [data-f]`).forEach(inp=>{
    inp.oninput=()=>{e[inp.dataset.f]=inp.value;save()}
  })
  const sv=document.querySelector(`[data-sv="${k}"]`)
  if(sv)sv.onclick=()=>{
    document.querySelectorAll(`[data-k="${k}"] [data-f]`).forEach(i=>{e[i.dataset.f]=i.value})
    save();toast('Salvo ✓','success')
    sv.closest('[data-k]').outerHTML=buildCard(date,shift,e)
    bindPanel();rebuildCell(date)
  }
  const cx=document.querySelector(`[data-cx="${k}"]`)
  if(cx)cx.onclick=()=>{cx.closest('[data-k]').outerHTML=buildCard(date,shift,e);bindPanel()}
  document.querySelector(`[data-k="${k}"] input`)?.focus()
}

// ── AUTH ──
function requireAuth(fn){
  if(G.user&&G.user.can&&G.user.can.edit){fn();return}
  showLoginModal(fn)
}

function showLoginModal(onSuccess){
  document.getElementById('lmodal')?.remove()
  const m=document.createElement('div');m.id='lmodal'
  m.innerHTML=`<div class="modal-bg" id="lmbg">
    <div class="modal-card" style="max-width:360px">
      <div class="card-top">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
        <span class="fallback" style="display:none">🥟</span>
        <div class="card-top-sub">Acesso restrito</div>
      </div>
      <div class="card-body">
        <div class="l-title">Identificação necessária</div>
        <div class="l-sub">Edição e exclusão exigem login</div>
        <div class="field"><label>Usuário</label><input class="inp" id="mu" type="text" placeholder="admin ou vitoria" autocomplete="username"/></div>
        <div class="field"><label>Senha</label><div class="inp-wr"><input class="inp" id="mp" type="password" placeholder="••••••"/><button class="eye" id="meye">👁</button></div></div>
        <div class="l-err" id="merr"></div>
        <div style="display:flex;gap:9px">
          <button class="l-btn" id="mcancel" style="background:var(--g200);color:var(--g700);flex:0 0 auto;width:auto;padding:12px 16px">Cancelar</button>
          <button class="l-btn" id="mlogin" style="flex:1">Entrar</button>
        </div>
      </div>
    </div>
  </div>`
  document.body.appendChild(m)
  document.getElementById('mu').focus()
  document.getElementById('meye').onclick=()=>{const p=document.getElementById('mp');p.type=p.type==='password'?'text':'password'}
  document.getElementById('mcancel').onclick=()=>m.remove()
  document.getElementById('lmbg').onclick=ev=>{if(ev.target===ev.currentTarget)m.remove()}
  document.getElementById('mp').onkeydown=ev=>{if(ev.key==='Enter')tryLogin()}
  document.getElementById('mu').onkeydown=ev=>{if(ev.key==='Enter')document.getElementById('mp').focus()}
  document.getElementById('mlogin').onclick=tryLogin
  function tryLogin(){
    const u=(document.getElementById('mu').value||'').trim()
    const p=document.getElementById('mp').value||''
    const err=document.getElementById('merr');const btn=document.getElementById('mlogin')
    if(!u){err.textContent='⚠ Informe o usuário.';err.style.display='block';return}
    btn.innerHTML='<span class="spinner"></span>';btn.disabled=true
    setTimeout(()=>{
      const f=USERS.find(x=>x.u.toLowerCase()===u.toLowerCase())
      if(!f){show('Usuário não encontrado.');return}
      if(p!==f.p){show('Senha incorreta.');return}
      G.user={u:f.u,role:f.role,name:f.name,av:f.av,can:f.can}
      localStorage.setItem(SU,JSON.stringify(G.user))
      m.remove();toast('Olá, '+G.user.name+'!','success');render()
      if(onSuccess)onSuccess()
    },350)
    function show(msg){err.textContent='⚠ '+msg;err.style.display='block';btn.innerHTML='Entrar';btn.disabled=false}
  }
}

// ── FOLGAS ──
function showFolgasModal(){
  document.getElementById('fmodal')?.remove()
  const todos=new Set()
  G.days.forEach(d=>[...d.manha,...d.noite].forEach(e=>{if(e.person)todos.add(e.person)}))
  const doms=G.days.filter(d=>d.wd==='Dom')
  const linhas=doms.map(dom=>{
    const trab=new Set([...dom.manha,...dom.noite].map(e=>e.person).filter(Boolean))
    const folg=[...todos].filter(p=>!trab.has(p)).sort()
    const dn=parseInt(dom.date.split('-')[2])
    return`<div class="folga-dom">
      <div class="folga-dom-title">Domingo ${String(dn).padStart(2,'0')}/04/2025</div>
      <div class="folga-section"><div class="folga-lbl">Trabalhando (${trab.size})</div>${[...trab].sort().map(p=>`<span class="folga-pill" style="background:#E8F5E9;color:#1B5E20">✓ ${esc(p)}</span>`).join('')}</div>
      <div class="folga-section"><div class="folga-lbl">De folga (${folg.length})</div>${folg.length?folg.map(p=>`<span class="folga-pill" style="background:var(--g100);color:var(--g700)">🌴 ${esc(p)}</span>`).join(''):'<span style="font-size:12px;color:var(--g300);font-style:italic">Todos escalados</span>'}</div>
    </div>`
  }).join('')
  const m=document.createElement('div');m.id='fmodal'
  m.innerHTML=`<div class="modal-bg" id="fmbg">
    <div class="modal-card" style="max-width:460px">
      <div class="modal-head"><div class="modal-title">📅 Folgas de Domingo — Abril</div><button class="modal-close" id="fclose">✕ Fechar</button></div>
      <div class="modal-body">${linhas||'<p style="color:var(--g300);font-style:italic">Nenhum domingo encontrado.</p>'}</div>
    </div>
  </div>`
  document.body.appendChild(m)
  document.getElementById('fclose').onclick=()=>m.remove()
  document.getElementById('fmbg').onclick=ev=>{if(ev.target===ev.currentTarget)m.remove()}
}

// ── FALTA ──
function showFaltaModal(date,shift,e){
  document.getElementById('ftmodal')?.remove()
  const dn=parseInt(date.split('-')[2]);const turno=shift==='manha'?'Manhã':'Noite'
  const m=document.createElement('div');m.id='ftmodal'
  m.innerHTML=`<div class="modal-bg" id="ftbg">
    <div class="modal-card" style="max-width:380px">
      <div class="modal-head" style="background:#B71C1C"><div class="modal-title">⚠ Registrar Falta</div><button class="modal-close" id="ftclose">✕</button></div>
      <div class="modal-body">
        <div class="falta-info"><b>${esc(e.person)}</b><br/>${esc(e.role)} · ${turno} · ${String(dn).padStart(2,'0')}/04/2025</div>
        <div class="falta-btns">
          <button class="falta-btn just" id="ft-just">📋 Falta Justificada — Enviar ao RH</button>
          <button class="falta-btn injust" id="ft-injust">🚨 Falta Injustificada — Enviar ao RH</button>
          <button class="falta-btn cancel" id="ft-cancel">Cancelar</button>
        </div>
      </div>
    </div>
  </div>`
  document.body.appendChild(m)
  document.getElementById('ftclose').onclick=()=>m.remove()
  document.getElementById('ft-cancel').onclick=()=>m.remove()
  document.getElementById('ftbg').onclick=ev=>{if(ev.target===ev.currentTarget)m.remove()}
  document.getElementById('ft-just').onclick=()=>{registrarFalta(date,shift,e,'just',dn,turno);m.remove()}
  document.getElementById('ft-injust').onclick=()=>{registrarFalta(date,shift,e,'injust',dn,turno);m.remove()}
}

function registrarFalta(date,shift,entry,tipo,dn,turno){
  try{
    const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===entry.id);if(!e)return
    e.status='absent';e.faltaTipo=tipo;e.faltaAt=Date.now()
    save()
    rebuildPanel();rebuildCell(date)
    const data=String(dn).padStart(2,'0')+'/04/2025'
    const texto=tipo==='just'
      ?`📋 *Comunicado de Falta — Pastel da Camila*\n\n*Colaborador:* ${e.person}\n*Função:* ${e.role}\n*Turno:* ${turno}\n*Data:* ${data}\n*Tipo:* Falta JUSTIFICADA\n\nFavor registrar em folha de ponto e solicitar atestado.`
      :`🚨 *Comunicado de Falta — Pastel da Camila*\n\n*Colaborador:* ${e.person}\n*Função:* ${e.role}\n*Turno:* ${turno}\n*Data:* ${data}\n*Tipo:* Falta NÃO JUSTIFICADA ⚠\n\nFavor registrar em folha de ponto para desconto conforme CLT.`
    window.open('https://wa.me/'+RH+'?text='+encodeURIComponent(texto),'_blank')
    toast('Falta de '+e.person+' registrada.','success')
  }catch(err){toast('Erro ao registrar falta.','error')}
}

init()
</script>
</body>
