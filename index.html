<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pastel da Camila – Escala Abril</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
/*
  ANTI-BRANCO: html/body têm background antes de qualquer JS.
  window.onerror exibe mensagem de erro na tela.
  Cache v6 — incrementar ao mudar estrutura de dados.
*/
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#EA1D2C;--red2:#C0121F;--red-bg:#FFF0F1;
  --g50:#F7F7F7;--g100:#F0F0F0;--g200:#E0E0E0;--g300:#BDBDBD;
  --g400:#9E9E9E;--g700:#424242;--g900:#212121;
  --ok:#27AE60;--ok-bg:#E8F5E9;
  --pend:#F39C12;--pend-bg:#FFF8E1;
  --abs:#E74C3C;--abs-bg:#FFEBEE;
  --manha:#F9A825;--manha-bg:#FFFDE7;--manha-b:#FFE082;
  --noite:#5E35B1;--noite-bg:#F3E5F5;--noite-b:#CE93D8;
  --panel-w:420px;
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --trans:.15s ease;
}
html,body{min-height:100vh;background:var(--g50);color:var(--g900)}
body{font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-size:16px;scroll-behavior:smooth}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none}
input{font-family:'Nunito',sans-serif;outline:none}
#app{min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  height:64px;background:var(--red);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  box-shadow:0 2px 20px rgba(180,10,20,.4);
  will-change:transform;
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-logo{height:42px;width:42px;object-fit:contain;filter:drop-shadow(0 1px 6px rgba(0,0,0,.3))}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;line-height:1.1}
.brand-sub{font-size:13px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.topbar-mid{flex:1;text-align:center;font-size:17px;color:rgba(255,255,255,.85);font-weight:700}
.topbar-mid b{color:#fff}
.top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tbtn-white{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);border-radius:9px;padding:8px 13px;color:#fff;font-size:16px;font-weight:700;white-space:nowrap;cursor:pointer;transition:background var(--trans),opacity var(--trans);-webkit-tap-highlight-color:transparent;user-select:none}
.tbtn-white:hover{background:rgba(255,255,255,.25)}
.tbtn-white:active{background:rgba(255,255,255,.35);transform:scale(.97)}
.tbtn-green{background:rgba(37,211,102,.25);border-color:rgba(37,211,102,.5)}
.tbtn-green:hover,.tbtn-green:active{background:rgba(37,211,102,.4)!important}
.av{width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:210px;padding:6px;z-index:500;animation:fadeIn .2s ease}
.ddi{display:flex;align-items:center;gap:8px;width:100%;padding:11px 14px;border-radius:8px;background:none;border:none;font-size:18px;font-weight:700;color:var(--g700);cursor:pointer;text-align:left;font-family:'Nunito',sans-serif}
.ddi:hover{background:var(--g50)}
.ddi.danger{color:var(--red);background:var(--red-bg)}
.ddi.red{color:var(--red)}
.dd-div{height:1px;background:var(--g100);margin:4px 0}
.ov{position:fixed;inset:0;z-index:300}

/* ── LAYOUT PRINCIPAL ── */
.main-layout{
  position:relative;
  min-height:calc(100vh - 68px);
}

/* ── ÁREA DO CALENDÁRIO ── */
.cal-area{
  padding:20px 18px 40px;
  transition:margin-right .3s ease;
}
/* Quando painel aberto: empurra calendário pra esquerda */
.cal-area.panel-open{
  margin-right:var(--panel-w);
}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;color:var(--g900);letter-spacing:.2px;line-height:1}
.cal-sub{font-size:13px;color:var(--g400);font-weight:600;margin-top:3px;letter-spacing:.1px}
.cal-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cta-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;font-size:14px;font-weight:700;color:var(--g700);cursor:pointer;font-family:'Nunito',sans-serif;transition:all var(--trans);white-space:nowrap;min-height:36px;display:inline-flex;align-items:center}
.cta-btn:hover{border-color:var(--red);color:var(--red)}
.cta-btn.red{background:var(--red);border-color:var(--red);color:#fff}
.cta-btn.red:hover{background:var(--red2)}

/* ── GRID CALENDÁRIO ── */
.cal-grid-wrap{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--g200)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--g900)}
.cal-wd{padding:8px 4px;text-align:center;font-size:14px;font-weight:800;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px}
.cal-wd:first-child{color:#FF6B6B}/* Dom vermelho */
.cal-wd:last-child{color:#FF6B6B}/* Sáb vermelho */

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--g200)}

/* Célula do dia */
.cal-cell{
  background:#fff;min-height:110px;padding:8px 8px 6px;
  cursor:pointer;position:relative;
  transition:background .15s;
  display:flex;flex-direction:column;gap:4px;
  overflow:hidden;
}
/* Quando painel aberto, células ficam mais compactas */
.cal-area.panel-open .cal-cell{min-height:90px;padding:6px 6px 4px}
.cal-cell:hover{background:#FAFAFA}
.cal-cell.empty{background:var(--g50);cursor:default}
.cal-cell.selected{background:#FFF0F1;outline:2px solid var(--red);outline-offset:-2px;z-index:1}
.cal-cell.today{background:#FFFBF0}
.cal-cell.today .cal-day-num{background:var(--red);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.cal-cell.no-data{background:var(--g50);cursor:default;pointer-events:none}

.cal-day-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:23px;font-weight:700;color:var(--g700);
  line-height:1;margin-bottom:4px;
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px
}
.cal-cell.selected .cal-day-num{background:var(--red);color:#fff;border-radius:50%}
.cal-cell.today:not(.selected) .cal-day-num{background:var(--red);color:#fff;border-radius:50%}

/* Chips de resumo dentro da célula */
.cal-chips{display:flex;flex-direction:row;flex-wrap:wrap;gap:3px}
.cal-chip{
  display:flex;align-items:center;gap:4px;
  border-radius:5px;padding:2px 6px;font-size:13px;font-weight:800;
  white-space:nowrap;overflow:hidden
}
.chip-m{background:var(--manha-bg);color:#795500}
.chip-n{background:var(--noite-bg);color:#311B92}
.chip-f{background:var(--abs-bg);color:var(--abs)}
.cal-wd-label{font-size:12px;font-weight:700;color:var(--g300);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.cal-closed-lbl{font-size:11px;font-weight:700;color:var(--g300);letter-spacing:.3px;margin-top:2px}

/* ── PAINEL LATERAL ── */
.day-panel{
  position:fixed;
  top:64px;
  right:0;
  bottom:0;
  width:var(--panel-w);
  background:#fff;
  border-left:1px solid var(--g100);
  box-shadow:-6px 0 32px rgba(0,0,0,.1);
  z-index:150;
  display:flex;
  flex-direction:column;
  animation:slideRight .2s cubic-bezier(.25,.46,.45,.94);
  overflow:hidden;
}
.panel-head{
  background:var(--red);padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.panel-date{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:.2px}
.panel-wd{font-size:14px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.panel-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 13px;font-size:17px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}
.panel-body{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:12px 14px 40px;
  display:block;
}
.panel-body > *{margin-bottom:12px;}
.panel-body > *:last-child{margin-bottom:0;}
/* Indicador de scroll: sombra no topo quando não está no início */
.panel-body.scrolled{
  box-shadow:inset 0 8px 12px -8px rgba(0,0,0,.12);
}

/* Turno dentro do painel */
.shift-block{border-radius:12px;overflow:hidden}
.shift-block.manha{border:1.5px solid var(--manha-b);background:var(--manha-bg)}
.shift-block.noite{border:1.5px solid var(--noite-b);background:var(--noite-bg)}
.shift-head{display:flex;align-items:center;gap:8px;padding:10px 14px;min-height:42px}
.shift-block.manha .shift-head{background:var(--manha)}
.shift-block.noite .shift-head{background:var(--noite)}
.shift-head-icon{font-size:18px}
.shift-head-label{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#fff;flex:1}
.shift-head-count{font-size:14px;color:rgba(255,255,255,.8);font-weight:600}

/* Botão adicionar */
.add-btn{display:block;width:100%;padding:8px;background:none;border:none;border-top:1px solid var(--g100);font-size:14px;font-weight:700;color:var(--red);cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;letter-spacing:.2px}
.add-btn:hover{background:var(--red-bg);letter-spacing:.5px}

/* Cards de entrada no painel — agrupados por pessoa */
.entry-cards{display:flex;flex-direction:column;gap:0;padding:0;background:#fff;border-radius:0 0 10px 10px}

/* Card agrupado: uma pessoa, múltiplas funções */
.person-card{
  background:#fff;
  border-bottom:1px solid var(--g100);
  padding:12px 16px 10px;
  transition:background .12s;
  position:relative;
}
.person-card:last-child{border-bottom:none}
.person-card:hover{background:#FAFAFA}

/* Cabeçalho do card: avatar + nome + horário + botão */
.person-card-head{
  display:flex;align-items:flex-start;gap:12px;
  margin-bottom:10px;
}

/* Avatar com iniciais */
.pc-avatar{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:700;
  flex-shrink:0;
  letter-spacing:.5px;
}
.pc-avatar.manha{background:#FFF9C4;color:#795500;border:2px solid #F9A825}
.pc-avatar.noite{background:#EDE7F6;color:#311B92;border:2px solid #5E35B1}
.pc-avatar.absent{background:var(--abs-bg);color:var(--abs);border:2px solid var(--abs)}

.ec-name{font-size:18px;font-weight:800;color:var(--g900);line-height:1.2;margin-bottom:3px;letter-spacing:-.1px}
.pc-info{flex:1;min-width:0}
.pc-hor-line{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.pc-hor-badge{display:inline-flex;align-items:center;gap:4px;background:var(--g50);border:1px solid var(--g200);border-radius:5px;padding:2px 8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--g700);letter-spacing:.2px}
.pc-almoco-badge{display:inline-flex;align-items:center;gap:4px;background:#FFF8E1;border:1px solid #FFE082;border-radius:5px;padding:2px 8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#795500;letter-spacing:.2px}
.person-card-roles{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.person-card-foot{padding:0;display:flex;flex-direction:column;gap:4px}

/* Card individual (compatibilidade — modo edição) */
.entry-card{
  display:flex;align-items:flex-start;gap:9px;
  background:#fff;border:1px solid var(--g100);border-radius:10px;
  padding:10px 11px;box-shadow:0 1px 3px rgba(0,0,0,.04)
}
.entry-card.falta{background:var(--abs-bg);border-color:#FFCDD2}
.entry-card.editing{background:var(--pend-bg);border-color:var(--pend)}
.ec-role{
  background:var(--g100);color:var(--g700);
  border-radius:6px;padding:3px 8px;
  font-size:14px;font-weight:800;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:1px
}
.ec-right{flex:1;min-width:0}
.ec-name{font-size:19px;font-weight:800;color:var(--g900);margin-bottom:2px}
.ec-obs{font-size:14px;color:var(--g400);font-style:italic;margin-bottom:4px}
.ec-hor{font-size:13px;color:var(--g400);font-weight:600;margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
.ec-status{display:inline-flex;align-items:center;border-radius:20px;padding:2px 8px;font-size:13px;font-weight:700}
.ec-actions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ec-btn{display:inline-flex;align-items:center;gap:3px;border:none;border-radius:7px;padding:5px 10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;min-height:30px}
.ec-btn.edit{background:#E3F2FD;color:#1565C0}
.ec-btn.del{background:var(--red-bg);color:var(--red)}
.ec-btn.falta-btn{background:#FFF3E0;color:#E65100}

/* Edição inline no card */
.ec-inputs{display:flex;flex-direction:column;gap:6px;flex:1}
.ec-inp-row{display:flex;flex-direction:column;gap:2px}
.ec-inp-label{font-size:12px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px}
.ec-inp{border:1.5px solid var(--g200);border-radius:7px;padding:7px 9px;font-size:17px;color:var(--g900);background:#fff;font-family:'Nunito',sans-serif;width:100%}
.ec-inp:focus{border-color:var(--red);outline:none}
.ec-save-row{display:flex;gap:7px;margin-top:3px}
.ec-save{background:var(--ok);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex:1}
.ec-cancel{background:var(--g100);color:var(--g700);border:none;border-radius:7px;padding:8px 10px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}

/* ── MODAIS ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .18s ease}
.modal-card{background:#fff;border-radius:20px;box-shadow:0 16px 56px rgba(0,0,0,.22);width:100%;max-width:480px;overflow:hidden;animation:slideUp .22s cubic-bezier(.25,.46,.45,.94)}
.modal-head{background:var(--red);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:.3px}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:17px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}
.modal-body{padding:16px 20px 20px;max-height:72vh;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Login */
.card-top{background:var(--red);padding:24px 20px 16px;display:flex;flex-direction:column;align-items:center}
.card-top img{width:110px;height:110px;object-fit:contain;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.card-top .fallback{font-size:62px;line-height:1}
.card-top-sub{font-size:13px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:7px}
.card-body{padding:20px 22px 24px}
.l-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--g700);text-align:center;margin-bottom:3px}
.l-sub{font-size:16px;color:var(--g400);font-weight:600;text-align:center;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:13px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.7px}
.inp{border:2px solid var(--g200);border-radius:10px;padding:10px 13px;font-size:18px;color:var(--g900);background:#FAFAFA;width:100%;transition:border-color var(--trans),background var(--trans);font-family:'Nunito',sans-serif}
.inp:focus{border-color:var(--red);background:#fff;outline:none}
.inp-wr{position:relative}
.inp-wr .inp{padding-right:40px}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--g300);cursor:pointer;font-size:20px;padding:4px}
.l-err{background:var(--red-bg);border:1px solid #FFCDD2;border-radius:8px;padding:9px 13px;font-size:17px;color:#C0121F;font-weight:700;margin-bottom:12px;display:none}
.l-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:13px;font-size:18px;font-weight:800;cursor:pointer;width:100%;min-height:46px;display:flex;align-items:center;justify-content:center;transition:background var(--trans);font-family:'Nunito',sans-serif}
.l-btn:hover{background:var(--red2)}
.l-btn:active{transform:scale(.98)}
.l-btn:disabled{opacity:.6;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* Folgas */
.folga-dom{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--g100)}
.folga-dom:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.folga-dom-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--red);margin-bottom:10px}
.folga-section{margin-bottom:7px}
.folga-lbl{font-size:13px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.folga-pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:16px;font-weight:700;margin:2px}

/* Falta */
.falta-info{background:#FFF3E0;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:18px;color:var(--g700);line-height:1.7}
.falta-btns{display:flex;flex-direction:column;gap:9px}
.falta-btn{border:none;border-radius:10px;padding:12px;font-size:18px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:#fff;display:flex;align-items:center;gap:8px}
.falta-btn.just{background:#E65100}
.falta-btn.injust{background:#B71C1C}
.falta-btn.cancel{background:var(--g100);color:var(--g700)}

/* ── CARD: horário automático e botão detalhes ── */
.ec-hor{
  font-size:14px;color:var(--g400);font-weight:600;
  margin-bottom:3px;letter-spacing:.2px;
}
.ec-hor-empty{
  font-size:13px;color:var(--g300);font-style:italic;margin-bottom:3px;
}
.ec-detalhe-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:transparent;border:1.5px solid var(--g200);border-radius:7px;
  padding:4px 9px;font-size:11px;font-weight:800;
  color:var(--g300);cursor:pointer;
  transition:all var(--trans);font-family:'Nunito',sans-serif;
  white-space:nowrap;flex-shrink:0;align-self:flex-start;
  min-height:28px;
}
.ec-detalhe-btn:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.ec-detalhe-btn:active{transform:scale(.96)}

/* ── POPUP DE DETALHES DA PESSOA ── */
.detalhe-popup{
  position:fixed;inset:0;z-index:800;
  display:flex;align-items:center;justify-content:center;
  padding:16px;background:rgba(0,0,0,.5);

/* ── MODAL HORÁRIOS ── */
.hor-section{margin-bottom:20px}
.hor-section:last-child{margin-bottom:0}
.hor-section-title{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
  padding:8px 14px;border-radius:8px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px
}
.hor-section-title.manha{background:var(--manha-bg);color:#795500}
.hor-section-title.noite{background:var(--noite-bg);color:#311B92}
.hor-section-title.est{background:var(--g100);color:var(--g700)}
.hor-table{width:100%;border-collapse:collapse}
.hor-table th{
  font-size:13px;font-weight:800;color:var(--g400);

}
.hor-table td{
  padding:10px 10px;font-size:18px;border-bottom:1px solid var(--g100);

}
.hor-table tr:last-child td{border-bottom:none}
.hor-table tr:hover td{background:var(--g50)}
.hor-nome{font-weight:800;color:var(--g900)}
.hor-time{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;
  color:var(--g700);white-space:nowrap
}
.hor-almoco{
  font-size:16px;color:var(--g400);font-weight:600;white-space:nowrap
}
.hor-badge{
  display:inline-block;font-size:13px;font-weight:800;
  padding:2px 7px;border-radius:20px;
}

/* ── REGRAS OPERACIONAIS NO PAINEL (RODADA 3) ── */
.regras-block{
  background:var(--g50);
  border:1px solid var(--g100);border-radius:8px;
  padding:8px 12px;margin-bottom:8px;
}
.regras-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.regra-item{
  font-size:13px;font-weight:700;color:var(--g700);
  display:inline-flex;align-items:center;gap:4px;
}
.transicao-row{display:flex;flex-wrap:wrap;gap:8px;border-top:1px solid #BBF7D0;padding-top:6px;margin-top:2px}
.trans-atual{font-size:13px;color:#047857;font-weight:600}
.trans-futuro{font-size:13px;color:#B45309;font-weight:700}

/* ── POPUP OPERACIONAL (RODADA 3) ── */
.dp-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:2000;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
@media(min-width:480px){
  .dp-overlay{align-items:center}
  .dp-card{border-radius:18px!important;max-height:85vh}
}
.dp-card{
  background:#fff;width:100%;max-width:480px;
  border-radius:18px 18px 0 0;
  max-height:90vh;display:flex;flex-direction:column;
  animation:slideUp .22s ease;overflow:hidden;
}
.dp-head{
  background:var(--red);padding:16px 18px;
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-shrink:0;
}
.dp-nome{
  font-family:'Barlow Condensed',sans-serif;
  font-size:34px;font-weight:700;color:#fff;line-height:1;
}
.dp-turno{font-size:14px;color:rgba(255,255,255,.75);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.dp-close{
  background:rgba(255,255,255,.2);border:none;color:#fff;
  border-radius:8px;padding:6px 11px;font-size:17px;font-weight:700;
  cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;margin-top:2px;
}
.dp-body{
  flex:1;overflow-y:auto;padding:14px 16px 28px;
  display:flex;flex-direction:column;gap:0;
  -webkit-overflow-scrolling:touch;
}
/* Seções */
.dp-section{
  padding:10px 0 10px;
  border-bottom:1px solid var(--g100);
}
.dp-section:last-of-type{border-bottom:none}
.dp-section-label{
  font-size:12px;font-weight:800;color:var(--g300);
  text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;
}
/* Horário */
.dp-hor-row{display:flex;gap:8px;flex-wrap:wrap}
.dp-hor-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--g50);border:1px solid var(--g200);
  border-radius:7px;padding:4px 10px;
  font-size:17px;font-weight:700;color:var(--g700);
  font-family:'Barlow Condensed',sans-serif;
}
/* Função principal */
.dp-funcao-principal{
  display:inline-flex;align-items:center;
  background:#FFF7ED;border:1.5px solid #F97316;
  color:#C2410C;border-radius:8px;
  padding:4px 12px;font-size:17px;font-weight:800;
  margin-bottom:2px;
}
.dp-funcao-principal::before{content:'⭐ ';font-size:14px}

/* Padrão do dia */
.dp-padrao-dia{
  display:inline-flex;align-items:center;
  background:#EFF6FF;border:1.5px solid #BFDBFE;
  color:#1D4ED8;border-radius:8px;
  padding:4px 12px;font-size:16px;font-weight:700;
  margin-bottom:2px;
}
.dp-padrao-dia::before{content:'📅 ';font-size:14px}

/* Função hoje */
.dp-funcao-hoje{
  display:inline-flex;align-items:center;
  background:var(--red-bg);border:1.5px solid var(--red);
  color:var(--red);border-radius:8px;
  padding:4px 12px;font-size:17px;font-weight:800;
}
/* Funções possíveis */
.dp-bloco-badge{
  display:inline-flex;background:var(--g100);color:var(--g700);
  border-radius:5px;padding:2px 8px;font-size:13px;font-weight:800;
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;
}
.dp-func-item{
  border:1px solid var(--g100);border-radius:8px;
  padding:8px 11px;margin-bottom:5px;
  background:#fff;
}
.dp-func-hoje{border-color:var(--red)!important;background:var(--red-bg)!important}
.dp-func-nome{font-size:17px;font-weight:700;color:var(--g900);line-height:1.3}
.dp-func-desc{font-size:14px;color:var(--g400);margin-top:3px;line-height:1.5}
.dp-hoje-tag{
  font-size:12px;background:var(--red);color:#fff;
  padding:1px 6px;border-radius:10px;font-weight:700;vertical-align:middle;margin-left:4px;
}
/* Responsabilidades */
.dp-resp-list{display:flex;flex-wrap:wrap;gap:6px}
.dp-resp-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--g50);border:1px solid var(--g200);
  color:var(--g600,#616161);border-radius:6px;
  padding:4px 9px;font-size:14px;font-weight:700;
}
/* Crítica: destaque visual */
.dp-resp-critica{
  background:#FFF7ED;border-color:#FED7AA;
  color:#C2410C;font-weight:800;
}
/* Obs */
.dp-obs{
  font-size:16px;color:var(--g700);line-height:1.6;
  background:var(--g50);border-radius:7px;padding:8px 10px;
}
/* Regra do dia */
.dp-regra{
  background:linear-gradient(135deg,#F0FDF4,#EFF6FF);
  border:1px solid #BBF7D0;border-radius:8px;
  padding:9px 12px;margin-top:10px;
}
.dp-regra-item{font-size:14px;font-weight:700;color:#166534;line-height:1.7}
/* Transição */
.dp-trans{
  background:#FFFBEB;border:1px solid #FDE68A;
  border-radius:8px;padding:9px 12px;margin-top:8px;
}
.dp-trans-atual{font-size:14px;color:#047857;font-weight:700;line-height:1.6}
.dp-trans-futuro{font-size:14px;color:#B45309;font-weight:800;line-height:1.6}

/* ── AJUSTE MANUAL NO CARD ── */
.ec-ajuste-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:#FFF7ED;border:1px solid #FED7AA;
  color:#C2410C;border-radius:5px;
  padding:2px 8px;font-size:13px;font-weight:700;
  margin-bottom:3px;cursor:default;
}
.ec-btn-ajuste{
  background:#F0F9FF;color:#0369A1;
  border:1px solid #BAE6FD!important;
}
.ec-btn-ajuste:hover{background:#E0F2FE!important}

/* ── AJUSTE NO POPUP ── */
.dp-ajuste-bloco{
  background:#FFF7ED;border:1px solid #FED7AA;
  border-radius:8px;padding:10px 12px;
}
.dp-ajuste-tipo{
  font-size:17px;font-weight:800;color:#C2410C;
  display:block;margin-bottom:4px;
}
.dp-ajuste-desc{font-size:16px;color:#7C2D12;font-weight:600;margin-bottom:3px}
.dp-ajuste-obs{font-size:14px;color:#92400E;font-style:italic}
.dp-ajuste-apr{font-size:13px;color:#047857;font-weight:700;margin-top:4px}

/* ── RESPONSABILIDADES NO CARD (RODADA 2) ── */
/* Hierarquia visual: nome > função/horário > responsabilidade */
.ec-resp-wrap{
  display:flex;align-items:center;flex-wrap:wrap;
  gap:4px;margin:4px 0 3px;
}
.ec-resp-label{
  font-size:12px;font-weight:800;
  color:var(--g300);text-transform:uppercase;
  letter-spacing:.6px;margin-right:1px;flex-shrink:0;
}
.ec-resp-chip{
  display:inline-flex;align-items:center;
  background:var(--g50);border:1px solid var(--g200);
  color:var(--g400);border-radius:4px;
  padding:1px 6px;font-size:12px;font-weight:700;
  white-space:nowrap;letter-spacing:.1px;
  line-height:1.4;
}
/* Chip extra (oculto inicialmente) */
.ec-resp-extra{
  background:#EEF2FF;border-color:#C7D2FE;color:#4F46E5;
}
/* Botão +N */
.ec-resp-mais{
  display:inline-flex;align-items:center;justify-content:center;
  background:none;border:1px dashed var(--g300);border-radius:4px;
  color:var(--g400);font-size:12px;font-weight:800;
  padding:1px 6px;cursor:pointer;
  font-family:'Nunito',sans-serif;line-height:1.4;
  transition:background .12s,color .12s,border-color .12s;
}
.ec-resp-mais:hover,.ec-resp-mais:active{
  background:var(--g100);border-color:var(--g400);color:var(--g700);
}
/* Bloco de extras expandido */
.ec-resp-extras{
  display:none;width:100%;
  flex-wrap:wrap;gap:4px;
  padding-top:3px;
}
.ec-resp-extras.aberto{display:flex!important;}

/* Mobile: chips menores para não estoura */
@media(max-width:640px){
  .ec-resp-chip{font-size:10px;padding:1px 5px}
  .ec-resp-mais{font-size:10px;padding:1px 5px}
  .ec-resp-label{font-size:10px}
}

/* Botão falta explícito no card agrupado */
.pc-falta-row{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:6px;padding-top:8px;
  border-top:1px solid var(--g100);
}
.pc-falta-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:#FFF3E0;border:1px solid #FFCC80;
  color:#E65100;border-radius:7px;
  padding:5px 10px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Nunito',sans-serif;
  white-space:nowrap;
  transition:background .12s;
}
.pc-falta-btn:hover,.pc-falta-btn:active{
  background:#FFE0B2;border-color:#FF9800;
}

/* Chips de função no card agrupado */
.pc-role-chip{
  display:inline-flex;align-items:center;gap:4px;
  border:1.5px solid;border-radius:6px;
  padding:4px 10px;font-size:13px;font-weight:800;
  cursor:default;white-space:nowrap;position:relative;min-height:28px;
}
.pc-hor{font-size:13px;color:var(--g400);font-weight:600;display:block;margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;}
/* Botões admin dentro do chip — ocultos até hover */
.pc-chip-actions{
  display:none;align-items:center;gap:2px;margin-left:2px;
}
.pc-role-editable:hover .pc-chip-actions,
.pc-role-editable:active .pc-chip-actions{
  display:inline-flex;
}
.pc-chip-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border:none;border-radius:4px;
  font-size:13px;font-weight:800;cursor:pointer;padding:0;
  background:rgba(0,0,0,.08);color:currentColor;
  font-family:'Nunito',sans-serif;
  transition:background .1s;
}
.pc-chip-btn:hover{background:rgba(0,0,0,.18)}
.pc-chip-btn.danger{background:rgba(234,29,44,.15);color:var(--red)}
.pc-chip-btn.danger:hover{background:rgba(234,29,44,.3)}
.pc-chip-btn.warn{background:rgba(230,81,0,.15);color:#E65100}
.pc-chip-btn.warn:hover{background:rgba(230,81,0,.3)}
/* Mobile: sempre mostrar ações se logado (sem hover) */
@media(max-width:640px){
  .pc-chip-actions{display:inline-flex}
}

/* ── HISTÓRICO ── */
.hist-block{background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:12px 14px;margin-top:4px}
.hist-title{font-size:13px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.hist-item{font-size:14px;color:var(--g700);padding:5px 0;border-bottom:1px solid var(--g100);line-height:1.5}
.hist-item:last-child{border-bottom:none}
.hist-time{font-weight:800;color:var(--g900);font-family:'Barlow Condensed',sans-serif;font-size:17px}
.hist-editor{font-weight:700;color:var(--red)}
.hist-pessoa{font-weight:700}
.hist-change{color:var(--g400);display:block;font-size:13px}
.hist-motivo{color:var(--ok);font-weight:700;font-size:13px;display:block}

/* TOAST */
.toast-stack{position:fixed;bottom:24px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:10px 16px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.22);animation:slideUp .25s cubic-bezier(.25,.46,.45,.94);max-width:260px;line-height:1.4}
.ts{background:var(--ok)}.te{background:var(--red)}.ti{background:var(--g700)}

/* ── MODAL TEMPERATURAS ── */
.temp-bloco{padding:14px 18px;border-bottom:1px solid var(--g100)}
.temp-bloco:last-child{border-bottom:none}
.temp-blue{background:#F0F7FF}
.temp-orange{background:#FFFBF0}
.temp-gray{background:#F7F7F7}
.temp-bloco-titulo{font-size:18px;font-weight:800;color:var(--g900);margin-bottom:10px}
.temp-sub-titulo{font-size:13px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.temp-linha-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:7px;margin-bottom:10px}
.temp-faixa{border-radius:8px;padding:8px 10px;text-align:center;border:1px solid transparent}
.temp-ok{background:#E8F5E9;border-color:#A5D6A7}
.temp-warn{background:#FFF8E1;border-color:#FFE082}

    const day=dayMap[dateStr];if(!day)return
    const {error}=await supa.from('escala_dias').upsert({
      date:day.date,
      wd:day.wd,
      js_day:day.jsDay,
      manha:day.manha,
      noite:day.noite
    },{onConflict:'date'})
    if(error)throw error
  }catch(e){
    console.warn('Supabase save falhou:',e.message)
    // Fallback: continua com localStorage
    save()
  }
}

// ── Salva entrada de histórico no banco ──
async function saveHistoricoRemoto(h){
  if(!supa)return
  try{
    await supa.from('escala_historico').insert({
      editor:h.editor,
      pessoa:h.pessoa,
      antes:h.antes,
      depois:h.depois,
      motivo:h.motivo,
      date_ref:G.selectedDate||null
    })
  }catch(e){
    console.warn('Histórico remoto falhou:',e.message)
  }
}

// ── Carrega histórico do banco para o dia selecionado ──
async function loadHistoricoRemoto(dateStr){
  if(!supa)return
  try{
    const {data,error}=await supa
      .from('escala_historico')
      .select('*')
      .eq('date_ref',dateStr)
      .order('created_at',{ascending:false})
      .limit(20)
    if(error)throw error
    if(data&&data.length){
      // Mescla com histórico local da sessão
      const remotos=data.map(h=>({
        at:new Date(h.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
        editor:h.editor,
        pessoa:h.pessoa,
        antes:h.antes||'',
        depois:h.depois||'',
        motivo:h.motivo,
        remoto:true
      }))
      // Exibir no painel sem duplicar os locais
      const pb=document.getElementById('panel-body')
      if(pb){
        const histExist=pb.querySelector('.hist-block')
        const allHist=[...HISTORICO.filter(h=>!h.remoto),...remotos]
        const novoHtml=buildHistoricoFromArray(allHist)
        if(histExist)histExist.outerHTML=novoHtml
        else pb.insertAdjacentHTML('beforeend',novoHtml)
      }
    }
  }catch(e){
    console.warn('loadHistoricoRemoto falhou:',e.message)
  }
}

// ── buildHistorico aceita array externo ──
function buildHistoricoFromArray(arr){
  if(!arr.length)return''
  const itens=arr.map(h=>`
    <div class="hist-item">
      <span class="hist-time">${esc(h.at)}</span>
      <span class="hist-editor">${esc(h.editor)}</span> alterou
      <span class="hist-pessoa">${esc(h.pessoa)}</span>
      <span class="hist-change">${esc(h.antes)} → ${esc(h.depois)}</span>
      <span class="hist-motivo">motivo: ${esc(h.motivo)}</span>
    </div>`).join('')
  return`<div class="hist-block">
    <div class="hist-title">📋 Alterações${arr.some(h=>h.remoto)?' · sincronizado':''}</div>
    ${itens}
  </div>`
}

function getHorario(nome){
  if(!nome)return null
  // Normaliza: remove acentos, lowercase, pega só primeiro nome
  const primeiro=normStr(nome.split(/\s+/)[0])
  if(HORARIOS_IDX[primeiro]) return HORARIOS_IDX[primeiro]
  return HORARIOS_LIST.find(p=>{
    const pn=normStr(p.nome.split(/\s+/)[0])

  })||null
}

// ── Verifica se uma responsabilidade é crítica (highlight visual) ──
function isCritica(resp){
  const r=resp.toLowerCase()
  return RESP_CRITICAS.some(k=>r.includes(k))
}

// Helper: busca responsabilidades pelo primeiro nome normalizado
// ── Retorna lista de responsabilidades da pessoa pelo primeiro nome ──
function getResponsabilidades(nome){
  if(!nome)return null
  const k=normStr(nome.split(/\s+/)[0])
  return RESPONSABILIDADES[k]||null
}

// Helper: busca funções pelo primeiro nome (lowercase)
// ── Retorna objeto de funções operacionais da pessoa (popup "Ver funções") ──
function getFuncoes(nome){
  if(!nome)return null
  const chave=normStr(nome.split(/\s+/)[0])
  const key=Object.keys(FUNCOES_POR_PESSOA).find(k=>normStr(k)===chave||normStr(k).startsWith(chave)||chave.startsWith(normStr(k)))
  return key?FUNCOES_POR_PESSOA[key]:null
}

// ── Gera texto formatado para WhatsApp. period: 'dia'|'semana'|'mes' ──
function gerarTextoZap(period){
  const yr=G.viewYear,mo=G.viewMonth
  const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  const mesLabel=MESES[mo-1]+' '+yr
  const hoje=new Date().toLocaleDateString('pt-BR')

  if(period==='dia'){
    // Usa selectedDate ou hoje
    const todayStr=new Date().toISOString().split('T')[0]
    const ds=G.selectedDate||todayStr
    const day=dayMap[ds]
    if(!day) return '(Sem escala para este dia)'
    const dn=String(parseInt(ds.split('-')[2])).padStart(2,'0')+'/'+ds.split('-')[1]+'/'+ds.split('-')[0]
    const fmtShift=(arr)=>{
      const pessoas={}
      arr.forEach(e=>{if(!e.person)return;if(!pessoas[e.person])pessoas[e.person]=[];pessoas[e.person].push(e.role)})
      return Object.entries(pessoas).map(([p,rs])=>`• ${p} → ${rs.join(', ')}`).join('\n')
    }
    let txt=`☀️ *ESCALA DO DIA — Pastel da Camila*\n`
    txt+=`📍 ${day.wd} ${dn}\n`
    txt+=`📍 Bela Vista · Osasco\n\n`
    if(day.manha.length){txt+=`*— MANHÃ —*\n${fmtShift(day.manha)}\n\n`}
    if(day.noite.length){txt+=`*— NOITE —*\n${fmtShift(day.noite)}\n`}
    txt+=`\n_Gerado em ${hoje}_`
    return txt
  }

  if(period==='semana'){
    // Pega a semana do selectedDate ou hoje
    const base=new Date((G.selectedDate||new Date().toISOString().split('T')[0])+'T12:00:00')
    const dom=new Date(base);dom.setDate(dom.getDate()-dom.getDay())
    const dias=[]
    for(let i=0;i<7;i++){const d=new Date(dom);d.setDate(d.getDate()+i);dias.push(d)}
    const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
    const fmt=(d)=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`
    const ini=fmt(dias[0]),fim=fmt(dias[6])
    let txt=`📆 *ESCALA DA SEMANA — Pastel da Camila*\n`
    txt+=`${ini} a ${fim} · Bela Vista · Osasco\n\n`
    dias.forEach(d=>{
      const ds=d.toISOString().split('T')[0]
      const day=dayMap[ds]
      const wd=WD[d.getDay()]
      const df=fmt(d)
      if(!day){txt+=`*${wd} ${df}* — Folga geral\n\n`;return}
      const mP=[...new Set(day.manha.map(e=>e.person).filter(Boolean))]
      const nP=[...new Set(day.noite.map(e=>e.person).filter(Boolean))]
      txt+=`*${wd} ${df}*\n`
      if(mP.length) txt+=`  ☀️ ${mP.join(', ')}\n`
      if(nP.length) txt+=`  🌙 ${nP.join(', ')}\n`
      txt+='\n'
    })
    txt+=`_Gerado em ${hoje}_`
    return txt
  }

  // mês
  const diasMes=G.days.filter(d=>d.date.startsWith(`${yr}-${String(mo).padStart(2,'0')}`))
    .slice().sort((a,b)=>a.date.localeCompare(b.date))
  let txt=`🗓️ *ESCALA DE ${mesLabel.toUpperCase()} — Pastel da Camila*\n`
  txt+=`Bela Vista · Osasco\n\n`
  diasMes.forEach(d=>{
    const dn=String(parseInt(d.date.split('-')[2])).padStart(2,'0')+'/'+d.date.split('-')[1]
    const mP=[...new Set(d.manha.map(e=>e.person).filter(Boolean))]
    const nP=[...new Set(d.noite.map(e=>e.person).filter(Boolean))]
    txt+=`*${d.wd} ${dn}*\n`
    if(mP.length) txt+=`  ☀️ ${mP.join(', ')}\n`
    if(nP.length) txt+=`  🌙 ${nP.join(', ')}\n`
    txt+='\n'
  })
  txt+=`_Gerado em ${hoje}_`
  return txt
}

// ── Retorna string de range de datas para o botão de período ──
function _pmPeriodRange(p){
  const hoje=new Date()
  const fmt=(d)=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`
  if(p==='dia'){
    const ds=G.selectedDate||hoje.toISOString().split('T')[0]
    const day=dayMap[ds]
    if(day){
      const dn=String(parseInt(ds.split('-')[2])).padStart(2,'0')+'/'+ds.split('-')[1]
      return`${day.wd} ${dn}`
    }
    return fmt(hoje)
  }
  if(p==='semana'){
    const base=new Date((G.selectedDate||hoje.toISOString().split('T')[0])+'T12:00:00')
    const dom=new Date(base);dom.setDate(dom.getDate()-dom.getDay())
    const sab=new Date(dom);sab.setDate(sab.getDate()+6)
    return`${fmt(dom)} – ${fmt(sab)}`
  }
  const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']
  return`${MESES[G.viewMonth-1]} ${G.viewYear}`
}

  let periodoLabel=mesLabel
  if(period==='dia'){
    const ds=G.selectedDate||new Date().toISOString().split('T')[0]
    const day=dayMap[ds]
    periodoLabel=day?`${day.wd} ${String(parseInt(ds.split('-')[2])).padStart(2,'0')}/${ds.split('-')[1]}/${ds.split('-')[0]}`:hoje
  } else if(period==='semana'){
    const base=new Date((G.selectedDate||new Date().toISOString().split('T')[0])+'T12:00:00')
    const dom=new Date(base);dom.setDate(dom.getDate()-dom.getDay())
    const sab=new Date(dom);sab.setDate(sab.getDate()+6)
    const f=(d)=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`
    periodoLabel=`Semana ${f(dom)} – ${f(sab)}`
  }

  let html=`<div id="print-area" class="show">
  <div class="pa-header">
    <div>
      <div class="pa-brand">Pastel da Camila</div>
      <div class="pa-sub">Bela Vista · Osasco</div>
    </div>
    <div class="pa-meta">
      <div style="font-size:16px;font-weight:800;color:#EA1D2C">${periodoLabel}</div>
      <div>Impresso em ${hoje}</div>
    </div>
  </div>`

  if(opts.escala) html+=buildPrintEscala(yr,mo,period)
  if(opts.horarios) html+=buildPrintHorarios()
  if(opts.domingos) html+=buildPrintDomingos()
  if(opts.temp) html+=buildPrintTemp()

  html+='</div>'

  setTimeout(()=>{
    window.print()
    setTimeout(()=>{document.getElementById('print-area')?.remove();styleTag.textContent=''},1000)
  },300)
}

// ── Monta HTML da grade de escala para impressão ──
function buildPrintEscala(yr,mo,period){
  const firstDay=new Date(yr,mo-1,1).getDay()
  const daysInMonth=new Date(yr,mo,0).getDate()
  const WDS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']

  let cells=''
  for(let i=0;i<firstDay;i++) cells+=`<div class="pa-escala-cell empty"></div>`
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const day=dayMap[ds]
    if(!day){cells+=`<div class="pa-escala-cell empty"><span class="pa-escala-dn">${d}</span></div>`;continue}
    const pessoas=[...new Set([...day.manha,...day.noite].map(e=>e.person).filter(Boolean))].sort()
    const nomes=pessoas.map(p=>`<span class="pa-escala-name">${esc(p)}</span>`).join('')
    cells+=`<div class="pa-escala-cell"><span class="pa-escala-dn">${d}</span>${nomes}</div>`
  }
  const rem=(firstDay+daysInMonth)%7
  if(rem>0) for(let i=0;i<7-rem;i++) cells+=`<div class="pa-escala-cell empty"></div>`

  return`<div class="pa-section">
    <div class="pa-section-title">📅 Escala do Mês</div>
    <div class="pa-escala-grid">
      ${WDS.map(w=>`<div class="pa-escala-wd">${w}</div>`).join('')}
      ${cells}
    </div>
  </div>`
}

// ── Monta cards de domingo (quem trabalha/folga) para impressão ──
function buildPrintDomingos(){
  const todos=new Set()

  const doms=G.days.filter(d=>d.wd==='Dom')
  const cards=doms.map(dom=>{

    const dn=String(parseInt(dom.date.split('-')[2])).padStart(2,'0')
    const pts=dom.date.split('-')
    return`<div class="pa-dom-card">

        ${folg.map(p=>`<span class="pa-dom-item folg">🌴 ${esc(p)}</span>`).join(' ')}</div>

  return`<div class="pa-section">

    <div class="pa-dom-grid">${cards}</div>
  </div>`
}

// ── Inicialização: carrega localStorage, define data inicial, renderiza ──
function init(){
  const _now=new Date()
  G.viewYear=_now.getFullYear()
  G.viewMonth=_now.getMonth()+1
  try{
    const d=localStorage.getItem(SD)
    if(d){const p=JSON.parse(d);if(Array.isArray(p)&&p.length>0&&p[0].date)G.days=p;else throw 0}
    else G.days=clone(BASE)
  }catch(e){localStorage.removeItem(SD);G.days=clone(BASE)}
  G.days.forEach(d=>dayMap[d.date]=d)
  const today=new Date().toISOString().split('T')[0]
  if(dayMap[today])G.selectedDate=today
  render()
}

// ── Popula o banco com os dados do BASE (apenas primeira vez) ──
async function populateSupabase(){
  if(!supa)return
  try{
    const rows=BASE.map(d=>({
      date:d.date,wd:d.wd,js_day:d.jsDay,
      manha:d.manha,noite:d.noite

    const {error}=await supa.from('escala_dias').upsert(rows,{onConflict:'date',ignoreDuplicates:true})
    if(error)throw error
    console.log('Base populada no Supabase')
  }catch(e){
    console.warn('populateSupabase falhou:',e.message)
  }
}

// ── CALENDÁRIO ──
function buildCalendar(){
  const today=new Date().toISOString().split('T')[0]
  const yr=G.viewYear, mo=G.viewMonth
  const firstDay=new Date(yr,mo-1,1).getDay()// 0=Dom
  const daysInMonth=new Date(yr,mo,0).getDate()
  const MESES_LONG=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  const MESES_SHORT=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']
  const monthLabel=MESES_LONG[mo-1]+' '+yr

  // Contar dias com escala neste mês (para o subtítulo)
  const daysThisMonth=G.days.filter(d=>d.date.startsWith(`${yr}-${String(mo).padStart(2,'0')}`))
  G._calMeta={monthLabel,shortLabel:MESES_SHORT[mo-1].charAt(0).toUpperCase()+MESES_SHORT[mo-1].slice(1)+' '+yr,daysCount:daysThisMonth.length}

  let cells=''
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-cell empty"></div>`

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const dayData=dayMap[dateStr]
    const isToday=dateStr===today
    const isSel=dateStr===G.selectedDate

    if(!dayData){
      cells+=`<div class="cal-cell no-data"><div class="cal-day-num">${d}</div><div class="cal-closed-lbl">Fechado</div></div>`
      continue
    }

    const allE=[...dayData.manha,...dayData.noite]
    const faltas=allE.filter(e=>e.status==='absent').length

    let chips=''
    if(dayData.manha.length) chips+=`<div class="cal-chip chip-m">☀️ ${dayData.manha.length}</div>`
    if(dayData.noite.length) chips+=`<div class="cal-chip chip-n">🌙 ${dayData.noite.length}</div>`
    if(faltas) chips+=`<div class="cal-chip chip-f">✕${faltas}</div>`

    cells+=`<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}" data-date="${dateStr}">
      <div class="cal-day-num">${d}</div>
      <div class="cal-chips">${chips}</div>
    </div>`
  }

  // Células vazias no final para completar a semana
  const totalCells=firstDay+daysInMonth
  const remainder=totalCells%7
  if(remainder>0){for(let i=0;i<7-remainder;i++) cells+=`<div class="cal-cell empty"></div>`}

  return `<div class="cal-grid-wrap">
    <div class="cal-weekdays">
      <div class="cal-wd">Dom</div><div class="cal-wd">Seg</div><div class="cal-wd">Ter</div>
      <div class="cal-wd">Qua</div><div class="cal-wd">Qui</div><div class="cal-wd">Sex</div><div class="cal-wd">Sáb</div>
    </div>
    <div class="cal-grid">${cells}</div>
  </div>`
}

// ── Monta turno (manhã/noite) no painel. Agrupa por pessoa → buildPersonCard ──
function buildShiftPanel(day,shift){
  const m=shift==='manha'
  const entries=day[shift]
  const canAdd=G.user&&G.user.can&&G.user.can.add

  // Agrupar entries por pessoa
  const grupos={}
  const ordemPessoas=[]
  entries.forEach(e=>{
    const nome=e.person||'—'
    if(!grupos[nome]){grupos[nome]=[];ordemPessoas.push(nome)}
    grupos[nome].push(e)
  })

  // Construir HTML agrupado — sempre usa buildPersonCard para layout consistente
  const cardsHtml=ordemPessoas.map(nome=>{
    const entriesDaPessoa=grupos[nome]
    return buildPersonCard(day.date,shift,nome,entriesDaPessoa)
  }).join('')

  const totalPessoas=ordemPessoas.length
  const totalFuncoes=entries.length
  const countLabel=totalPessoas===totalFuncoes
    ?`${totalPessoas} pessoas`
    :`${totalPessoas} pessoas · ${totalFuncoes} funções`

  return `<div class="shift-block ${m?'manha':'noite'}">
    <div class="shift-head">
      <span class="shift-head-icon">${m?'☀️':'🌙'}</span>
      <span class="shift-head-label">${m?'Manhã':'Noite'}</span>
      <span class="shift-head-count">${countLabel}</span>
    </div>
    <div class="entry-cards" id="cards-${day.date}-${shift}">
      ${cardsHtml}
    </div>
    ${canAdd?`<button class="add-btn" data-add="${day.date}|${shift}">+ Adicionar</button>`:''}
  </div>`
}

// ── Card agrupado: uma pessoa com múltiplas funções ──
function buildPersonCard(date,shift,nome,entries){
  const hor=getHorario(nome)
  const resps=getResponsabilidades(nome)||[]
  const func=getFuncoes(nome)
  const temDetalhes=func!==null
  const logado=G.user&&G.user.can&&G.user.can.edit

  // Horário
  const horHtml=hor&&hor.horario
    ?`<div class="pc-hor-line"><span class="pc-hor-badge">${esc(hor.horario)}</span>${hor.almoco?`<span class="pc-almoco-badge">Almoço: ${esc(hor.almoco)}</span>`:''}</div>`
    :''

  // Responsabilidades (máx 2 + ver mais)
  let respHtml=''
  if(resps.length){
    const vis=resps.slice(0,2)
    const ext=resps.slice(2)
    const chips=vis.map(r=>`<span class="ec-resp-chip">${esc(r)}</span>`).join('')
    const maisBtn=ext.length?`<button class="ec-resp-mais" data-mais="${esc(entries[0].id)}" onclick="toggleResps(this)">+${ext.length}</button>`:''
    const extHtml=ext.length?`<div class="ec-resp-extras" id="extras-${esc(entries[0].id)}" style="display:none">${ext.map(r=>`<span class="ec-resp-chip ec-resp-extra">${esc(r)}</span>`).join('')}</div>`:''
    respHtml=`<div class="ec-resp-wrap"><span class="ec-resp-label">Resp.</span>${chips}${maisBtn}${extHtml}</div>`
  }

  // Status: só mostrar quando é confirmado ou falta — aguardando some
  const statusRelevante=entries.filter(e=>e.status!=='pending')
  const statusHtml=statusRelevante.length
    ?statusRelevante.map(e=>{
        const st=ST[e.status]||ST.pending
        const isFalta=e.status==='absent'
        return isFalta
          ?`<span class="ec-status" style="background:var(--abs-bg);color:var(--abs)">✕ ${e.faltaTipo==='injust'?'Injustificada':'Justificada'} — ${esc(e.role)}</span>`
          :`<span class="ec-status" style="background:${st.c}22;color:${st.c}">✓ ${esc(e.role)}</span>`
      }).join('')
    :''

  const detalheBtn=temDetalhes
    ?`<button class="ec-detalhe-btn" data-det-nome="${esc(nome)}" data-det-role="${esc(entries[0].role||'')}">📋 Ver funções</button>`
    :''

  const entriesOrd=[...entries].sort((a,b)=>a.role.localeCompare(b.role,'pt-BR'))
  const roleChipsHtml=entriesOrd.map(e=>{
    const isFalta=e.status==='absent'
    const k=`${date}|${shift}|${e.id}`
    const chipStyle=isFalta
      ?'border-color:var(--abs);color:var(--abs);background:var(--abs-bg)'
      :'border-color:var(--g200);color:var(--g700);background:#fff'
    const adminBtns=logado?`<span class="pc-chip-actions">
      <button class="pc-chip-btn" data-ed="${k}" title="Editar ${esc(e.role)}">✏</button>
      <button class="pc-chip-btn danger" data-dl="${k}" title="Excluir">✕</button>
    </span>`:''
    return `<span class="pc-role-chip${logado?' pc-role-editable':''}" style="${chipStyle}">
      ${esc(e.role||'—')}${isFalta?' ✕':''}${adminBtns}
    </span>`
  }).join('')

  // Botão único de registrar (falta ou ocorrência) — só quando logado e há entradas ativas
  const temAtiva=entries.some(e=>e.status!=='absent')
  const allAbsentNow=entries.every(e=>e.status==='absent')
  const faltaBtnsHtml=logado
    ?`<div class="pc-falta-row">
        <button class="pc-reg-btn${allAbsentNow?' all-absent':''}" data-reg="${esc(date)}|${esc(shift)}|${esc(nome)}">
          ${allAbsentNow?'✕ Ver registro':'⚠ Ocorrência / Falta'}
        </button>
      </div>`
    :''

  // Avatar com iniciais
  const initials=nome.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()
  const allAbsent=entries.every(e=>e.status==='absent')
  const avatarClass=allAbsent?'absent':(shift==='manha'?'manha':'noite')

  return `<div class="person-card">
    <div class="person-card-head">
      <div class="pc-avatar ${avatarClass}">${esc(initials)}</div>
      <div class="pc-info">
        <div class="ec-name">${esc(nome)}</div>
        ${horHtml}
        ${respHtml}
      </div>
      ${detalheBtn}
    </div>
    <div class="person-card-roles">${roleChipsHtml}</div>
    ${statusHtml?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">${statusHtml}</div>`:''}
    ${faltaBtnsHtml}
  </div>`
}

            <option value="falta">Falta</option>
            <option value="cobertura">Cobertura</option>
            <option value="troca">Troca</option>
            <option value="ajuste">Ajuste</option>
            <option value="folga">Folga</option>
            <option value="erro">Correção de erro</option>
            <option value="outro">Outro...</option>
          </select>
          <input class="ec-inp" id="motivo-txt-${k}" placeholder="Descreva o motivo..." style="display:none;margin-bottom:6px"/>
          <button class="ec-save" id="motivo-ok-${k}" style="width:100%">✓ Confirmar e salvar</button>
        </div>
      </div>
    </div>`
  }

  // Status: só mostrar confirmado ou falta — aguardando some
  const statusHtml=isFalta
    ?`<span class="ec-status" style="background:var(--abs-bg);color:var(--abs)">✕ ${e.faltaTipo==='injust'?'Injustificada':'Justificada'}</span>`
    :e.status==='confirmed'
      ?`<span class="ec-status" style="background:${st.c}22;color:${st.c}">${st.l}</span>`
      :''

  const acoes=logado?`<div class="ec-actions">
    <button class="ec-btn edit" data-ed="${k}">✏️ Editar</button>
    <button class="ec-btn del" data-dl="${k}">🗑️</button>
    ${!isFalta?`<button class="ec-btn falta-btn" data-falta="${k}">⚠ Falta</button>`:''}
  </div>`:''

  // Horário automático: busca na base fixa, não editável
  const hor=getHorario(e.person)
  const horHtml=hor&&hor.horario?`<div class="ec-hor">${esc(hor.horario)} · 🍽 ${esc(hor.almoco)}</div>`:''

  // Responsabilidades: máx 2 visíveis + botão "ver mais" se houver mais
  const resps=getResponsabilidades(e.person)||[]
  let respHtml=''
  if(resps.length){
    const visiveis=resps.slice(0,2)
    const extras=resps.slice(2)
    const chips=visiveis.map(r=>`<span class="ec-resp-chip">${esc(r)}</span>`).join('')
    const maisBtn=extras.length
      ?`<button class="ec-resp-mais" data-mais="${esc(e.id)}" onclick="toggleResps(this)" aria-label="Ver mais responsabilidades">+${extras.length}</button>`
      :''
    const extrasHtml=extras.length
      ?`<div class="ec-resp-extras" id="extras-${esc(e.id)}" style="display:none">${extras.map(r=>`<span class="ec-resp-chip ec-resp-extra">${esc(r)}</span>`).join('')}</div>`
      :''
    respHtml=`<div class="ec-resp-wrap"><span class="ec-resp-label">Resp.</span>${chips}${maisBtn}${extrasHtml}</div>`
  }

  // Botão de detalhes (se a pessoa tiver funções cadastradas)
  const temDetalhes=getFuncoes(e.person)!==null
  const detalheBtn=temDetalhes
    ?`<button class="ec-detalhe-btn" data-det-nome="${esc(e.person)}" data-det-role="${esc(e.role||'')}">📋 Ver funções</button>`
    :''

  // Ajuste manual: indicador no card + botão para admin
  const aj=e.ajuste||null
  let ajusteHtml=''
  if(aj&&aj.tipo){
    const meta=getAjusteMeta(aj.tipo)
    ajusteHtml=`<div class="ec-ajuste-badge" data-aj="${esc(k)}" title="${esc(aj.descricao||'')}">
      ${meta.icon} ${meta.label}
    </div>`
  }
  const ajusteBtn=logado
    ?`<button class="ec-btn ec-btn-ajuste" data-ajuste="${esc(k)}">${aj?'✏️ Ajuste':'+ Ajuste'}</button>`
    :''

  return `<div class="entry-card${isFalta?' falta':''}" data-k="${k}">
    <span class="ec-role">${esc(e.role||'—')}</span>
    <div class="ec-right">
      <div class="ec-name">${esc(e.person||'—')}</div>
      ${horHtml}
      ${ajusteHtml}
      ${respHtml}
      ${e.obs?`<div class="ec-obs">${esc(e.obs)}</div>`:''}
      ${statusHtml}
      ${detalheBtn}
      <div class="ec-actions">
        ${logado?`<button class="ec-btn edit" data-ed="${k}">✏️ Editar</button>`:''}
        ${logado?`<button class="ec-btn del" data-dl="${k}">🗑️</button>`:''}
        ${logado&&!isFalta?`<button class="ec-btn falta-btn" data-falta="${k}">⚠ Falta</button>`:''}
        ${ajusteBtn}
      </div>
    </div>
  </div>`
}

// ── REBIND PAINEL ──
function rebuildPanel(){
  if(!G.selectedDate)return
  const body=document.getElementById('panel-body')
  if(!body)return
  const day=dayMap[G.selectedDate];if(!day)return
  body.innerHTML=buildRegrasPanel()+(day.manha.length?buildShiftPanel(day,'manha'):'')+(day.noite.length?buildShiftPanel(day,'noite'):'')+buildHistoricoPanel(G.selectedDate)
  bindPanel()
}

// Rebuid só a célula do calendário selecionada
// ── Reconstrói só a célula do calendário de uma data ──
function rebuildCell(dateStr){
  const cells=document.querySelectorAll('[data-date]')
  cells.forEach(c=>{
    if(c.dataset.date===dateStr){
      const today=new Date().toISOString().split('T')[0]
      const day=dayMap[dateStr];if(!day)return
      const allE=[...day.manha,...day.noite]
      const faltas=allE.filter(e=>e.status==='absent').length
      let chips=''
      if(day.manha.length) chips+=`<div class="cal-chip chip-m">☀️ ${day.manha.length}</div>`
      if(day.noite.length) chips+=`<div class="cal-chip chip-n">🌙 ${day.noite.length}</div>`
      if(faltas) chips+=`<div class="cal-chip chip-f">✕${faltas}</div>`
      c.innerHTML=`<div class="cal-day-num">${parseInt(dateStr.split('-')[2])}</div><div class="cal-chips">${chips}</div>`
    }
  })
}

    if(document.getElementById('hmodal'))  {document.getElementById('hmodal').remove();return}
    if(document.getElementById('lmodal'))  {document.getElementById('lmodal').remove();return}
    if(document.getElementById('fmodal'))  {document.getElementById('fmodal').remove();return}
    if(document.getElementById('ftmodal')) {document.getElementById('ftmodal').remove();return}
    if(document.getElementById('pmodal'))  {document.getElementById('pmodal').remove();return}
    if(document.getElementById('unifmodal')){document.getElementById('unifmodal').remove();return}
    if(document.getElementById('verregmodal')){document.getElementById('verregmodal').remove();return}

// ── Bind dos eventos do painel (editar, excluir, registrar falta/ocorrência) ──
function bindPanel(){
  const pc=document.getElementById('panel-close');if(pc)pc.onclick=()=>{G.selectedDate=null;render()}
  // Scroll indicator
  const pb=document.getElementById('panel-body')
  if(pb){
    pb.onscroll=()=>pb.classList.toggle('scrolled',pb.scrollTop>10)
  }
  // Bind botões "Ver funções" → popup operacional completo
  document.querySelectorAll('.ec-detalhe-btn').forEach(b=>{
    b.onclick=ev=>{ev.stopPropagation();showDetalhes(b.dataset.detNome,b.dataset.detRole)}
  })
  // Carregar histórico remoto do dia selecionado (sem bloquear UI)
  if(G.selectedDate) loadHistoricoRemoto(G.selectedDate)

  // Botão ajuste manual
  document.querySelectorAll('[data-ajuste]').forEach(b=>{
    b.onclick=ev=>{ev.stopPropagation();showAjusteModal(b.dataset.ajuste)}
  })

  document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift]=b.dataset.add.split('|')
      const day=dayMap[date];if(!day)return
      day[shift].push({id:'n'+Date.now(),role:'',person:'',obs:'',status:'pending',confirmedAt:null,faltaTipo:null})
      save();rebuildPanel();rebuildCell(date)
    })
  })
  document.querySelectorAll('[data-ed]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift,id]=b.dataset.ed.split('|')
      const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
      b.closest('[data-k]').outerHTML=buildCard(date,shift,e,true)
      bindEdit(date,shift,id)
    })
  })
  document.querySelectorAll('[data-dl]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      if(!confirm('Excluir esta linha?'))return
      const[date,shift,id]=b.dataset.dl.split('|')
      const day=dayMap[date];if(!day)return
      day[shift]=day[shift].filter(e=>e.id!==id)
      save();toast('Linha removida.','info');rebuildPanel();rebuildCell(date)
    })
  })
  document.querySelectorAll('[data-falta]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift,id]=b.dataset.falta.split('|')
      const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
      showRegistrarModal(date,shift,[e])
    })
  })
  document.querySelectorAll('[data-reg]').forEach(b=>b.onclick=()=>{
    requireAuth(()=>{
      const[date,shift,nome]=b.dataset.reg.split('|')
      const day=dayMap[date];if(!day)return
      const entries=(day[shift]||[]).filter(e=>e.person===nome)
      if(!entries.length)return
      // Se todos ausentes: mostrar o registro existente
      const allAbsent=entries.every(e=>e.status==='absent')
      if(allAbsent) showVerRegistroModal(date,shift,nome,entries)
      else showRegistrarModal(date,shift,entries)
    })
  })
}

// ── Bind dos inputs de edição inline ──
function bindEdit(date,shift,id){
  const k=`${date}|${shift}|${id}`
  const day=dayMap[date];const e=day&&day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
  document.querySelectorAll(`[data-k="${k}"] [data-f]`).forEach(inp=>{
    inp.oninput=()=>{e[inp.dataset.f]=inp.value;save()}
  })
  const sv=document.querySelector(`[data-sv="${k}"]`)
  if(sv)sv.onclick=()=>{
    // Fase 4: exigir motivo antes de salvar
    const wrap=document.getElementById(`motivo-${k}`)
    if(wrap)wrap.style.display='block'
    sv.style.display='none'
    // Mostrar/ocultar input de texto quando "outro"
    const sel=document.getElementById(`motivo-sel-${k}`)
    const txt=document.getElementById(`motivo-txt-${k}`)
    if(sel&&txt) sel.onchange=()=>{txt.style.display=sel.value==='outro'?'block':'none'}
    // Botão confirmar
    const ok=document.getElementById(`motivo-ok-${k}`)
    if(ok)ok.onclick=()=>{
      const motivo=sel&&sel.value?( sel.value==='outro'?(txt&&txt.value.trim()||'outro')  :sel.value )  :''
      if(!motivo){toast('Selecione um motivo.','error');return}
      // Capturar antes/depois para histórico
      const antes=`${e.role} — ${e.person}`
      document.querySelectorAll(`[data-k="${k}"] [data-f]`).forEach(i=>{e[i.dataset.f]=i.value})
      const depois=`${e.role} — ${e.person}`
      // Fase 5: registrar no histórico
      registrarHistorico(e.person,antes,depois,motivo)
      save();toast('Salvo ✓ — motivo: '+motivo,'success')
      rebuildPanel();rebuildCell(date)
    }
  }
  const cx=document.querySelector(`[data-cx="${k}"]`)
  if(cx)cx.onclick=()=>{cx.closest('[data-k]').outerHTML=buildCard(date,shift,e);bindPanel()}
  document.querySelector(`[data-k="${k}"] input`)?.focus()
}

// Registra cada alteração feita pelo admin
let HISTORICO=[]
// ── Registra alteração no histórico local da sessão ──
function registrarHistorico(pessoa,antes,depois,motivo){
  const entrada={
    at: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    editor: G.user?G.user.name:'?',
    pessoa,antes,depois,motivo
  }
  HISTORICO.push(entrada)
  if(HISTORICO.length>100) HISTORICO=HISTORICO.slice(-100)
  // Salvar no Supabase em background
  saveHistoricoRemoto(entrada)
}

// ── Modal de login (usuário/senha). onSuccess: callback após autenticação ──
function showLoginModal(onSuccess){
  document.getElementById('lmodal')?.remove()
  const useSupaAuth = false // Login local por enquanto
  const m=document.createElement('div');m.id='lmodal'
  // Campo de email (Supabase) ou usuário (fallback local)
  const inputLabel = useSupaAuth ? 'E-mail' : 'Usuário'
  const inputPlaceholder = useSupaAuth ? 'seu@email.com' : 'admin, vitoria, viviane ou gabriela'
  const inputType = useSupaAuth ? 'email' : 'text'

  m.innerHTML=`<div class="modal-bg" id="lmbg">
    <div class="modal-card" style="max-width:360px">
      <div class="card-top">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
        <span class="fallback" style="display:none">🥟</span>
        <div class="card-top-sub">Acesso restrito</div>
      </div>
      <div class="card-body">
        <div class="l-title">Identificação necessária</div>
        <div class="l-sub">Logins: <b>admin</b> · <b>vitoria</b> · <b>viviane</b> · <b>gabriela</b><br/>Senha: <b>2026</b></div>
        <div class="field">
          <label>${inputLabel}</label>
          <input class="inp" id="mu" type="${inputType}" placeholder="${inputPlaceholder}" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="inp-wr">
            <input class="inp" id="mp" type="password" placeholder="••••••"/>
            <button class="eye" id="meye">👁</button>
          </div>
        </div>
        <div class="l-err" id="merr"></div>
        <div style="display:flex;gap:9px">
          <button class="l-btn" id="mcancel" style="background:var(--g200);color:var(--g700);flex:0 0 auto;width:auto;padding:12px 16px">Cancelar</button>
          <button class="l-btn" id="mlogin" style="flex:1">Entrar</button>
        </div>
      </div>
    </div>
  </div>`

  document.body.appendChild(m)
  document.getElementById('mu').focus()
  document.getElementById('meye').onclick=()=>{const p=document.getElementById('mp');p.type=p.type==='password'?'text':'password'}
  document.getElementById('mcancel').onclick=()=>m.remove()
  document.getElementById('lmbg').onclick=ev=>{if(ev.target===ev.currentTarget)m.remove()}
  document.getElementById('mp').onkeydown=ev=>{if(ev.key==='Enter')tryLogin()}
  document.getElementById('mu').onkeydown=ev=>{if(ev.key==='Enter')document.getElementById('mp').focus()}
  document.getElementById('mlogin').onclick=tryLogin

  async function tryLogin(){
    const u=(document.getElementById('mu').value||'').trim()
    const p=document.getElementById('mp').value||''
    const err=document.getElementById('merr')
    const btn=document.getElementById('mlogin')
    if(!u){err.textContent='⚠ Informe o '+inputLabel.toLowerCase()+'.';err.style.display='block';return}
    if(!p){err.textContent='⚠ Informe a senha.';err.style.display='block';return}
    btn.innerHTML='<span class="spinner"></span>';btn.disabled=true

    if(useSupaAuth){
      // ── Login via Supabase Auth ──
      const supaUser = await loginSupabase(u, p)
      if(supaUser){
        const profile=USER_PROFILES[u]||USER_PROFILES[supaUser.email]
        if(profile){
          G.user={u:supaUser.email,email:supaUser.email,...profile}
          localStorage.setItem(SU,JSON.stringify(G.user))
          m.remove();toast('Olá, '+G.user.name+'! ✓','success');render()
          if(onSuccess)onSuccess()
        } else {
          show('Usuário sem permissão de acesso.')
          await logoutSupabase()
        }
      } else {
        show('E-mail ou senha incorretos.')
      }
    } else {
      // ── Fallback: login local (modo offline/dev) ──
      setTimeout(()=>{
        const f=USERS_DEV.find(x=>x.u.toLowerCase()===u.toLowerCase())
        if(!f){show('Usuário não encontrado.');return}
        if(p!==f.p){show('Senha incorreta.');return}
        G.user={u:f.u,role:f.role,name:f.name,av:f.av,can:f.can}
        m.remove();toast('Olá, '+G.user.name+'! ✓','success');render()
        if(onSuccess)onSuccess()
      },350)
    }
    function show(msg){err.textContent='⚠ '+msg;err.style.display='block';btn.innerHTML='Entrar';btn.disabled=false}
  }
}

// ── POPUP DETALHES DA PESSOA — PAINEL OPERACIONAL COMPLETO ──
function showDetalhes(nome, funcaoAtual){
  document.getElementById('dmodal')?.remove()
  const hor=getHorario(nome)
  const func=getFuncoes(nome)
  const resps=getResponsabilidades(nome)||[]
  const m=document.createElement('div');m.id='dmodal'
  m.className='detalhe-popup'

  // 2. Horário
  const horSection=hor&&hor.horario?`
    <div class="dp-section">
      <div class="dp-section-label">Horário</div>
      <div class="dp-hor-row">
        <span class="dp-hor-badge">🕐 ${esc(hor.horario)}</span>
        <span class="dp-hor-badge">🍽 ${esc(hor.almoco)}</span>
      </div>
    </div>`:''

  // 3. Função principal + padrão do dia + função de hoje
  const funcPrincipal=func?.funcaoPrincipal||null
  const padraoDia=func?.padraoDia||null
  // Descobrir o dia da semana do painel aberto
  const wdAtual=G.selectedDate?dayMap[G.selectedDate]?.wd:null
  const padraoHoje=padraoDia&&wdAtual?padraoDia[wdAtual]:null

  const funcDiaSection=`
    <div class="dp-section">
      ${funcPrincipal?`
        <div class="dp-section-label">Função principal</div>
        <span class="dp-funcao-principal">${esc(funcPrincipal)}</span>
      `:''}
      ${padraoHoje?`
        <div class="dp-section-label" style="margin-top:8px">Padrão de hoje (${esc(wdAtual)})</div>
        <span class="dp-padrao-dia">${esc(padraoHoje)}</span>
      `:''}
      ${funcaoAtual&&funcaoAtual!==funcPrincipal?`
        <div class="dp-section-label" style="margin-top:8px">Função escalada agora</div>
        <span class="dp-funcao-hoje">${esc(funcaoAtual)}</span>
      `:''}
    </div>`

  // 4. Funções possíveis
  let funcSection=''
  if(func&&func.funcoes.length){
    const itens=func.funcoes.map(f=>{
      const isCurr=funcaoAtual&&f.toLowerCase()===funcaoAtual.toLowerCase()
      const desc=func.detalhes[f]||''
      return`<div class="dp-func-item${isCurr?' dp-func-hoje':''}">
        <div class="dp-func-nome">${isCurr?'🔴 ':''}${esc(f)}${isCurr?' <span class="dp-hoje-tag">HOJE</span>':''}</div>
        ${desc?`<div class="dp-func-desc">${esc(desc)}</div>`:''}
      </div>`
    }).join('')
    funcSection=`
      <div class="dp-section">
        <div class="dp-section-label">Funções</div>
        <div class="dp-bloco-badge">${esc(func.bloco)}</div>
        ${itens}
      </div>`
  }

  // 5+6. Responsabilidades operacionais (com destaque para críticas)
  let respSection=''
  if(resps.length){
    const chips=resps.map(r=>{
      const crit=isCritica(r)
      return`<span class="dp-resp-chip${crit?' dp-resp-critica':''}">${crit?'⚡ ':''}${esc(r)}</span>`
    }).join('')
    respSection=`
      <div class="dp-section">
        <div class="dp-section-label">Responsabilidades</div>
        <div class="dp-resp-list">${chips}</div>
      </div>`
  }

  // 7. Obs operacionais (vem de func.detalhes da função atual se houver)
  const obsText=func&&funcaoAtual&&func.detalhes[funcaoAtual]?func.detalhes[funcaoAtual]:''
  const obsSection=obsText?`
    <div class="dp-section">
      <div class="dp-section-label">Obs. operacional</div>
      <div class="dp-obs">${esc(obsText)}</div>
    </div>`:''

  // 7b. Ajuste do dia (se houver) — busca no dayMap
  let ajusteSection=''
  if(G.selectedDate){
    const day=dayMap[G.selectedDate]
    if(day){
      const allE=[...day.manha,...day.noite]
      const entry=allE.find(x=>normStr(x.person||'').startsWith(normStr(nome||'').split(' ')[0]))
      const aj=entry&&entry.ajuste&&entry.ajuste.tipo?entry.ajuste:null
      if(aj){
        const meta=getAjusteMeta(aj.tipo)
        ajusteSection=`
          <div class="dp-section">
            <div class="dp-section-label">Ajuste do dia</div>
            <div class="dp-ajuste-bloco">
              <span class="dp-ajuste-tipo">${meta.icon} ${meta.label}</span>
              ${aj.descricao?`<div class="dp-ajuste-desc">${esc(aj.descricao)}</div>`:''}
              ${aj.observacao?`<div class="dp-ajuste-obs">${esc(aj.observacao)}</div>`:''}
              ${aj.aprovadoPor?`<div class="dp-ajuste-apr">✓ Aprovado por ${esc(aj.aprovadoPor)}</div>`:''}
            </div>
          </div>`
      }
    }
  }

  // 8b. Temperatura — se a pessoa tem tempInfo definido
  let tempSection=''
  if(func&&func.tempInfo){
    const ti=func.tempInfo
    const STATUS_COR={ok:'#27AE60',warn:'#F39C12',crit:'#E74C3C',pre:'#5E35B1'}
    const STATUS_BG={ok:'#E8F5E9',warn:'#FFF8E1',crit:'#FFEBEE',pre:'#F3E5F5'}
    const faixasHtml=ti.faixas.map(f=>`
      <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:${STATUS_BG[f.status]||'#F5F5F5'};border-radius:8px;margin-bottom:5px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:${STATUS_COR[f.status]||'#616161'};min-width:110px">${esc(f.val)}</span>
        <div>
          <div style="font-size:12px;font-weight:800;color:${STATUS_COR[f.status]||'#616161'}">${esc(f.label)}</div>
          <div style="font-size:11px;color:#616161">${esc(f.desc)}</div>
        </div>
      </div>`).join('')
    const regrasHtml=ti.regras.map(r=>`<div style="font-size:12px;color:#166534;padding:2px 0;line-height:1.5">✔ ${esc(r)}</div>`).join('')
    tempSection=`
      <div class="dp-section">
        <div class="dp-section-label">Temperatura</div>
        <div style="background:#FFF3E0;border:1.5px solid #FFCC80;border-radius:10px;padding:10px 12px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:800;color:#E65100;margin-bottom:4px">${esc(ti.titulo)}</div>
          <div style="font-size:12px;color:#7C2D12;line-height:1.5;margin-bottom:8px">💡 ${esc(ti.motivo)}</div>
          ${faixasHtml}
        </div>
        <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;padding:8px 10px">${regrasHtml}</div>
      </div>`
  }

  // 9. Regra do dia
  const regraSection=`
    <div class="dp-regra">
      ${REGRA_OPERACIONAL.itens.map(i=>`<div class="dp-regra-item">${esc(i)}</div>`).join('')}
    </div>`

  // 9. Transição checklist
  const transSection=`
    <div class="dp-trans">
      <div class="dp-trans-atual">${esc(TRANSICAO_CHECKLIST.atual)}</div>
      <div class="dp-trans-futuro">${esc(TRANSICAO_CHECKLIST.futuro)}</div>
    </div>`

  const turnoLabel=hor?(hor.turno==='manha'?'☀️ Manhã':hor.turno==='estagiario'?'📋 Estagiário':'🌙 Noite'):''

  m.innerHTML=`
    <div class="dp-overlay" id="dp-overlay">
      <div class="dp-card">
        <div class="dp-head">
          <div>
            <div class="dp-nome">${esc(nome)}</div>
            ${turnoLabel?`<div class="dp-turno">${turnoLabel}</div>`:''}
          </div>
          <button class="dp-close" onclick="document.getElementById('dmodal').remove()">✕</button>
        </div>
        <div class="dp-body">
          ${horSection}
          ${funcDiaSection}
          ${funcSection}
          ${respSection}
          ${obsSection}
          ${ajusteSection}
          ${tempSection}
          ${regraSection}
          ${transSection}
        </div>
      </div>
    </div>`

  document.body.appendChild(m)
  document.getElementById('dp-overlay').onclick=ev=>{if(ev.target.id==='dp-overlay')m.remove()}
}

function showAjusteModal(k){
  const [date,shift,id]=k.split('|')
  const day=dayMap[date];if(!day)return
  const e=day[shift]&&day[shift].find(x=>x.id===id);if(!e)return
  const aj=e.ajuste||{}

  document.getElementById('ajmodal')?.remove()
  const m=document.createElement('div');m.id='ajmodal'
  const opts=Object.entries(AJUSTE_TIPOS).map(([v,{label,icon}])=>
    `<option value="${v}"${aj.tipo===v?' selected':''}>${icon} ${label}</option>`
  ).join('')

  m.innerHTML=`<div class="modal-bg" id="ajbg">
    <div class="modal-card" style="max-width:380px">
      <div class="modal-head">
        <div>
          <div class="modal-title">📝 Ajuste manual</div>
          <div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px">${esc(e.person)} · ${esc(e.role)}</div>
        </div>
        <button class="modal-close" id="ajclose">✕</button>
      </div>
      <div class="modal-body" style="padding:18px 20px 20px;display:flex;flex-direction:column;gap:12px">
        <div class="field">
          <label>Tipo</label>
          <select class="inp" id="aj-tipo" style="padding:10px">
            <option value="">Selecione...</option>
            ${opts}
          </select>
        </div>
        <div class="field">
          <label>Descrição</label>
          <input class="inp" id="aj-desc" type="text" value="${esc(aj.descricao||'')}" placeholder="Ex: Saiu 1h antes por consulta"/>
        </div>
        <div class="field">
          <label>Observação <span style="font-weight:400;color:var(--g300)">(opcional)</span></label>
          <input class="inp" id="aj-obs" type="text" value="${esc(aj.observacao||'')}" placeholder="Detalhes adicionais..."/>
        </div>
        <div class="field">
          <label>Aprovado por <span style="font-weight:400;color:var(--g300)">(opcional)</span></label>
          <input class="inp" id="aj-apr" type="text" value="${esc(aj.aprovadoPor||'')}" placeholder="Nome do responsável"/>
        </div>
        <div style="display:flex;gap:8px">
          ${aj.tipo?`<button class="l-btn" id="aj-remover" style="background:var(--red-bg);color:var(--red);flex:0 0 auto;padding:12px 14px;font-size:13px">🗑 Remover</button>`:''}
          <button class="l-btn" id="aj-salvar">✓ Salvar ajuste</button>
        </div>
      </div>
    </div>
  </div>`

  document.body.appendChild(m)
  document.getElementById('ajclose').onclick=()=>m.remove()
  document.getElementById('ajbg').onclick=ev=>{if(ev.target===ev.currentTarget)m.remove()}

  document.getElementById('aj-salvar').onclick=()=>{
    const tipo=document.getElementById('aj-tipo').value
    if(!tipo){toast('Selecione um tipo.','error');return}
    const desc=document.getElementById('aj-desc').value.trim()
    if(!desc){toast('Informe uma descrição.','error');return}
    const antes=e.ajuste?getAjusteMeta(e.ajuste.tipo).label:'—'
    e.ajuste={
      tipo,
      descricao:desc,
      observacao:document.getElementById('aj-obs').value.trim(),
      aprovadoPor:document.getElementById('aj-apr').value.trim()
    }
    save()
    saveDay(date)
    registrarHistorico(e.person,
      `Ajuste: ${antes}`,
      `Ajuste: ${getAjusteMeta(tipo).label} — ${desc}`,
      'ajuste manual')
    toast(`Ajuste registrado para ${e.person}.`,'success')
    m.remove()
    rebuildPanel();rebuildCell(date)
  }

  const remBtn=document.getElementById('aj-remover')
  if(remBtn)remBtn.onclick=()=>{
    const antes=getAjusteMeta(e.ajuste?.tipo||'').label
    delete e.ajuste
    save();saveDay(date)
    registrarHistorico(e.person,`Ajuste: ${antes}`,'Ajuste removido','remoção de ajuste')
    toast('Ajuste removido.','info')
    m.remove()
    rebuildPanel();rebuildCell(date)
  }
}
