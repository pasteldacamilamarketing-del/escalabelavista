async function salvarPendencias(items,negs,resps,user,turno,tabela_origem){
  var pendentes=items.filter(function(i){var n=negs[i.id]||{};return resps[i.id]==='nao'&&(n.prox==='Sim, fica pendente'||n.prox==='Sim');});
  var falhas=[];
  for(var i=0;i<pendentes.length;i++){
    var it=pendentes[i];var neg=negs[it.id]||{};
    var ok=await sbInsert('checkon_pendencias',{login:user.login,user_name:user.name,turno:turno,data:todayISO(),data_fmt:todayFmt(),item_id:it.id,item_texto:it.texto||it.ti||it.id,aconteceu:neg.aconteceu||neg.ocorrencia||'',feito:neg.feito||neg.acao||'',detalhe:neg.detalhe||'',status:'aberta',checklist_origem:tabela_origem});
    if(!ok)falhas.push(it.id);
  }
  if(falhas.length>0)console.warn('salvarPendencias: '+falhas.length+' pendência(s) não gravada(s):',falhas);
  return falhas.length===0;
}

function PendenciasBlock(props){
  var user=props.user;var turnosFiltro=props.turnos||null;
  var onResolvidas=props.onResolvidas;
  var _pend=useState([]);var pend=_pend[0];var setPend=_pend[1];
  var _loading=useState(true);var loading=_loading[0];var setLoading=_loading[1];
  var _resolvendo=useState({});var resolvendo=_resolvendo[0];var setResolvendo=_resolvendo[1];
  useEffect(function(){
    async function load(){
      setLoading(true);
      var rows=await sbSelectRecente('checkon_pendencias',90,{login:user.login});
      var abertas=rows.filter(function(r){return r.status==='aberta';});
      setPend(abertas.slice(0,20));
      setLoading(false);
      if(abertas.length===0&&onResolvidas)onResolvidas();
    }
    load();
  },[]);
  async function resolver(id,como){
    setResolvendo(function(r){return Object.assign({},r,{[id]:true});});
    try{await sb.from('checkon_pendencias').update({status:'resolvida',resolvida_por:user.name,resolvida_em:nowTime(),resolvida_data:todayFmt()}).eq('id',id);}catch(e){}
    setPend(function(p){return p.filter(function(x){return x.id!==id;});});
  }
  if(loading)return null;
  if(pend.length===0)return null;
  return(
    <div style={{margin:'12px 16px 0',background:'#FEF2F2',border:'2px solid var(--danger-line)',borderRadius:'var(--r12)',overflow:'hidden'}}>
      <div style={{background:'var(--brand)',padding:'12px 14px',display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:18}}>⚠️</span>
        <div style={{flex:1}}><div style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800,color:'#fff'}}>{pend.length} pendência{pend.length!==1?'s':''} do turno anterior</div><div style={{fontSize:11,color:'rgba(255,255,255,.75)',marginTop:1}}>Confirme o que foi resolvido antes de continuar</div></div>
      </div>
      {pend.map(function(p){var resol=resolvendo[p.id];return(
        <div key={p.id} style={{padding:'12px 14px',borderBottom:'1px solid var(--danger-line)',background:resol?'#F0FDF4':'#fff'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--ink)',lineHeight:1.4,marginBottom:6}}>{p.item_texto}</div>
          {p.aconteceu&&<div style={{fontSize:11,color:'var(--ink2)',marginBottom:4}}>O que era: {p.aconteceu}</div>}
          <div style={{fontSize:10,color:'var(--ink3)',marginBottom:8}}>{p.data_fmt} · {p.turno}</div>
          {!resol&&(
            <div style={{display:'flex',gap:6}}>
              <button onClick={function(){resolver(p.id,'sim');}} style={{flex:1,padding:'8px',background:'var(--ok)',color:'#fff',borderRadius:'var(--r8)',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,border:'none',cursor:'pointer'}}>✅ Resolvida</button>
              <button onClick={function(){resolver(p.id,'nao');}} style={{flex:1,padding:'8px',background:'#FEF3C7',color:'#92400E',borderRadius:'var(--r8)',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,border:'none',cursor:'pointer'}}>⏳ Ainda aberta</button>
            </div>
          )}
          {resol&&<div style={{fontSize:12,color:'var(--ok)',fontWeight:700}}>✓ Confirmada</div>}
        </div>
      );})}
    </div>
  );
}

function validateNoiteNeg(neg,critico){
  var n=neg||{};
  /* Campos obrigatórios base */
  if(!n.aconteceu||!n.feito||!n.prox)return false;
  /* Crítico não resolvido exige responsável */
  if(critico&&n.prox!=='resolvi'&&!n.responsavel)return false;
  return true;
}

function NoiteNaoForm(props){
  /* ══ Form progressivo — Performance Support System com Behavior Design ══
     Mesa: Gawande (contexto), Kahneman (1 campo por vez), Norman (affordance),
     Dweck (linguagem de crescimento), Fogg (comportamento mínimo), Frankl (propósito)
     Referência: progressive disclosure — Von Ahn / Duolingo ══ */
  var data=props.data||{};
  var showErr=props.showErr;
  var missao=props.missao||1;
  var critico=props.critico||false;
  var textoItem=props.textoItem||'';
  var _etapa=useState('aconteceu');var etapa=_etapa[0];var setEtapa=_etapa[1];

  function set(k,v){
    props.onChange(function(prev){return Object.assign({},prev||{},{[k]:v});});
  }
  function stop(e){e.stopPropagation();}
  function avancar(proxEtapa){setEtapa(proxEtapa);}

  /* Chips contextuais por missão */
  var chipsAconteceu=missao===3?NOITE_CHIPS_ACONTECEU_M3:(missao>=4?NOITE_CHIPS_ACONTECEU_M4M5:NOITE_CHIPS_ACONTECEU_M1M2);
  var chipsFeito=missao===3?NOITE_CHIPS_FEITO_M3:(missao>=4?NOITE_CHIPS_FEITO_M4M5:NOITE_CHIPS_FEITO_M1M2);

  /* Desfecho — 3 opções reais da operação */
  var opcoesDesfecho=[
    {v:'resolvi',label:'✅ Resolvi agora',cor:'var(--ok)',desc:'Problema encerrado neste turno'},
    {v:'Sim, fica pendente',label:'⚠️ Fica para o próximo turno',cor:'var(--brand)',desc:'A Gabriela vai precisar saber'},
    {v:'registrei',label:'📋 Registrei sem resolução',cor:'var(--ink2)',desc:'Não foi possível resolver agora'}
  ];

  /* Precisa de responsável: crítico E não resolveu na hora */
  var precisaResponsavel=critico&&data.prox!=='resolvi';

  /* Precisa de detalhe: ficou pendente ou registrou sem resolução */
  var precisaDetalhe=data.prox==='Sim, fica pendente'||data.prox==='registrei';

  /* Progresso visual — quantas etapas já foram respondidas */
  var etapas=['aconteceu','feito','desfecho'];
  if(precisaResponsavel)etapas.push('responsavel');
  etapas.push('aprendizado');
  var idxAtual=etapas.indexOf(etapa);
  var total=etapas.length;

  /* Cores e borda por contexto */
  var bgForm=critico?'#FFF0F0':'#FFF5F5';
  var borderForm=critico?'2px solid var(--danger)':'1.5px solid var(--danger-line)';
  var corTitulo=critico?'var(--danger)':'var(--ink2)';

  /* Estilo compartilhado para chips de etapa */
  function chipStyle(sel,cor){
    return {
      padding:'9px 14px',borderRadius:'var(--r99)',border:'1.5px solid',
      fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,cursor:'pointer',
      transition:'all .13s',whiteSpace:'nowrap',
      borderColor:sel?(cor||'var(--brand)'):'var(--line)',
      background:sel?(cor||'var(--brand)'):'var(--surface)',
      color:sel?'#fff':'var(--ink2)'
    };
  }

  return(
    <div onClick={stop} style={{background:bgForm,border:borderForm,borderRadius:'var(--r12)',padding:'14px',marginTop:10}}>

      {/* ── CABEÇALHO: contexto do item (Gawande) ── */}
      <div style={{marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
          <span style={{fontSize:14}}>{critico?'🚨':'📝'}</span>
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:10,fontWeight:800,color:corTitulo,textTransform:'uppercase',letterSpacing:.5}}>
            {critico?'Item crítico — registre agora':'Vamos registrar para não perder.'}
          </div>
        </div>
        {textoItem&&(
          <div style={{background:'rgba(0,0,0,.05)',borderRadius:'var(--r8)',padding:'7px 10px',fontSize:12,color:'var(--ink)',fontWeight:600,lineHeight:1.4}}>
            {textoItem}
          </div>
        )}
      </div>

      {/* ── BARRA DE PROGRESSO (Norman: ela sabe que tem fim) ── */}
      <div style={{display:'flex',gap:4,marginBottom:14}}>
        {etapas.map(function(e,i){
          var done=i<idxAtual;var active=i===idxAtual;
          return(<div key={e} style={{flex:1,height:4,borderRadius:2,
            background:done?'var(--ok)':active?(critico?'var(--danger)':'var(--brand)'):'var(--line)',
            transition:'background .2s'}}/>);
        })}
      </div>

      {/* ── RESPOSTAS JÁ DADAS — histórico visível (Von Ahn: progressive disclosure) ── */}
      {data.aconteceu&&etapa!=='aconteceu'&&(
        <div style={{marginBottom:8,display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'var(--surface)',borderRadius:'var(--r8)',border:'1px solid var(--line)',cursor:'pointer'}}
          onClick={function(e){e.stopPropagation();setEtapa('aconteceu');}}>
          <span style={{fontSize:11,color:'var(--ink3)',flex:1}}>O que aconteceu: <strong style={{color:'var(--ink)'}}>{data.aconteceu}</strong></span>
          <span style={{fontSize:10,color:'var(--brand)',fontWeight:700}}>editar</span>
        </div>
      )}
      {data.feito&&etapa!=='aconteceu'&&etapa!=='feito'&&(
        <div style={{marginBottom:8,display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'var(--surface)',borderRadius:'var(--r8)',border:'1px solid var(--line)',cursor:'pointer'}}
          onClick={function(e){e.stopPropagation();setEtapa('feito');}}>
          <span style={{fontSize:11,color:'var(--ink3)',flex:1}}>O que foi feito: <strong style={{color:'var(--ink)'}}>{data.feito}</strong></span>
          <span style={{fontSize:10,color:'var(--brand)',fontWeight:700}}>editar</span>
        </div>
      )}
      {data.prox&&etapa!=='aconteceu'&&etapa!=='feito'&&etapa!=='desfecho'&&(
        <div style={{marginBottom:8,display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'var(--surface)',borderRadius:'var(--r8)',border:'1px solid var(--line)',cursor:'pointer'}}
          onClick={function(e){e.stopPropagation();setEtapa('desfecho');}}>
          <span style={{fontSize:11,color:'var(--ink3)',flex:1}}>Como ficou: <strong style={{color:'var(--ink)'}}>{data.prox==='resolvi'?'Resolvi agora':data.prox==='Sim, fica pendente'?'Fica pendente':'Registrei sem resolução'}</strong></span>
          <span style={{fontSize:10,color:'var(--brand)',fontWeight:700}}>editar</span>
        </div>
      )}

      {/* ══ ETAPA A — O QUE ACONTECEU ══ */}
      {etapa==='aconteceu'&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--ink2)',marginBottom:8,textTransform:'uppercase',letterSpacing:.4}}>
            O que impediu?{showErr&&!data.aconteceu&&<span style={{color:'var(--danger)'}}> *</span>}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
            {chipsAconteceu.map(function(c){
              var sel=data.aconteceu===c;
              return(<button key={c} onClick={function(e){
                e.stopPropagation();
                set('aconteceu',c);
                avancar('feito');
              }} style={chipStyle(sel,'var(--brand)')}>{c}</button>);
            })}
          </div>
          {showErr&&!data.aconteceu&&<div style={{fontSize:10,color:'var(--danger)',marginTop:6,fontWeight:600}}>⚠ Selecione o motivo para continuar</div>}
        </div>
      )}

      {/* ══ ETAPA B — O QUE FOI FEITO ══ */}
      {etapa==='feito'&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--ink2)',marginBottom:8,textTransform:'uppercase',letterSpacing:.4}}>
            O que você fez?{showErr&&!data.feito&&<span style={{color:'var(--danger)'}}> *</span>}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
            {chipsFeito.map(function(c){
              var sel=data.feito===c;
              return(<button key={c} onClick={function(e){
                e.stopPropagation();
                set('feito',c);
                avancar('desfecho');
              }} style={chipStyle(sel,'var(--brand)')}>{c}</button>);
            })}
          </div>
          {showErr&&!data.feito&&<div style={{fontSize:10,color:'var(--danger)',marginTop:6,fontWeight:600}}>⚠ Selecione a ação para continuar</div>}
        </div>
      )}

      {/* ══ ETAPA C — DESFECHO ══ */}
      {etapa==='desfecho'&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--ink2)',marginBottom:8,textTransform:'uppercase',letterSpacing:.4}}>
            Como ficou?{showErr&&!data.prox&&<span style={{color:'var(--danger)'}}> *</span>}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {opcoesDesfecho.map(function(opt){
              var sel=data.prox===opt.v;
              return(
                <button key={opt.v} onClick={function(e){
                  e.stopPropagation();
                  set('prox',opt.v);
                  /* Decide próxima etapa baseado no desfecho e se é crítico */
                  if(opt.v==='resolvi'){
                    /* Resolveu — vai direto para aprendizado */
                    avancar('aprendizado');
                  }else if(critico){
                    /* Não resolveu + crítico — precisa de responsável */
                    avancar('responsavel');
                  }else{
                    avancar('aprendizado');
                  }
                }} style={{
                  width:'100%',padding:'11px 14px',borderRadius:'var(--r8)',
                  border:'1.5px solid',textAlign:'left',cursor:'pointer',
                  transition:'all .13s',
                  borderColor:sel?opt.cor:'var(--line)',
                  background:sel?opt.cor:'var(--surface)',
                  color:sel?'#fff':'var(--ink2)'
                }}>
                  <div style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700}}>{opt.label}</div>
                  <div style={{fontSize:10,marginTop:2,opacity:.75}}>{opt.desc}</div>
                </button>
              );
            })}
          </div>
          {showErr&&!data.prox&&<div style={{fontSize:10,color:'var(--danger)',marginTop:6,fontWeight:600}}>⚠ Selecione o desfecho para continuar</div>}
          {/* Campo de detalhe aparece quando ficou pendente ou sem resolução */}
          {precisaDetalhe&&(
            <div style={{marginTop:10}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--ink2)',marginBottom:5,textTransform:'uppercase',letterSpacing:.4}}>
                Detalhe <span style={{color:'var(--ink3)',fontWeight:400,textTransform:'none'}}>(opcional)</span>
              </div>
              <textarea className="neg-obs" value={data.detalhe||''} onClick={function(e){e.stopPropagation();}}
                onChange={function(e){e.stopPropagation();set('detalhe',e.target.value.slice(0,280));}}
                placeholder="O que a Gabriela precisa saber sobre isso..."
                style={{minHeight:52,width:'100%'}}/>
              <div style={{textAlign:'right',fontSize:10,color:(data.detalhe||'').length>240?'var(--warn)':'var(--ink3)',marginTop:2}}>{(data.detalhe||'').length}/280</div>
            </div>
          )}
        </div>
      )}

      {/* ══ ETAPA D — RESPONSÁVEL (só crítico não resolvido) ══ */}
      {etapa==='responsavel'&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--danger)',marginBottom:8,textTransform:'uppercase',letterSpacing:.4}}>
            Quem foi acionado?{showErr&&!data.responsavel&&<span> *</span>}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
            {['Camila','Derik','Bruna','Eu mesmo','Outro'].map(function(r){
              var sel=data.responsavel===r;
              return(<button key={r} onClick={function(e){
                e.stopPropagation();
                set('responsavel',r);
                avancar('aprendizado');
              }} style={chipStyle(sel,'var(--danger)')}>{r}</button>);
            })}
          </div>
          {showErr&&!data.responsavel&&<div style={{fontSize:10,color:'var(--danger)',marginTop:6,fontWeight:600}}>⚠ Item crítico exige responsável</div>}
        </div>
      )}

      {/* ══ ETAPA E — APRENDIZADO (Dweck + Frankl: reflexão que forma) ══ */}
      {etapa==='aprendizado'&&(
        <div>
          <div style={{background:'rgba(0,0,0,.03)',borderRadius:'var(--r8)',padding:'10px 12px'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--ink2)',marginBottom:5,textTransform:'uppercase',letterSpacing:.4}}>
              💡 O que faria diferente da próxima vez? <span style={{color:'var(--ink3)',fontWeight:400,textTransform:'none'}}>(opcional)</span>
            </div>
            <textarea className="neg-obs" value={data.aprendizado||''} onClick={function(e){e.stopPropagation();}}
              onChange={function(e){e.stopPropagation();set('aprendizado',e.target.value.slice(0,200));}}
              placeholder="Uma linha é suficiente..."
              style={{minHeight:44,width:'100%',background:'transparent',border:'1px solid var(--line)'}}/>
            <div style={{fontSize:10,color:'var(--ink3)',marginTop:4}}>Isso fica no seu histórico. Em 66 dias vira aprendizado real.</div>
          </div>
        </div>
      )}

    </div>
  );
}

function NoiteBlocoItem(props){
  var item=props.item;var resp=props.resp;var neg=props.neg;var onAns=props.onAns;var onNeg=props.onNeg;var showErr=props.showErr;
  var _f=useState(false);var flash=_f[0];var setFlash=_f[1];
  var _open=useState(false);var open=_open[0];var setOpen=_open[1];

  function handleNao(){if(resp!=='nao'){setFlash(true);setTimeout(function(){setFlash(false);},500);if(navigator.vibrate)navigator.vibrate([60,30,60]);}onAns(item.id,'nao');setOpen(true);}
  if(resp&&!open){
    var isSim=resp==='sim';
    var negLabel=!isSim&&neg?(neg.aconteceu||'')+(neg.feito?' · '+neg.feito:''):'';

      <div className={'chk-item'+(item.critico?' lc':' lr')} style={{cursor:'pointer',padding:'10px 16px'}} onClick={function(){setOpen(true);}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>

          <div style={{flex:1}}><div style={{fontSize:13,color:'var(--ink)',lineHeight:1.4}}>{item.texto}</div>{!isSim&&negLabel&&<div style={{fontSize:11,color:'var(--danger)',marginTop:2,fontWeight:600}}>{negLabel}</div>}</div>
          <span style={{flexShrink:0,fontSize:10,fontWeight:700,borderRadius:99,padding:'2px 9px',background:isSim?'var(--ok-bg)':'var(--danger-bg)',color:isSim?'var(--ok)':'var(--danger)'}}>{isSim?'SIM':'NÃO'}</span>
          <span style={{fontSize:11,color:'var(--ink4)'}}>✎</span>
        </div>
      </div>
    );
  }
  return(
    <div className={'chk-item'+(item.critico?' lc':' lr')+(resp==='nao'?' nao-sel':'')+(flash?' nao-flash':'')}>
      {item.critico&&<span className="lvl lv-c">crítico</span>}
      <div className="chk-title">{item.texto}</div>
      <div className="ans-row">
        <button className={'ans-sim'+(resp==='sim'?' sel':'')} onClick={handleSim}><span>{resp==='sim'?'✓':'○'}</span> Sim</button>
        <button className={'ans-nao'+(resp==='nao'?' sel':'')} onClick={handleNao}><span>{resp==='nao'?'✕':'○'}</span> Não</button>
      </div>
      {!resp&&showErr&&<div className="req-msg">⚠ Obrigatório</div>}
      {resp==='nao'&&(<div><NoiteNaoForm data={neg} onChange={function(d){onNeg(item.id,d);}} showErr={showErr} missao={item.missao||1} critico={item.critico||false} textoItem={item.texto||''}/>{validateNoiteNeg(neg,item.critico)&&<button onClick={function(){setOpen(false);}} style={{width:'100%',marginTop:10,padding:'11px',background:'var(--ok)',color:'#fff',borderRadius:'var(--r8)',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>✓ Confirmar e recolher</button>}</div>)}
    </div>
  );
}

function NoiteEtapaAcc(props){
  var etapa=props.etapa;var resps=props.resps;var negs=props.negs;var onAns=props.onAns;var onNeg=props.onNeg;var showErr=props.showErr;
  var _o=useState(true);var open=_o[0];var setOpen=_o[1];
  var items=etapa.itens||[];var tot=items.length;
  var resp=items.filter(function(i){return resps[i.id];}).length;
  var fl=items.filter(function(i){return resps[i.id]==='nao';}).length;
  var allDone=resp===tot&&tot>0;
  var hasErr=showErr&&items.some(function(i){if(!resps[i.id])return true;if(resps[i.id]==='nao')return !validateNoiteNeg(negs[i.id],i.critico);return false;});

        <div className="sec-right"><span className={'sec-badge'+(allDone?' sb-ok':hasErr?' sb-err':' sb-d')}>{resp}/{tot}</span><span className={'sec-chev'+(open?' open':'')}>▾</span></div>

}

function NoiteSummaryScreen(props){
  var resps=props.resps;var negs=props.negs;var user=props.user;var horaInicio=props.horaInicio;var onNovo=props.onNovo;
  var _copied=useState(false);var copied=_copied[0];var setCopied=_copied[1];
  var _conf=useState(false);var confirmando=_conf[0];var setConfirmando=_conf[1];
  var _enc=useState(false);var encerrado=_enc[0];var setEncerrado=_enc[1];
  var allItems=NOITE_ETAPAS.reduce(function(acc,e){return acc.concat(e.itens);},[]);
  var total=allItems.length;var falhasItems=allItems.filter(function(i){return resps[i.id]==='nao';});
  var falhas=falhasItems.length;var criticos=allItems.filter(function(i){return i.critico&&resps[i.id]==='nao';}).length;
  var pendencias=falhasItems.filter(function(i){var n=negs[i.id]||{};return n.prox==='Sim, fica pendente';}).length;
  var status=criticos>0?'Crítico':falhas>0?'Atenção':'Turno fechado ✓';
  var statusCor=criticos>0?'var(--danger)':falhas>0?'var(--warn)':'var(--ok)';
  var statusBg=criticos>0?'var(--danger-bg)':falhas>0?'var(--warn-bg)':'var(--ok-bg)';
  var score=Math.max(0,Math.round(100-(falhas/total*50)-(criticos*8)));
  function calcTempo(){if(!horaInicio)return '';try{var parts=horaInicio.split(':');var now=new Date();var then=new Date();then.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);var diff=Math.round((now-then)/60000);if(diff<0||diff>600)return '';var h=Math.floor(diff/60);var m=diff%60;return h>0?h+'h '+(m>0?m+'min':''):(m+'min');}catch(e){return '';}}
  var tempo=calcTempo();

  function buildTextGrupo(){
    var linhas=[];
    var pendentes=[];var resolvidosNaHora=0;var escalados=[];
    falhasItems.forEach(function(it){
      var n=negs[it.id]||{};
      if(n.feito==='Resolvi na hora'||n.feito==='Corrigi parcialmente')resolvidosNaHora++;
      else if(n.feito==='Acionei gerência'||n.feito==='Acionei direção')escalados.push({item:it.texto,motivo:n.aconteceu||''});
      else if(n.prox==='Sim, fica pendente')pendentes.push({item:it.texto,motivo:n.aconteceu||''});
    });
    linhas.push('🌙 Subgerência Noite · '+todayFmt());linhas.push('');
    if(falhas===0){
      linhas.push(user.name+' fechou o turno da noite. Tudo em ordem,');
      linhas.push(total+' de '+total+' itens. Score '+score+'.');
      linhas.push('');linhas.push('Loja fechada corretamente. ✅');
    }else{
      linhas.push(user.name+' fechou. Score '+score+', '+falhas+' item'+(falhas>1?'s':'')+' com ocorrência.');
      if(tempo)linhas.push('⏱ Duração: '+tempo+'.');linhas.push('');
      if(escalados.length>0){linhas.push('Precisa de atenção:');escalados.forEach(function(e){linhas.push('→ '+e.item+(e.motivo?' — '+e.motivo:'')+'.');});}
      if(pendentes.length>0){linhas.push('');linhas.push('Fica para a manhã:');pendentes.forEach(function(e){linhas.push('→ '+e.item+'.');});}
      if(resolvidosNaHora>0){linhas.push('');linhas.push(resolvidosNaHora+' resolvido'+(resolvidosNaHora>1?'s':'')+' na hora.');}
      linhas.push('');linhas.push('Registrado no CheckON.');
    }
    linhas.push('');linhas.push('— CheckON · Pastel da Camilla');
    return linhas.join('\n');
  }

  function handleCopy(){
    var txt=[SISTEMA+' — Subgerência Noite','━━━━━━━━━━',user.name+' · '+todayFmt()+(tempo?' · ⏱ '+tempo:''),'Status: '+status+' · Score: '+score+'/100'];
    txt.push('━━━━━━━━━━','✅ OK: '+(total-falhas)+'/'+total+'  ❌ Falhas: '+falhas+(pendencias>0?'  ⏳ Pendências: '+pendencias:''));
    if(falhas>0){txt.push('','🔴 Ocorrências:');falhasItems.forEach(function(it,i){var n=negs[it.id]||{};txt.push((i+1)+'. '+it.texto);if(n.aconteceu)txt.push('   O que: '+n.aconteceu);if(n.feito)txt.push('   Ação: '+n.feito);if(n.prox==='Sim, fica pendente')txt.push('   ⚠️ Pendente para a manhã');});}
    txt.push('━━━━━━━━━━','_CheckON · Pastel da Camilla_');
    var s=txt.join('\n');
    if(navigator.clipboard){navigator.clipboard.writeText(s).catch(function(){var ta=document.createElement('textarea');ta.value=s;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});}
    else{var ta=document.createElement('textarea');ta.value=s;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  }

  function handleEnviarGrupo(){
    var txt=buildTextGrupo();
    try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).catch(function(){});}else{var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(ex){}document.body.removeChild(ta);}}catch(ex){}
    setCopied(true);
  }

  if(encerrado){return<TurnoEncerrado user={user} falhas={falhas} criticos={criticos} score={score} turnoLabel={'🌙 Subgerência Noite'} cor="#7C3AED" onHub={onNovo} onBack={props.onBack} onLogout={props.onLogout} onRevisar={function(){setEncerrado(false);}}/>;}
  if(confirmando){
    return(
      <div style={{minHeight:'100vh',background:'var(--bg)',paddingBottom:32}}>
        <div style={{background:'#EA1D2C',color:'#fff',padding:'14px 16px'}}>
          <button onClick={function(){setConfirmando(false);}} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'#fff',borderRadius:99,padding:'5px 12px',fontSize:11,fontWeight:600,cursor:'pointer',marginBottom:10}}>← Voltar</button>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:28}}>📲</span>
            <div><div style={{fontFamily:"'Sora',sans-serif",fontSize:16,fontWeight:900}}>Enviar para o grupo</div><div style={{fontSize:12,opacity:.75,marginTop:1}}>{falhas===0?'Fechamento impecável!':'Relatório com ocorrências.'}</div></div>
          </div>
        </div>
        <div style={{maxWidth:720,margin:'0 auto',padding:'16px 16px 0'}}>
          <div style={{background:'#fff',borderRadius:'var(--r12)',border:'1px solid var(--line)',padding:'16px',marginBottom:16}}>
            <div style={{fontSize:13,color:'var(--ink)',lineHeight:1.7,marginBottom:14}}>{falhas===0?'Loja fechada com excelência! Clique para avisar o grupo.':'Clique abaixo — o texto é copiado e o WhatsApp abre. Cole e envie!'}</div>
            {!copied&&(<div style={{display:'flex',flexDirection:'column',gap:8}}>{[{n:'1',txt:'Toque no botão verde abaixo'},{n:'2',txt:'O WhatsApp vai abrir'},{n:'3',txt:'Segure a caixa de texto e toque em Colar'}].map(function(step){return(<div key={step.n} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:'#F8FAFC',borderRadius:'var(--r8)',border:'1px solid var(--line)'}}><div style={{width:26,height:26,borderRadius:'50%',background:'#7C3AED',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800,flexShrink:0}}>{step.n}</div><div style={{fontSize:13,color:'var(--ink)',fontWeight:500}}>{step.txt}</div></div>);})}  </div>)}

            <div style={{fontSize:11,fontWeight:700,color:'var(--danger)',textTransform:'uppercase',letterSpacing:.5,marginBottom:10}}>🔴 Ocorrências registradas</div>
            {falhasItems.map(function(item){var n=negs[item.id]||{};return(<div key={item.id} style={{padding:'9px 0',borderBottom:'1px solid #F3F4F6'}}><div style={{fontSize:13,fontWeight:600,color:'var(--ink)',lineHeight:1.4,marginBottom:4}}>{item.texto}</div><div style={{fontSize:11,color:'#991B1B',lineHeight:1.6}}>{n.aconteceu&&<div>O que: {n.aconteceu}</div>}{n.feito&&<div>Ação: {n.feito}</div>}{n.prox&&<div style={{fontWeight:600,marginTop:2}}>{n.prox==='Sim, fica pendente'?'⚠️ Pendente para a manhã':'✅ Encerrado'}</div>}{n.detalhe&&<div style={{color:'var(--ink2)',marginTop:2}}>{n.detalhe}</div>}</div></div>);})}
          </div>
        )}

          <button onClick={function(){setConfirmando(true);}} style={{flex:2,padding:13,background:'#25D366',color:'#fff',borderRadius:12,fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,cursor:'pointer',border:'none'}}>📲 Enviar para o grupo</button>

}

function NoiteChecklistScreen(props){
  var user=props.user;var onLogout=props.onLogout;var onBack=props.onBack;
  var SAVE_KEY=NOITE_SAVE_KEY_PREFIX+user.login;
  var _sc=useState('inicio');var screen=_sc[0];var setScreen=_sc[1];
  var _etapaIdx=useState(0);var etapaIdx=_etapaIdx[0];var setEtapaIdx=_etapaIdx[1];
  var _resps=useState({});var resps=_resps[0];var setResps=_resps[1];
  var _negs=useState({});var negs=_negs[0];var setNegs=_negs[1];
  var _showErr=useState(false);var showErr=_showErr[0];var setShowErr=_showErr[1];
  var _sending=useState(false);var sending=_sending[0];var setSending=_sending[1];
  var _toast=useToast();var toast=_toast[0];var showToast=_toast[1];
  var _inicio=useState(null);var horaInicio=_inicio[0];var setHoraInicio=_inicio[1];
  var _relato=useState('');var relato=_relato[0];var setRelato=_relato[1];
  var _sug=useState({});var sugestao=_sug[0];var setSugestao=_sug[1];
  var _sugOpen=useState(false);var sugestaoAberta=_sugOpen[0];var setSugestaoAberta=_sugOpen[1];
  var _enviado=useState(false);var enviado=_enviado[0];var setEnviado=_enviado[1];
  var _envScore=useState(0);var envScore=_envScore[0];var setEnvScore=_envScore[1];
  useEffect(function(){
    try{
      var s=JSON.parse(localStorage.getItem(SAVE_KEY));
      /* REGRA: só restaura rascunho se for do dia atual.
         BUG HISTÓRICO: rascunhos antigos sem campo 'data' eram restaurados sempre,
         causando checklist abrir pré-preenchido. Corrigido: qualquer rascunho sem
         data válida de hoje é descartado silenciosamente.
         INVARIANTE: todo setItem do SAVE_KEY deve incluir data:todayISO() */
      if(s&&s.resps&&Object.keys(s.resps).length>0&&s.data===todayISO()){
        setResps(s.resps||{});setNegs(s.negs||{});setHoraInicio(s.horaInicio||null);
        if(s.sugestao)setSugestao(s.sugestao);
      }else if(s){
        /* Qualquer rascunho sem data válida de hoje é descartado */
        try{localStorage.removeItem(SAVE_KEY);}catch(e){}
      }
    }catch(e){}
  },[]);
  useEffect(function(){if(screen==='checklist'){try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio,sugestao:sugestao,data:todayISO()}));}catch(e){}}},[resps,negs,screen,horaInicio,sugestao]);
  function onAns(id,val){setResps(function(r){return Object.assign({},r,{[id]:val});});if(val==='sim'){setNegs(function(n){var c=Object.assign({},n);delete c[id];return c;});}}
  function onNeg(id,updater){setNegs(function(n){var current=n[id]||{};var next=typeof updater==='function'?updater(current):updater;return Object.assign({},n,{[id]:next});});}
  var allItems=useMemo(function(){return NOITE_ETAPAS.reduce(function(acc,e){return acc.concat(e.itens);},[]);},[]);
  var totalItems=allItems.length;
  var respondidos=allItems.filter(function(i){return resps[i.id];}).length;
  var falhasTotal=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
  var pct=totalItems>0?Math.round(respondidos/totalItems*100):0;
  var etapaAtual=NOITE_ETAPAS[etapaIdx];
  /* Horário mínimo por missão — Caminho B: aviso suave, não bloqueio
     REGRA: informa que está adiantado mas deixa avançar se confirmar
     Mesa: Frankl (consciência), Maslow (não punir), Gawande (cada fase no tempo certo) */
  var HORARIO_MINIMO_MISSAO=[0,15,18,21,22]; /* índice = missão-1 */
  var _avisoHorario=useState(false);var avisoHorario=_avisoHorario[0];var setAvisoHorario=_avisoHorario[1];
  var _proximaMissao=useState(0);var proximaMissao=_proximaMissao[0];var setProximaMissao=_proximaMissao[1];

  function validateEtapa(idx){var etapa=NOITE_ETAPAS[idx];var errs=[];etapa.itens.forEach(function(item){if(!resps[item.id]){errs.push(item.texto);return;}if(resps[item.id]==='nao'&&!validateNoiteNeg(negs[item.id],item.critico)){errs.push(item.texto+' — complete o registro');}});return errs;}

  function handleAvancar(){
    /* Valida itens da etapa atual */
    var errs=validateEtapa(etapaIdx);
    if(errs.length>0){setShowErr(true);window.scrollTo({top:0,behavior:'smooth'});showToast('⚠ Preencha todos os itens');return;}
    setShowErr(false);
    /* Verifica horário da próxima missão */
    var proxIdx=etapaIdx+1;
    if(proxIdx<NOITE_ETAPAS.length){
      var horaAtual=new Date().getHours();
      var horaMinima=HORARIO_MINIMO_MISSAO[proxIdx];
      if(horaAtual<horaMinima){
        /* Fora do horário — mostra aviso, aguarda confirmação */
        setProximaMissao(proxIdx);
        setAvisoHorario(true);
        window.scrollTo({top:0,behavior:'smooth'});
        return;
      }
      setEtapaIdx(proxIdx);
      window.scrollTo({top:0,behavior:'smooth'});
    }else{
      setScreen('resumo');
      window.scrollTo({top:0,behavior:'smooth'});
    }
  }

  function handleAvancarConfirmado(){
    /* Usuária confirmou que quer avançar fora do horário */
    setAvisoHorario(false);
    if(proximaMissao<NOITE_ETAPAS.length){
      setEtapaIdx(proximaMissao);
    }else{
      setScreen('resumo');
    }
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function handleVoltar(){if(etapaIdx>0){setEtapaIdx(function(i){return i-1;});window.scrollTo({top:0,behavior:'smooth'});}else{setScreen('inicio');}setShowErr(false);}
  async function handleFinalizar(relato){
    setSending(true);
    var criticos=allItems.filter(function(i){return i.critico&&resps[i.id]==='nao';}).length;
    var falhas=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
    var pendencias=allItems.filter(function(i){var n=negs[i.id]||{};return resps[i.id]==='nao'&&n.prox==='Sim, fica pendente';}).length;
    var statusKey=criticos>0?'critico':falhas>0?'atencao':'ok';
    var score=Math.max(0,Math.round(100-(falhas/totalItems*50)-(criticos*8)));
    var etapasConcluidas=NOITE_ETAPAS.filter(function(e){return e.itens.every(function(i){return resps[i.id];});}).length;
    var ok=await sbInsert('subger_noite_checklists',{login:user.login,user_name:user.name,turno:'noite',data:todayISO(),data_fmt:todayFmt(),hora:nowTime(),hora_inicio:horaInicio,score:score,total:totalItems,falhas:falhas,criticos:criticos,pendencias:pendencias,status:statusKey,etapas_concluidas:etapasConcluidas,resps:resps,negs:negs,relato:relato||'',sugestao:(sugestao&&sugestao.atividade?sugestao:{})});
    if(!ok){setSending(false);showToast('❌ Erro ao salvar. Verifique sua conexão e tente novamente.');return;}
    await salvarPendencias(allItems,negs,resps,user,'noite','subger_noite_checklists');
    await sendWebhookComAviso(SISTEMA+' — SUBGERÊNCIA NOITE\n'+user.name+' · '+todayFmt()+'\nStatus: '+statusKey.toUpperCase()+' · Score: '+score+'/100',{assunto:'[CheckON Noite] '+statusKey.toUpperCase()+' – '+user.name},showToast);
    try{localStorage.removeItem(SAVE_KEY);}catch(e){} try{localStorage.removeItem('checkon_ctx_'+user.login);}catch(e){} try{localStorage.setItem('checkon_last_score_'+user.login,JSON.stringify({score:score,data:todayISO()}));}catch(e){}
    setEnvScore(score);setEnviado(true);
    setTimeout(function(){setSending(false);setEnviado(false);setScreen('summary');},2200);
  }
  function handleLimpar(){if(!window.confirm('Limpar checklist atual?'))return;try{localStorage.removeItem(SAVE_KEY);}catch(e){}setResps({});setNegs({});setShowErr(false);setEtapaIdx(0);setHoraInicio(null);setSugestao({});setSugestaoAberta(false);if(onBack)onBack();}
  var noiteHdr=(
    <div style={{background:'#EA1D2C',color:'#fff',height:52,padding:'0 16px',display:'flex',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
      <div style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div><div style={{fontSize:9,opacity:.7,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>CheckON · Subgerência</div><div style={{fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:800}}>Turno da Noite</div></div>
        <div style={{display:'flex',gap:6}}>
          
          {onBack&&<button className="hdr-btn" onClick={function(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio,data:todayISO()}));}catch(e){}onBack();}}>← Voltar</button>}
          
        </div>
      </div>
    </div>
  );
  if(screen==='summary')return<NoiteSummaryScreen resps={resps} negs={negs} user={user} horaInicio={horaInicio} onBack={onBack} onLogout={onLogout} onNovo={function(){setResps({});setNegs({});setShowErr(false);setEtapaIdx(0);setHoraInicio(null);setScreen('inicio');}}/>;
  if(screen==='resumo'){
    var falhasItems=allItems.filter(function(i){return resps[i.id]==='nao';});
    return(
      <div style={{minHeight:'100vh',background:'#F4F4F6',paddingBottom:24}}>{noiteHdr}
        <div style={{maxWidth:720,margin:'0 auto',padding:'16px'}}>
          <div style={{background:'#fff',borderRadius:12,border:'1px solid #E5E7EB',padding:'18px',marginBottom:12}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:900,marginBottom:4}}>{falhasItems.length===0?'🎉 Fechamento impecável!':'📋 Resumo final'}</div>

            <label style={{display:'block',fontSize:13,fontWeight:600,color:'var(--ink)',marginBottom:6}}>Observações para a manhã <span style={{color:'var(--ink3)',fontWeight:400}}>(opcional)</span></label>
            <textarea value={relato} onChange={function(e){setRelato(e.target.value);}} placeholder="O que a Gabriela precisa saber ao chegar..." style={{width:'100%',border:'1.5px solid #E5E7EB',borderRadius:10,padding:'11px 13px',fontSize:13,color:'#111',background:'#fff',resize:'none',minHeight:88,fontFamily:'inherit',lineHeight:1.6,marginBottom:12}}/>
            <button onClick={function(){handleFinalizar(relato);}} style={{width:'100%',padding:15,background:'#EA1D2C',color:'#fff',borderRadius:12,fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:700,cursor:'pointer',border:'none'}}>🔒 Fechar turno</button>
          </div>
          <button onClick={function(){setScreen('checklist');setShowErr(false);}} style={{width:'100%',padding:11,background:'transparent',color:'var(--ink3)',borderRadius:12,fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB'}}>← Revisar checklist</button>
        </div>
      </div>
    );
  }
  if(screen==='inicio'){
    /* Missões por horário — Gawande: cada fase no momento certo
       Se tem rascunho de hoje, retoma de onde parou.
       Se é turno novo, abre a missão do horário atual. */
    if(!horaInicio)setHoraInicio(nowTime());
    setShowErr(false);
    var temResps=resps&&Object.keys(resps).length>0;
    if(temResps){
      /* Tem rascunho — encontra a primeira missão incompleta */
      var idxRetomar=0;
      for(var mi=0;mi<NOITE_ETAPAS.length;mi++){
        var etapaCheck=NOITE_ETAPAS[mi];
        var completa=etapaCheck.itens.every(function(it){return resps[it.id];});
        if(!completa){idxRetomar=mi;break;}
        if(mi===NOITE_ETAPAS.length-1)idxRetomar=mi;
      }
      setEtapaIdx(idxRetomar);
    }else{
      /* Turno novo — abre pela missão do horário atual */
      var horaAtual=new Date().getHours();
      var idxHorario=0;
      if(horaAtual>=22)idxHorario=4;
      else if(horaAtual>=21)idxHorario=3;
      else if(horaAtual>=18)idxHorario=2;
      else if(horaAtual>=15)idxHorario=1;
      else idxHorario=0;
      setEtapaIdx(idxHorario);
    }

            <button className="fab-send" onClick={handleAvancar} disabled={sending} style={{background:etapaOk?bgOk:'var(--ink3)',opacity:etapaOk?1:.45,boxShadow:etapaOk?'none':'none',transition:'all .2s'}}>
              {etapaOk

          </div></div>

      })()}

    </div>
  );
}

function SubgerenteNoiteHub(props){
  var user=props.user;var onLogout=props.onLogout;
  var _m=useState(null);var mode=_m[0];var setMode=_m[1];
  var _pendManha=useState(null);var pendManhaInfo=_pendManha[0];var setPendManhaInfo=_pendManha[1];
  var _declaracao=useState(null);var declaracao=_declaracao[0];var setDeclaracao=_declaracao[1];
  var _declaracaoFeita=useState(false);var declaracaoFeita=_declaracaoFeita[0];var setDeclaracaoFeita=_declaracaoFeita[1];
  var _scoreAnterior=useState(null);var scoreAnterior=_scoreAnterior[0];var setScoreAnterior=_scoreAnterior[1];
  var SAVE_KEY=NOITE_SAVE_KEY_PREFIX+user.login;

  /* Saudação inteligente — respeita o horário real (BJ Fogg: gatilho contextual) */
  var hora=new Date().getHours();
  var saudacao=hora>=18?'Boa noite':'Boa tarde';

  /* Chips de declaração de intenção — Gollwitzer: implementation intention */
  var CHIPS_DECLARACAO=['Equipe incompleta','Estoque no limite','Pico pesado','Entrega atrasada','Outra coisa'];

  useEffect(function(){
    /* Busca pendências da manhã */
    buscarPendenciasManhaParaNoite()
      .then(function(info){setPendManhaInfo(info||{responsavel:'',score:0,pendencias:0,horario:''});})
      .catch(function(){setPendManhaInfo({responsavel:'',score:0,pendencias:0,horario:''});});
    /* Score: lê cache local primeiro (instantâneo), depois confirma com banco */
    try{
      var cachedScore=JSON.parse(localStorage.getItem('checkon_last_score_'+user.login));
      if(cachedScore&&cachedScore.score!==undefined)setScoreAnterior(cachedScore.score);
    }catch(e){}
    sbSelectRecente('subger_noite_checklists',30,{login:user.login})
      .then(function(rows){
        if(rows&&rows.length>0){
          var s=rows[0].score||0;
          setScoreAnterior(s);
          try{localStorage.setItem('checkon_last_score_'+user.login,JSON.stringify({score:s,data:todayISO()}));}catch(e){}
        }
      })
      .catch(function(){});
    /* Recupera declaração — só restaura se tem rascunho de hoje em andamento.
       BUG HISTÓRICO: declaração era restaurada por data do dia, independente de
       rascunho existir. Resultado: ao abrir turno novo, pergunta de intenção era
       pulada porque a declaração do turno anterior ainda estava salva.
       REGRA: declaração = por turno ativo, não por dia. Turno novo = declaração nova. */
    try{
      var savedDecl=JSON.parse(localStorage.getItem('checkon_declaracao_'+user.login));
      var savedRasc=JSON.parse(localStorage.getItem('checkon_noite_'+user.login));
      var temRascunhoHoje=savedRasc&&savedRasc.data===todayISO()&&savedRasc.resps&&Object.keys(savedRasc.resps).length>0;
      if(savedDecl&&savedDecl.data===todayISO()&&temRascunhoHoje){
        setDeclaracao(savedDecl.chip);setDeclaracaoFeita(true);
      }else{
        /* Turno novo — limpa declaração anterior */
        try{localStorage.removeItem('checkon_declaracao_'+user.login);}catch(e){}
      }
    }catch(e){}
  },[]);

  function handleDeclaracao(chip){
    setDeclaracao(chip);
    try{localStorage.setItem('checkon_declaracao_'+user.login,JSON.stringify({chip:chip,data:todayISO()}));}catch(e){}
    setDeclaracaoFeita(true);
  }

  function handleIniciar(){setMode('checklist');}

  if(mode==='checklist')return<NoiteChecklistScreen user={user} onLogout={onLogout} declaracao={declaracao} onBack={function(){setMode(null);}}/>;

        </div>

    </div>

  /* Rascunho — só mostra se for de hoje */
  var rascunhoPct=(function(){
    try{
      var s=JSON.parse(localStorage.getItem(SAVE_KEY));
      if(!s||!s.resps||Object.keys(s.resps).length===0)return null;
      /* Ignora rascunho sem data ou de outro dia */
      if(!s.data||s.data!==todayISO())return null;
      var total=NOITE_ETAPAS.reduce(function(a,e){return a+e.itens.length;},0);
      var respondidos=Object.keys(s.resps).length;
      return{pct:Math.round(respondidos/total*100),respondidos:respondidos,total:total};

            <div style={{fontFamily:"'Sora',sans-serif",fontSize:20,fontWeight:900,letterSpacing:'-.3px'}}>
              {saudacao}, {user.name.split(' ')[0]}. 🌙
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={function(){setMode('historico');}} className="hdr-btn">📈 Evolução</button>
            <button className="hdr-btn" onClick={onLogout}>Sair</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:720,margin:'0 auto',padding:'16px 16px 0'}}>

        {/* ── SCORE ANTERIOR — contexto do turno (Don Norman: ela chega sabendo) ── */}
        {scoreAnterior!==null&&(
          <div style={{background:'#fff',borderRadius:12,border:'1px solid #E5E7EB',padding:'12px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:44,height:44,borderRadius:'50%',background:scoreAnterior>=80?'#F0FDF4':scoreAnterior>=60?'#FFFBEB':'#FEF2F2',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{fontFamily:"'Sora',sans-serif",fontSize:16,fontWeight:900,color:scoreAnterior>=80?'#16A34A':scoreAnterior>=60?'#D97706':'#DC2626'}}>{scoreAnterior}</span>

              </div>
            </div>
          </div>
        )}

        {/* ── PENDÊNCIAS DA MANHÃ — briefing (Frankl: ela sabe o contexto antes de começar) ── */}
        {pendManhaInfo&&pendManhaInfo.pendencias>0&&(
          <div style={{background:'#FEF3C7',border:'1.5px solid #FDE68A',borderRadius:12,padding:'12px 14px',marginBottom:12}}>

              </div>
            </div>
            <div style={{fontSize:12,color:'#78350F'}}>
              {pendManhaInfo.responsavel&&<span>{pendManhaInfo.responsavel} deixou registrado{pendManhaInfo.horario?' às '+pendManhaInfo.horario:''}. </span>}

            </div>
          </div>
        )}
        {pendManhaInfo&&pendManhaInfo.pendencias===0&&pendManhaInfo.responsavel&&(
          <div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:12,padding:'12px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16}}>✅</span>
            <div style={{fontSize:12,color:'#166534'}}>
              Manhã sem pendências{pendManhaInfo.responsavel?' — '+pendManhaInfo.responsavel+(pendManhaInfo.horario?' às '+pendManhaInfo.horario:''):''}. Turno limpo pra você.
            </div>
          </div>
        )}

        {/* ── DECLARAÇÃO DE INTENÇÃO — Momento 1 (Gollwitzer: implementation intention) ── */}
        {!declaracaoFeita?(
          <div style={{background:'#fff',borderRadius:12,border:'1.5px solid #EA1D2C',padding:'16px',marginBottom:12}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:800,color:'#111827',marginBottom:4}}>

        {temRascunho&&(

                    marginBottom:6,borderRadius:10,
                    background:ativa?'#FFF0F1':'transparent',

                      <div style={{fontSize:11,color:ativa?'#EA1D2C':'#9CA3AF'}}>{e.itens.length} itens</div>
                      {ativa&&<span style={{background:'#EA1D2C',color:'#fff',borderRadius:99,padding:'2px 8px',fontSize:9,fontWeight:800}}>AGORA</span>}
                      {passada&&<span style={{fontSize:12}}>⏭</span>}

              </button>
            </div>
          );
        })()}

        {/* ── FEEDBACK DA CEO ── */}
        <FeedbackCEOCard login="vitoria"/>

      </div>
    </div>
  );
}

  async function go(){
    setErr('');if(!login.trim()||!pwd.trim()){setErr('Preencha todos os campos.');return;}setLoading(true);
    var hashPw=async function(s){try{var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}catch(e){return s;}};
    var hashed=await hashPw(pwd.trim());var users=getUsers();var key=login.trim().toLowerCase();var u=users[key];
    if(!u||(u.pwd!==hashed&&u.pwd!==pwd.trim())){setErr('Login ou senha incorretos.');setLoading(false);return;}
    onLogin(u,key);setLoading(false);
  }
  return(
    <div className="login-bg">
      <div className="login-wrapper">
        <div className="login-card">
          <div className="card-top">
            <div className="card-arch-bg">
              <img src="logo.png" alt="Pastel da Camilla" style={{display:'block'}} onError={function(e){e.target.style.display='none';e.target.nextSibling.style.display='block';}}/>
              <span className="card-arch-fallback">🥟</span>
            </div>
          </div>
          <div className="card-body">
            {err&&<div className="login-alert">⚠️ {err}</div>}
            <div className="card-headline">O pessoal tá <em>ON</em> com o CheckON 🚀</div>
            <div className="card-sub">Gestão simples. Operação no controle.</div>
            <div className="login-f-group">
              <label className="login-f-label">Login</label>
              <div className="login-input-wrap"><span className="login-input-icon">👤</span><input className="login-f-input" type="text" placeholder="Seu login" value={login} onChange={function(e){setLogin(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')go();}} autoCapitalize="none" autoCorrect="off"/></div>
            </div>
            <div className="login-f-group">
              <label className="login-f-label">Senha</label>
              <div className="login-input-wrap"><span className="login-input-icon">🔒</span><input className="login-f-input" type="password" placeholder="••••••" value={pwd} onChange={function(e){setPwd(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')go();}}/></div>
            </div>
            <button className="login-btn" onClick={go} disabled={loading}>{loading?'Verificando...':'Entrar'}</button>
          </div>
        </div>
        <div className="login-footer-txt">CheckON by Pastel da Camilla</div>
      </div>
    </div>
  );
}

function App(){
  /* ARQUITETURA DE SESSÃO:
     - Sessão é limpa no IIFE de inicialização (síncrono, antes do React montar)
     - App começa sempre em 'login' — sem estado 'loading' que causava race condition
     - BUG CORRIGIDO: useEffect com clearSession() rodava após o primeiro render,
       permitindo que componentes lessem sessão antiga antes da limpeza
     - REGRA: nunca restaurar sessão automaticamente — usuário sempre faz login */
  var _p=useState('login');var phase=_p[0];var setPhase=_p[1];
  var _u=useState(null);var user=_u[0];var setUser=_u[1];
  function onLogin(u,key){setUser(u);saveSession({key:key});setPhase('app');}
  function onLogout(){clearSession();setUser(null);setPhase('login');}
  if(phase==='login'){return<Login onLogin={onLogin}/>;}
  if(phase==='app'){
    if(!user)return<Login onLogin={onLogin}/>;
    if(user.role==='ceo')return<CEOHub user={user} onLogout={onLogout}/>;
    if(user.role==='suporte')return<SuporteHub user={user} onLogout={onLogout}/>;
    if(user.role==='gerente')return<GerenteHub user={user} onLogout={onLogout}/>;
    if(user.role==='gerencia')return<GerenciaHub user={user} onLogout={onLogout}/>;
    if(user.role==='dp')return<DPHub user={user} onLogout={onLogout}/>;
    if(user.role==='subgerente')return<SubgerenteHub user={user} onLogout={onLogout}/>;
    if(user.role==='subgerente_noite')return<SubgerenteNoiteHub user={user} onLogout={onLogout}/>;
    return<ChecklistScreen user={user} onLogout={onLogout}/>;
  }
  return<Login onLogin={onLogin}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
